services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    volumes:
      - client-dist:/app/dist

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      LOG_LEVEL: info
      JWT_SECRET: ${JWT_SECRET:-super_secure_docker_secret_123} 
      CLIENT_DIST_PATH: ../client/dist
    volumes:
      - client-dist:/app/client/dist
    depends_on:
      - frontend

volumes:
  client-dist: