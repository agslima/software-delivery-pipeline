services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASS:-app_pass}
      POSTGRES_DB: ${DB_NAME:-app_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_quick:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    profiles: ["backend"]
    image: node:24-alpine
    working_dir: /app
    environment:
      NODE_ENV: development
      PORT: "8080"
      LOG_LEVEL: info
      DB_HOST: postgres
      DB_USER: ${DB_USER:-app}
      DB_PASS: ${DB_PASS:-app_pass}
      DB_NAME: ${DB_NAME:-app_db}
      JWT_SECRET: ${JWT_SECRET:-dev_secret}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-DemoPass123!}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:-dev_encryption_key}
    volumes:
      - ./server:/app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm install && npm run dev"

volumes:
  pgdata_quick:
