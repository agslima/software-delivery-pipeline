worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Upstream definition
    # Decouples the backend address from the location block
    upstream backend_server {
        server backend:8080;
    }

    # Logging with Timings
    # Time Nginx waited for Node.js to reply
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    # Gzip Compression
    # React performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        image/svg+xml;

    # Set Rate Limiting
    # Limit IP to 10 requests per second to protect the Node backend
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    sendfile on;
    keepalive_timeout 65;

    # Read-only rootfs compatibility
    client_body_temp_path /tmp/client_body_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    server {
        listen 8080;
        server_name localhost;
        server_tokens off;

        client_max_body_size 10M;

        # Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP allows Google Fonts/Analytics
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

        # Health Check
        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'healthy';
        }

        # Static Files (SPA)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Reverse Proxy
        location /api/v1 {
            # Rate limit application
            limit_req zone=api_limit burst=20 nodelay;

            # Use the upstream
            proxy_pass http://backend_server/api/v1/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Close connection to backend immediately after request to save resources
            proxy_set_header Connection "";
            
            # Timeouts
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Backend health
        location = /api/health {
            proxy_pass http://backend_server/health;
        }
    }
}
