server {
    listen 80;
    server_name localhost;
    
    # ----------------------------------------------------------------------
    # Security Headers
    # ----------------------------------------------------------------------
    
    # 1. Block Clickjacking (This site can't be put in an iframe)
    add_header X-Frame-Options "DENY" always;

    # 2. Block MIME Sniffing (Forces browser to respect Content-Type)
    add_header X-Content-Type-Options "nosniff" always;

    # 3. XSS Protection
    add_header X-XSS-Protection "1; mode=block" always;

    # 4. Referrer Policy (Don't leak URLs to other sites)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 5. Content Security Policy (CSP)
    # - default-src 'self': Only allow content from this domain
    # - style-src 'unsafe-inline': Required for React/Styled-Components dynamic styling
    # - img-src data: : Required for loading Base64 images/SVGs
    # - connect-src: Allows API calls to 'self'
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

    # ----------------------------------------------------------------------
    # Static Files (Client/Frontend)
    # ----------------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        
        # SPA Fallback: If file doesn't exist, serve index.html
        try_files $uri $uri/ /index.html;
    }

    # ----------------------------------------------------------------------
    # Reverse Proxy (Backend API)
    # ----------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8080/api/;
        
        # Standard Proxy Headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
