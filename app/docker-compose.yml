# Docker Compose Configuration
#
# Quick Start:
#   docker-compose up -d                      # Start all services
#   docker-compose logs -f                    # View logs
#   docker-compose down                       # Stop all services
#   docker-compose down -v --remove-orphans   # Remove the old volume and orphans
#
# version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    ports:
      - "4173:8080"
    depends_on:
      backend:
        condition: service_healthy
    
    # Least Privilege
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    read_only: true
    
    # Nginx Alpine UID (101)
    tmpfs:
      - /tmp:uid=101,gid=101,mode=1777
      - /var/run:uid=101,gid=101,mode=0755
      - /var/cache/nginx:uid=101,gid=101,mode=0755
    
    # Availability
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    ports:
      - "8080:8080"
    
    environment:
      NODE_ENV: production
      PORT: "8080"
      LOG_LEVEL: info

      CORS_ORIGIN: "http://localhost:4173,http://127.0.0.1:4173"

      # Secret Files
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      ADMIN_PASS_FILE: /run/secrets/admin_pass
      ADMIN_USER: ${ADMIN_USER}
      
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_PASS_FILE: /run/secrets/db_pass
      DB_NAME: ${DB_NAME}

    # Mount the secrets into this container
    secrets:
      - jwt_secret
      - admin_pass
      - db_pass

    depends_on:
      postgres:
        condition: service_healthy
    
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    read_only: true
    
    # Node Alpine UID (1000)
    tmpfs:
      - /tmp:uid=1000,gid=1000,mode=1777
      
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      # Postgres Native Support for Secrets
      POSTGRES_PASSWORD_FILE: /run/secrets/db_pass
    
    secrets:
      - db_pass

    volumes:
      - pgdata:/var/lib/postgresql/data
    
    # Resource Limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  pgdata:

# Secrets Source (Host Paths)
secrets:
  db_pass:
    file: ./secrets/db_pass.txt
  admin_pass:
    file: ./secrets/admin_pass.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
