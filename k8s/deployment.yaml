apiVersion: apps/v1
kind: Deployment
metadata:
  name: software-delivery-pipeline
  namespace: production
  labels:
    app: software-delivery-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: software-delivery-pipeline
  template:
    metadata:
      labels:
        app: software-delivery-pipeline
    spec:
      # Pod-Level Security Context
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: app
        image: agslima/software-delivery-pipeline@sha256:fa9a54b6c1237a301edd6a6ede45d83e926baa4d9d369db19a5c68a2f36b2e44
        
        # Avoid pulling image if it exists locally (Standard for SHA digests)
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 3000
        
        # Container Sandbox
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]

        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"

        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
      
      volumes:
      - name: tmp-volume
        emptyDir: {}

