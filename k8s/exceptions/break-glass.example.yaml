apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: break-glass-example
  namespace: policy-exceptions
  annotations:
    security.break-glass/ticket: "INC-1234"
    security.break-glass/requested-by: "application-team"
    security.break-glass/approved-by: "platform-oncall"
    security.break-glass/expires-at: "2026-12-31T23:59:59Z"
spec:
  background: false
  match:
    any:
      - resources:
          kinds:
            - Deployment
          names:
            - my-app
          namespaces:
            - production
      - resources:
          kinds:
            - Pod
          names:
            - my-app-*
          namespaces:
            - production
  # Narrow break-glass to the smallest specific policy/rule pair required for the incident.
  # Do not copy a multi-policy exception set unless each entry is explicitly justified.
  exceptions:
    - policyName: verify-signature
      ruleNames:
        - require-image-signature
