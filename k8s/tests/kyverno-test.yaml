apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: break-glass-policy-tests
policies:
  - ../policies/cluster/break-glass-policy.yaml
resources:
  - resources/break-glass-invalid.yaml
  - resources/break-glass-expired.yaml
  - resources/break-glass-valid.yaml
  - resources/break-glass-self-approved.yaml
  - resources/break-glass-missing-pod-label.yaml
results:
  - policy: break-glass-admission-controls
    rule: break-glass-requires-metadata
    resources:
      - production/break-glass-abuse
    kind: Deployment
    result: fail
  - policy: break-glass-admission-controls
    rule: break-glass-must-not-be-expired
    resources:
      - production/break-glass-expired
    kind: Deployment
    result: fail
  - policy: break-glass-admission-controls
    rule: break-glass-requires-controlled-approval
    resources:
      - production/break-glass-self-approved
    kind: Deployment
    result: fail
  - policy: break-glass-admission-controls
    rule: break-glass-requires-metadata
    resources:
      - production/break-glass-approved
    kind: Deployment
    result: pass
  - policy: break-glass-admission-controls
    rule: break-glass-requires-controlled-approval
    resources:
      - production/break-glass-approved
    kind: Deployment
    result: pass
  - policy: break-glass-admission-controls
    rule: break-glass-must-not-be-expired
    resources:
      - production/break-glass-approved
    kind: Deployment
    result: pass
  - policy: break-glass-admission-controls
    rule: break-glass-deployment-must-label-pod-template
    resources:
      - production/break-glass-approved
    kind: Deployment
    result: pass
  - policy: break-glass-admission-controls
    rule: break-glass-deployment-must-label-pod-template
    resources:
      - production/break-glass-no-pod-label
    kind: Deployment
    result: fail
