apiVersion: kyverno.io/v1alpha1
kind: Test
metadata:
  name: ci-structural-policy-tests
policies:
  - ../policies/ci/structural-policy.yaml
resources:
  - resources/valid-deployment.yaml
  - resources/invalid-unsigned.yaml
results:
  - policy: ci-structural-policy
    rule: require-digest-pinned-images
    resource: governed-app
    kind: Deployment
    result: pass

  - policy: ci-structural-policy
    rule: ban-latest-tag
    resource: governed-app
    kind: Deployment
    result: pass

  - policy: ci-structural-policy
    rule: require-container-hardening
    resource: governed-app
    kind: Deployment
    result: pass

  - policy: ci-structural-policy
    rule: require-resources
    resource: governed-app
    kind: Deployment
    result: pass

  - policy: ci-structural-policy
    rule: require-digest-pinned-images
    resource: unsigned-app
    kind: Deployment
    result: fail

  - policy: ci-structural-policy
    rule: ban-latest-tag
    resource: unsigned-app
    kind: Deployment
    result: fail

  - policy: ci-structural-policy
    rule: require-container-hardening
    resource: unsigned-app
    kind: Deployment
    result: fail

  - policy: ci-structural-policy
    rule: require-resources
    resource: unsigned-app
    kind: Deployment
    result: fail
