apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ci-structural-policy-tests
policies:
  - ../policies/ci/structural-policy.yaml
resources:
  - resources/valid-deployment.yaml
  - resources/invalid-unsigned.yaml
  - pod.yaml
  - resources/invalid-pod-latest.yaml
results:
  - policy: ci-structural-policy
    rule: require-digest-pinned-images
    resources:
      - production/governed-app
    kind: Deployment
    result: pass

  - policy: ci-structural-policy
    rule: ban-latest-tag
    resources:
      - production/governed-app
    kind: Deployment
    result: pass

  - policy: ci-structural-policy
    rule: require-container-hardening
    resources:
      - production/governed-app
    kind: Deployment
    result: pass

  - policy: ci-structural-policy
    rule: require-resources
    resources:
      - production/governed-app
    kind: Deployment
    result: pass

  - policy: ci-structural-policy
    rule: require-digest-pinned-images
    resources:
      - production/unsigned-app
    kind: Deployment
    result: fail

  - policy: ci-structural-policy
    rule: ban-latest-tag
    resources:
      - production/unsigned-app
    kind: Deployment
    result: fail

  - policy: ci-structural-policy
    rule: require-container-hardening
    resources:
      - production/unsigned-app
    kind: Deployment
    result: fail

  - policy: ci-structural-policy
    rule: require-resources
    resources:
      - production/unsigned-app
    kind: Deployment
    result: fail

  - policy: ci-structural-policy
    rule: require-digest-pinned-images
    resources:
      - test-pod
    kind: Pod
    result: pass

  - policy: ci-structural-policy
    rule: ban-latest-tag
    resources:
      - test-pod
    kind: Pod
    result: pass

  - policy: ci-structural-policy
    rule: require-digest-pinned-images
    resources:
      - production/latest-pod
    kind: Pod
    result: fail

  - policy: ci-structural-policy
    rule: ban-latest-tag
    resources:
      - production/latest-pod
    kind: Pod
    result: fail
