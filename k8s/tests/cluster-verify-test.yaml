apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cluster-verify-break-glass-tests
policies:
  - ../policies/cluster/verify-signature.yaml
  - ../policies/cluster/verify-trivy.yaml
  - ../policies/cluster/verify-zap.yaml
  - ../policies/cluster/verify-sbom.yaml
  - ../policies/cluster/verify-slsa.yaml
resources:
  - resources/break-glass-valid.yaml
  - resources/break-glass-pod.yaml
results:
  - policy: verify-signature
    rule: require-image-signature
    resources:
      - production/break-glass-approved
    kind: Deployment
    result: skip
  - policy: verify-signature
    rule: require-image-signature
    resources:
      - production/break-glass-pod
    kind: Pod
    result: skip
  - policy: verify-trivy
    rule: require-trivy-attestation
    resources:
      - production/break-glass-approved
    kind: Deployment
    result: skip
  - policy: verify-trivy
    rule: require-trivy-attestation
    resources:
      - production/break-glass-pod
    kind: Pod
    result: skip
  - policy: verify-zap
    rule: require-zap-attestation
    resources:
      - production/break-glass-approved
    kind: Deployment
    result: skip
  - policy: verify-zap
    rule: require-zap-attestation
    resources:
      - production/break-glass-pod
    kind: Pod
    result: skip
  - policy: verify-sbom
    rule: require-sbom-spdx
    resources:
      - production/break-glass-approved
    kind: Deployment
    result: skip
  - policy: verify-sbom
    rule: require-sbom-spdx
    resources:
      - production/break-glass-pod
    kind: Pod
    result: skip
  - policy: verify-slsa
    rule: require-slsa-provenance
    resources:
      - production/break-glass-approved
    kind: Deployment
    result: skip
  - policy: verify-slsa
    rule: require-slsa-provenance
    resources:
      - production/break-glass-pod
    kind: Pod
    result: skip
