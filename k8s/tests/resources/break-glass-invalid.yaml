apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: break-glass-abuse
  namespace: policy-exceptions
spec:
  background: false
  match:
    any:
      - resources:
          kinds:
            - Deployment
          names:
            - exception-target
          namespaces:
            - production
  exceptions:
    - policyName: verify-signature
      ruleNames:
        - require-image-signature
