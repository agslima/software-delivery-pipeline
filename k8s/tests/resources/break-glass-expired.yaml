apiVersion: apps/v1
kind: Deployment
metadata:
  name: break-glass-expired
  namespace: production
  labels:
    security.break-glass: "true"
  annotations:
    security.break-glass/ticket: "INC-1001"
    security.break-glass/approved-by: "platform-oncall"
    security.break-glass/expires-at: "2000-01-01T00:00:00Z"
spec:
  selector:
    matchLabels:
      app: exploit-expired
  template:
    metadata:
      labels:
        app: exploit-expired
    spec:
      serviceAccountName: default
      containers:
        - name: app
          image: docker.io/agslima/software-delivery-pipeline@sha256:EVIL
