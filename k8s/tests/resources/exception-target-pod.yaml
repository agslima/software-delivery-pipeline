apiVersion: v1
kind: Pod
metadata:
  name: exception-target-0
  namespace: production
spec:
  automountServiceAccountToken: false
  securityContext:
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: docker.io/agslima/app-stayhealthy-frontend@sha256:adc8d33f2764db79b74b863f620ad677da28b21eca9c669d79dcee3f4627bae0
      securityContext:
        allowPrivilegeEscalation: false
        runAsUser: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - "ALL"
