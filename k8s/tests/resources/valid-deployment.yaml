apiVersion: apps/v1
kind: Deployment
metadata:
  name: governed-app
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: governed
  template:
    metadata:
      labels:
        app: governed
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: docker.io/agslima/app-stayhealthy-backend@sha256:1111111111111111111111111111111111111111111111111111111111111111
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
