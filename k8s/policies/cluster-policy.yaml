apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-governed-artifacts
  annotations:
    policies.kyverno.io/title: Enforce Governed Supply Chain (Prod)
    policies.kyverno.io/severity: critical
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30

  rules:
  # =====================================================================
  # Rule 1: Require Signed Image (Base Layer)
  # =====================================================================
  - name: require-image-signature
    match:
      resources:
        kinds: ["Pod", "Deployment"]
        namespaces: ["prod"]
    verifyImages:
      - imageReferences:
          - "docker.io/*/software-delivery-pipeline*" # Allow any org (***)
        attestors:
          - entries:
              - keyless:
                  issuer: https://token.actions.githubusercontent.com
                  # 🟢 FIX: Use permissive regex (matches your Debug step)
                  subjectRegExp: ".*"

  # =====================================================================
  # Rule 2: Require Trivy Attestation (Vulnerabilities)
  # =====================================================================
  - name: require-trivy-attestation
    match:
      resources:
        kinds: ["Pod", "Deployment"]
        namespaces: ["prod"]
    verifyImages:
      - imageReferences:
          - "docker.io/*/software-delivery-pipeline*"
        
        # 🟢 FIX: This block MUST be repeated here for Kyverno to trust the data
        attestors:
          - entries:
              - keyless:
                  issuer: https://token.actions.githubusercontent.com
                  subjectRegExp: ".*"

        attestations:
          - predicateType: https://security.sigstore.dev/attestations/vuln/trivy/v1
            conditions:
              - all:
                  - key: "{{ predicate.result }}"
                    operator: Equals
                    value: PASS
                  - key: "{{ predicate.scanner.name }}"
                    operator: Equals
                    value: trivy

  # =====================================================================
  # Rule 3: Require ZAP Attestation (DAST)
  # =====================================================================
  - name: require-zap-attestation
    match:
      resources:
        kinds: ["Pod", "Deployment"]
        namespaces: ["prod"]
    verifyImages:
      - imageReferences:
          - "docker.io/*/software-delivery-pipeline*"
        
        # 🟢 FIX: Repeated here as well
        attestors:
          - entries:
              - keyless:
                  issuer: https://token.actions.githubusercontent.com
                  subjectRegExp: ".*"

        attestations:
          - predicateType: https://security.sigstore.dev/attestations/dast/zap/v1
            conditions:
              - all:
                  - key: "{{ predicate.result }}"
                    operator: Equals
                    value: PASS

