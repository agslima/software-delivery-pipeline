# k8s/policies/cluster-policy.yaml
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-governed-artifacts
  annotations:
    policies.kyverno.io/title: Enforce Governed Supply Chain (Prod)
    policies.kyverno.io/severity: critical
    policies.kyverno.io/category: Supply Chain Security
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30

  rules:

  # -------------------------------------------------------------------
  # Rule 1: Require Signed Image
  # -------------------------------------------------------------------
  - name: require-image-signature
    match:
      resources:
        kinds: ["Pod"]
        namespaces: ["prod"]
    exclude:
      resources:
        selector:
          matchLabels:
            security.break-glass: "true"

    verifyImages:
      - imageReferences:
          - "docker.io/agslima/software-delivery-pipeline*"
        attestors:
          - entries:
              - keyless:
                  issuer: https://token.actions.githubusercontent.com
                  subjectRegExp: >
                    ^https://github.com/agslima/software-delivery-pipeline/.github/workflows/ci-cd.yml@refs/tags/v.*

  # -------------------------------------------------------------------
  # Rule 2: Require Trivy Attestation
  # -------------------------------------------------------------------
  - name: require-trivy-attestation
    match:
      resources:
        kinds: ["Pod"]
        namespaces: ["prod"]
    exclude:
      resources:
        selector:
          matchLabels:
            security.break-glass: "true"

    verifyImages:
      - imageReferences:
          - "docker.io/agslima/software-delivery-pipeline*"
        attestations:
          - predicateType: https://example.com/attestations/trivy/v1
            conditions:
              - all:
                  - key: "{{ result }}"
                    operator: Equals
                    value: PASS
                  - key: "{{ scanner.name }}"
                    operator: Equals
                    value: trivy
                  - key: "{{ summary.critical }}"
                    operator: LessThanOrEquals
                    value: 0
                  - key: "{{ summary.high }}"
                    operator: LessThanOrEquals
                    value: 5

  # -------------------------------------------------------------------
  # Rule 3: Require ZAP Attestation
  # -------------------------------------------------------------------
  - name: require-zap-attestation
    match:
      resources:
        kinds: ["Pod"]
        namespaces: ["prod"]
    exclude:
      resources:
        selector:
          matchLabels:
            security.break-glass: "true"

    verifyImages:
      - imageReferences:
          - "docker.io/agslima/software-delivery-pipeline*"
        attestations:
          - predicateType: https://example.com/attestations/zap/v1
            conditions:
              - all:
                  - key: "{{ result }}"
                    operator: Equals
                    value: PASS
                  - key: "{{ scanner.name }}"
                    operator: Equals
                    value: owasp-zap
                  - key: "{{ summary.high }}"
                    operator: LessThanOrEquals
                    value: 0