# k8s/policies/cluster-policy.yaml
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-governed-artifacts
  annotations:
    policies.kyverno.io/title: Enforce Governed Supply Chain (Prod)
    policies.kyverno.io/severity: critical
    policies.kyverno.io/category: Supply Chain Security
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30

  rules:

  # -------------------------------------------------------------------
  # Rule 1: Require Signed Image
  # -------------------------------------------------------------------
  - name: require-image-signature
    match:
      resources:
        kinds: ["Pod", "Deployment"]
        namespaces: ["prod"]
    exclude:
      resources:
        selector:
          matchLabels:
            security.break-glass: "true"

    verifyImages:
      - imageReferences:
          - "docker.io/agslima/software-delivery-pipeline*"
        attestors:
          - entries:
              - keyless:
                  issuer: https://token.actions.githubusercontent.com
                  subjectRegExp: >
                    ^https://github.com/agslima/software-delivery-pipeline/.github/workflows/ci-cd.yml@refs/tags/v.*

  # -------------------------------------------------------------------
  # Rule 2: Require Trivy Attestation
  # ------------------------------------------------------------------
  - name: require-trivy-attestation
    match:
      resources:
        kinds: ["Pod", "Deployment"]
        namespaces: ["prod"]
    exclude:
      resources:
        selector:
          matchLabels:
            security.break-glass: "true"

   verifyImages:
        - imageReferences:
            - "docker.io/agslima/software-delivery-pipeline*"
          attestations:
            - predicateType: https://security.sigstore.dev/attestations/vuln/trivy/v1
              conditions:
                - all:
                    - key: "{{ result }}"
                      operator: Equals
                      value: PASS
                    # Kyverno now correctly finds "scanner.name" at the root of the predicate
                    - key: "{{ scanner.name }}"
                      operator: Equals
                      value: trivy 
    

  # -------------------------------------------------------------------
  # Rule 3: Require ZAP Attestation
  # -------------------------------------------------------------------
  - name: require-zap-attestation
    match:
      resources:
        kinds: ["Pod", "Deployment"]
        namespaces: ["prod"]
    exclude:
      resources:
        selector:
          matchLabels:
            security.break-glass: "true"
    verifyImages:
        - imageReferences:
            - "docker.io/agslima/software-delivery-pipeline*"
          attestations:
            # MUST MATCH THE --type FLAG IN GITHUB ACTIONS
            - predicateType: https://security.sigstore.dev/attestations/dast/zap/v1
              conditions:
                - all:
                    - key: "{{ result }}"
                      operator: Equals
                      value: PASS

  # -------------------------------------------------------------------
  # Rule 4: Ban Mutable Tags (:latest)
  # -------------------------------------------------------------------
  - name: require-digest-pinned-images
    match:
      resources:
        kinds: ["Pod", "Deployment"]
      validate:
        message: "Images must be pinned by digest (@sha256:...)"
        pattern:
          spec:
            template:
              spec:
                containers:
                  - image: "*@sha256:*"
