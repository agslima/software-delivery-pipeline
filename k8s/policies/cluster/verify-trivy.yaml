apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-trivy
  annotations:
    policies.kyverno.io/title: Verify Trivy attestation
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: critical
spec:
  validationActions: [Deny]
  webhookConfiguration:
    timeoutSeconds: 30
  matchConstraints:
    resourceRules:
      - apiGroups: ['', 'apps']
        apiVersions: ['v1']
        operations: ['CREATE', 'UPDATE']
        resources: ['pods', 'deployments']
  matchImageReferences:
    - glob: "*/agslima/app-stayhealthy-backend*"
    - glob: "*/agslima/app-stayhealthy-worker*"
    - glob: "*/agslima/app-stayhealthy-frontend*"
  attestors:
    - name: trivyWorkflow
      cosign:
        keyless:
          identities:
            - issuer: "https://token.actions.githubusercontent.com"
              subjectRegExp: "^https://github\\.com/agslima/app-stayhealthy-pipeline/\\.github/workflows/release-trivy\\.yml@refs/tags/v.*$"
        ctlog:
          url: "https://rekor.sigstore.dev"
  attestations:
    - name: trivyScan
      intoto:
        type: "https://security.sigstore.dev/attestations/vuln/trivy/v1"
  validations:
    # ---------------------------------------------------------
    # 1. SIGNATURE VERIFICATIONS (Safely isolated by container type)
    # ---------------------------------------------------------
    - expression: >-
        !has(images.containers) || images.containers.map(image, verifyAttestationSignatures(image, attestations.trivyScan, [attestors.trivyWorkflow])).all(e, e > 0)
      message: "Signature verification failed: Standard containers must be attested by the release-trivy.yml pipeline."

    - expression: >-
        !has(images.initContainers) || images.initContainers.map(image, verifyAttestationSignatures(image, attestations.trivyScan, [attestors.trivyWorkflow])).all(e, e > 0)
      message: "Signature verification failed: Init containers must be attested by the release-trivy.yml pipeline."

    - expression: >-
        !has(images.ephemeralContainers) || images.ephemeralContainers.map(image, verifyAttestationSignatures(image, attestations.trivyScan, [attestors.trivyWorkflow])).all(e, e > 0)
      message: "Signature verification failed: Ephemeral containers must be attested by the release-trivy.yml pipeline."

    # ---------------------------------------------------------
    # 2. PAYLOAD VERIFICATIONS (Validating thresholds)
    # ---------------------------------------------------------
    - expression: >-
        !has(images.containers) || images.containers.all(image,
          extractPayload(image, attestations.trivyScan).scanner.name == "trivy" &&
          extractPayload(image, attestations.trivyScan).summary.critical == 0 &&
          extractPayload(image, attestations.trivyScan).summary.high <= 5 &&
          extractPayload(image, attestations.trivyScan).result == "PASS"
        )
      message: "Trivy payload validation failed for standard containers: Must report PASS with 0 critical and <= 5 high vulnerabilities."

    - expression: >-
        !has(images.initContainers) || images.initContainers.all(image,
          extractPayload(image, attestations.trivyScan).scanner.name == "trivy" &&
          extractPayload(image, attestations.trivyScan).summary.critical == 0 &&
          extractPayload(image, attestations.trivyScan).summary.high <= 5 &&
          extractPayload(image, attestations.trivyScan).result == "PASS"
        )
      message: "Trivy payload validation failed for init containers: Must report PASS with 0 critical and <= 5 high vulnerabilities."

    - expression: >-
        !has(images.ephemeralContainers) || images.ephemeralContainers.all(image,
          extractPayload(image, attestations.trivyScan).scanner.name == "trivy" &&
          extractPayload(image, attestations.trivyScan).summary.critical == 0 &&
          extractPayload(image, attestations.trivyScan).summary.high <= 5 &&
          extractPayload(image, attestations.trivyScan).result == "PASS"
        )
      message: "Trivy payload validation failed for ephemeral containers: Must report PASS with 0 critical and <= 5 high vulnerabilities."
