apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-trivy
  annotations:
    policies.kyverno.io/title: Verify Trivy attestation
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: critical
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30

  rules:
    - name: require-trivy-attestation
      match:
        any:
          - resources:
              kinds: ["Pod", "Deployment"]
              namespaces: ["prod", "production"]
      verifyImages:
        - imageReferences:
            - "index.docker.io/agslima/app-stayhealthy-backend@*"  
            - "docker.io/agslima/app-stayhealthy-backend@*"  
            - "index.docker.io/agslima/app-stayhealthy-worker@*"  
            - "docker.io/agslima/app-stayhealthy-worker@*"  
            - "index.docker.io/agslima/app-stayhealthy-frontend@*"  
            - "docker.io/agslima/app-stayhealthy-frontend@*"
          attestations:
            - predicateType: "https://security.sigstore.dev/attestations/vuln/trivy/v1"
              attestors:
                - entries:
                    - keyless:
                        issuer: "https://token.actions.githubusercontent.com"
                        subjectRegExp: >-
                          ^https://github.com/agslima/app-stayhealthy-pipeline/.github/workflows/release-trivy.yml@refs/tags/v.+$
                        rekor:
                          url: https://rekor.sigstore.dev
              conditions:
                - all:
                    - key: "{{ result || '' }}"
                      operator: Equals
                      value: "PASS"
