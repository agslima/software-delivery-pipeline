apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-trivy
  annotations:
    policies.kyverno.io/title: Verify Trivy attestation
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: critical
spec:
  validationActions: [Deny]
  webhookConfiguration:
    timeoutSeconds: 30

  matchConstraints:
    resourceRules:
      - apiGroups: ['', 'apps']
        apiVersions: ['v1']
        operations: ['CREATE', 'UPDATE']
        resources: ['pods', 'deployments']
  matchImageReferences:
    - glob: "*/agslima/app-stayhealthy-backend*"
    - glob: "*/agslima/app-stayhealthy-worker*"
    - glob: "*/agslima/app-stayhealthy-frontend*"
  attestors:
    - name: trivyWorkflow
      cosign:
        keyless:
          identities:
            - issuer: "https://token.actions.githubusercontent.com"
              subjectRegExp: "^https://github\\.com/agslima/app-stayhealthy-pipeline/\\.github/workflows/release-trivy\\.yml@refs/tags/v.*$"
        ctlog:
          url: "https://rekor.sigstore.dev"
  attestations:
    - name: trivyScan
      intoto:
        type: "https://security.sigstore.dev/attestations/vuln/trivy/v1"

  validations:
    # 1. Verify the cryptographic signature of the Trivy attestation
    - expression: >-
        images.containers.map(image, verifyAttestationSignatures(image, attestations.trivyScan, [attestors.trivyWorkflow])).all(e, e > 0)
      message: "Failed to verify Trivy attestation signature. Image must be scanned and attested by the release-trivy.yml pipeline."
    # 2. Extract the payload and verify the scan result equals PASS
    - expression: >-
        images.containers.all(image, 
          extractPayload(image, attestations.trivyScan).result == "PASS"
        )
      message: "Trivy vulnerability scan validation failed: The attestation payload did not report a 'PASS' result."
