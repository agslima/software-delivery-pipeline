apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-trivy
  annotations:
    policies.kyverno.io/title: Verify Trivy attestation
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: critical
spec:
  validationActions: [Deny]
  webhookConfiguration:
    timeoutSeconds: 30

  matchConstraints:
    resourceRules:
      - apiGroups: ['', 'apps']
        apiVersions: ['v1']
        operations: ['CREATE', 'UPDATE']
        resources: ['pods', 'deployments']
  matchImageReferences:
    - glob: "*/agslima/app-stayhealthy-backend*"
    - glob: "*/agslima/app-stayhealthy-worker*"
    - glob: "*/agslima/app-stayhealthy-frontend*"
  attestors:
    - name: trivyWorkflow
      cosign:
        keyless:
          identities:
            - issuer: "https://token.actions.githubusercontent.com"
              subjectRegExp: "^https://github\\.com/agslima/app-stayhealthy-pipeline/\\.github/workflows/release-trivy\\.yml@refs/tags/v.*$"
        ctlog:
          url: "https://rekor.sigstore.dev"
  attestations:
    - name: trivyScan
      intoto:
        type: "https://security.sigstore.dev/attestations/vuln/trivy/v1"
  validations:
    - expression: >-
        (images.containers + images.initContainers + images.ephemeralContainers).map(image, verifyAttestationSignatures(image, attestations.trivyScan, [attestors.trivyWorkflow])).all(e, e > 0)
      message: "Failed to verify Trivy attestation signature. All images (including init and ephemeral) must be scanned and attested by the release-trivy.yml pipeline."
    - expression: >-
        (images.containers + images.initContainers + images.ephemeralContainers).all(image,
          let payload = extractPayload(image, attestations.trivyScan);
          payload != null &&
          payload.scanner != null &&
          payload.scanner.name == "trivy" &&
          payload.summary != null &&
          payload.summary.critical == 0 &&
          payload.summary.high <= 5 &&
          payload.result == "PASS"
        )
      message: "Trivy vulnerability scan validation failed: The attestation payload did not report a 'PASS' result for one or more containers."
