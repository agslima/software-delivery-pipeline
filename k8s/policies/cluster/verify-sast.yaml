apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-static-risk
  annotations:
    policies.kyverno.io/title: Verify Static Risk attestation
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: critical
spec:
  validationActions: [Deny]
  webhookConfiguration:
    timeoutSeconds: 30
  matchConstraints:
    resourceRules:
      - apiGroups: ['', 'apps']
        apiVersions: ['v1']
        operations: ['CREATE', 'UPDATE']
        resources: ['pods', 'deployments']
  matchImageReferences:
    - glob: "*/agslima/app-stayhealthy-backend*"
    - glob: "*/agslima/app-stayhealthy-worker*"
    - glob: "*/agslima/app-stayhealthy-frontend*"
  attestors:
    - name: staticWorkflow
      cosign:
        keyless:
          identities:
            - issuer: "https://token.actions.githubusercontent.com"
              subjectRegExp: "^https://github\\.com/agslima/app-stayhealthy-pipeline/\\.github/workflows/release-static-risk\\.yml@refs/tags/v.*$"
        ctlog:
          url: "https://rekor.sigstore.dev"
  attestations:
    - name: trivyScan
      intoto:
        type: "https://security.sigstore.dev/attestations/vuln/trivy/v1"
  validations:
    # ---------------------------------------------------------
    # 1. SIGNATURE VERIFICATIONS
    # ---------------------------------------------------------
    - expression: >-
        !has(images.containers) || images.containers.map(image, verifyAttestationSignatures(image, attestations.trivyScan, [attestors.staticWorkflow])).all(e, e > 0)
      message: "Signature verification failed: Standard containers must be attested by the release-static-risk.yml pipeline."

    - expression: >-
        !has(images.initContainers) || images.initContainers.map(image, verifyAttestationSignatures(image, attestations.trivyScan, [attestors.staticWorkflow])).all(e, e > 0)
      message: "Signature verification failed: Init containers must be attested by the release-static-risk.yml pipeline."

    - expression: >-
        !has(images.ephemeralContainers) || images.ephemeralContainers.map(image, verifyAttestationSignatures(image, attestations.trivyScan, [attestors.staticWorkflow])).all(e, e > 0)
      message: "Signature verification failed: Ephemeral containers must be attested by the release-static-risk.yml pipeline."

    # ---------------------------------------------------------
    # 2. PAYLOAD VERIFICATIONS
    # ---------------------------------------------------------
    - expression: >-
        !has(images.containers) || images.containers.all(image,
          extractPayload(image, attestations.trivyScan).predicate.scanner.name == "static-risk-profile" &&
          extractPayload(image, attestations.trivyScan).predicate.policy.engine == "opa" &&
          extractPayload(image, attestations.trivyScan).predicate.policy.allow == true &&
          extractPayload(image, attestations.trivyScan).predicate.evidence.schema_version == "release.security_evidence.v1" &&
          extractPayload(image, attestations.trivyScan).predicate.result == "PASS"
        )
      message: "Static risk payload validation failed for standard containers: OPA must allow normalized Trivy/CodeQL/VEX evidence."

    - expression: >-
        !has(images.initContainers) || images.initContainers.all(image,
          extractPayload(image, attestations.trivyScan).predicate.scanner.name == "static-risk-profile" &&
          extractPayload(image, attestations.trivyScan).predicate.policy.engine == "opa" &&
          extractPayload(image, attestations.trivyScan).predicate.policy.allow == true &&
          extractPayload(image, attestations.trivyScan).predicate.evidence.schema_version == "release.security_evidence.v1" &&
          extractPayload(image, attestations.trivyScan).predicate.result == "PASS"
        )
      message: "Static risk payload validation failed for init containers: OPA must allow normalized Trivy/CodeQL/VEX evidence."

    - expression: >-
        !has(images.ephemeralContainers) || images.ephemeralContainers.all(image,
          extractPayload(image, attestations.trivyScan).predicate.scanner.name == "static-risk-profile" &&
          extractPayload(image, attestations.trivyScan).predicate.policy.engine == "opa" &&
          extractPayload(image, attestations.trivyScan).predicate.policy.allow == true &&
          extractPayload(image, attestations.trivyScan).predicate.evidence.schema_version == "release.security_evidence.v1" &&
          extractPayload(image, attestations.trivyScan).predicate.result == "PASS"
        )
      message: "Static risk payload validation failed for ephemeral containers: OPA must allow normalized Trivy/CodeQL/VEX evidence."
