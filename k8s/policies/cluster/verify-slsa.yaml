apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-slsa
  annotations:
    policies.kyverno.io/title: Verify SLSA provenance attestation
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: critical
spec:
  validationActions: [Deny]
  webhookConfiguration:
    timeoutSeconds: 30
  matchConstraints:
    resourceRules:
      - apiGroups: ['', 'apps']
        apiVersions: ['v1']
        operations: ['CREATE', 'UPDATE']
        resources: ['pods', 'deployments']
  matchImageReferences:
    - glob: "*/agslima/app-stayhealthy-backend*"
    - glob: "*/agslima/app-stayhealthy-frontend*"
    - glob: "*/agslima/app-stayhealthy-worker*"
  attestors:
    - name: deliveryPipeline
      cosign:
        keyless:
          identities:
            - issuer: "https://token.actions.githubusercontent.com"
              subjectRegExp: "^https://github\\.com/agslima/software-delivery-pipeline/\\.github/workflows/release-build-push-dual-registry\\.yml@refs/tags/v.*$"
        ctlog:
          url: "https://rekor.sigstore.dev"
  attestations:
    - name: slsaProvenanceV1
      intoto:
        # Targeting the modern SLSA v1 schema
        type: "https://slsa.dev/provenance/v1"
  validations:
    - expression: >-
        images.containers.map(image, verifyAttestationSignatures(image, attestations.slsaProvenanceV1, [attestors.deliveryPipeline])).all(e, e > 0)
      message: "Failed to verify SLSA provenance attestation. Image must be built and attested by the central software-delivery-pipeline."
