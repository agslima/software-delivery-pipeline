apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-slsa
  annotations:
    policies.kyverno.io/title: Verify SLSA provenance attestation
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: critical
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30

  rules:
    - name: require-slsa-provenance
      match:
        any:
          - resources:
              kinds: ["Pod", "Deployment"]
              namespaces: ["prod", "production"]
      verifyImages:
        - imageReferences:
            - "index.docker.io/agslima/app-stayhealthy-backend@*"  
            - "docker.io/agslima/app-stayhealthy-backend@*"  
            - "index.docker.io/agslima/app-stayhealthy-worker@*"  
            - "docker.io/agslima/app-stayhealthy-worker@*"  
            - "index.docker.io/agslima/app-stayhealthy-frontend@*"  
            - "docker.io/agslima/app-stayhealthy-frontend@*"

          attestations:
            - predicateType: "https://slsa.dev/provenance/v1"
              attestors:
                - entries:
                    - keyless:
                        issuer: "https://token.actions.githubusercontent.com"
                        subjectRegExp: >-
                          ^https://github.com/agslima/software-delivery-pipeline/.github/workflows/ci-release-gate\.yml@refs/tags/v.*$
                        rekor:
                          url: https://rekor.sigstore.dev
