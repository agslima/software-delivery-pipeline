apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-slsa
  annotations:
    policies.kyverno.io/title: Verify SLSA provenance attestation
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: critical
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: require-slsa-provenance
      match:
        any:
          - resources:
              kinds: ["Pod", "Deployment"]
              namespaces: ["prod", "production"]
      verifyImages:
        - imageReferences:
            - "index.docker.io/agslima/app-stayhealthy-*"
          failureAction: Enforce
          attestations:
            - predicateType: "https://slsa.dev/provenance/v1"
              attestors:
                - entries:
                    - keyless:
                        issuer: "https://token.actions.githubusercontent.com"
                        subject: "https://github.com/slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@refs/tags/v*"
                        rekor:
                          url: "https://rekor.sigstore.dev"
              conditions:
                - all:
                    - key: "{{ payload.predicate.buildDefinition.externalParameters.source.uri }}"
                      operator: AnyIn
                      value: 
                        - "git+https://github.com/agslima/software-delivery-pipeline"
                        - "https://github.com/agslima/software-delivery-pipeline"
