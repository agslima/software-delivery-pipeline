apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-zap
  annotations:
    policies.kyverno.io/title: Verify ZAP attestation
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: critical
spec:
  validationActions: [Deny]
  webhookConfiguration:
    timeoutSeconds: 30
  matchConstraints:
    resourceRules:
      - apiGroups: ['', 'apps']
        apiVersions: ['v1']
        operations: ['CREATE', 'UPDATE']
        resources: ['pods', 'deployments']
  matchImageReferences:
    - glob: "*/agslima/app-stayhealthy-backend*"
    - glob: "*/agslima/app-stayhealthy-worker*"
    - glob: "*/agslima/app-stayhealthy-frontend*"
  attestors:
    - name: zapWorkflow
      cosign:
        keyless:
          identities:
            - issuer: "https://token.actions.githubusercontent.com"
              subjectRegExp: "^https://github\\.com/agslima/app-stayhealthy-pipeline/\\.github/workflows/release-dast\\.yml@refs/tags/v.*$"
        ctlog:
          url: "https://rekor.sigstore.dev"
  attestations:
    - name: zapScan
      intoto:
        type: "https://security.sigstore.dev/attestations/dast/zap/v1"
  validations:
    - expression: >-
        images.containers.map(image, verifyAttestationSignatures(image, attestations.zapScan, [attestors.zapWorkflow])).all(e, e > 0) &&
        images.initContainers.map(image, verifyAttestationSignatures(image, attestations.zapScan, [attestors.zapWorkflow])).all(e, e > 0) &&
        images.ephemeralContainers.map(image, verifyAttestationSignatures(image, attestations.zapScan, [attestors.zapWorkflow])).all(e, e > 0)
      message: "Failed to verify ZAP attestation signature. All images (including init and ephemeral) must be scanned and attested by the release-dast.yml pipeline."
    
    # 2. Extract the payload and verify the scan result and scanner name across all container types
    - expression: >-
        images.containers.all(image,
          let payload = extractPayload(image, attestations.zapScan);
          payload.result != null &&
          payload.scanner != null &&
          payload.scanner.name == "owasp-zap" &&
          payload.result == "PASS"
        ) &&
        images.initContainers.all(image,
          let payload = extractPayload(image, attestations.zapScan);
          payload.result != null &&
          payload.scanner != null &&
          payload.scanner.name == "owasp-zap" &&
          payload.result == "PASS"
        ) &&
        images.ephemeralContainers.all(image,
          let payload = extractPayload(image, attestations.zapScan);
          payload.result != null &&
          payload.scanner != null &&
          payload.scanner.name == "owasp-zap" &&
          payload.result == "PASS"
        )
      message: "ZAP DAST validation failed: The attestation payload did not report a 'PASS' result from the 'owasp-zap' scanner for one or more containers."
