apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-signature
spec:
  validationActions: [Deny] 
  webhookConfiguration:
    timeoutSeconds: 30
  matchConstraints:
    resourceRules:
      - apiGroups: ['', 'apps']
        apiVersions: ['v1']
        operations: ['CREATE', 'UPDATE']
        resources: ['pods', 'deployments']
  matchImageReferences:
    - glob: "*/agslima/app-stayhealthy-backend*"
    - glob: "*/agslima/app-stayhealthy-worker*"
    - glob: "*/agslima/app-stayhealthy-frontend*"
  attestors:
    - name: githubActions
      cosign:
        keyless:
          identities:
            - issuer: "https://token.actions.githubusercontent.com"
              subjectRegExp: "^https://github\\.com/agslima/app-stayhealthy-pipeline/\\.github/workflows/release-build-push-dual-registry\\.yml@refs/tags/v.*$"
        ctlog:
          url: "https://rekor.sigstore.dev"
  validations:
    - expression: >-
        (images.containers + images.initContainers + images.ephemeralContainers).map(image, verifyImageSignatures(image, [attestors.githubActions])).all(e, e > 0)
      message: "Failed image signature verification. All images (including init and ephemeral) must be signed by the StayHealthy CI pipeline."
