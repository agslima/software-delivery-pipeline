apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: break-glass-admission-controls
  annotations:
    policies.kyverno.io/title: Break-glass PolicyException Controls
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: critical
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: policy-exception-must-use-dedicated-namespace
      match:
        any:
          - resources:
              kinds: ["PolicyException"]
      validate:
        message: "Break-glass PolicyException objects must live in the policy-exceptions namespace."
        pattern:
          metadata:
            namespace: policy-exceptions

    - name: policy-exception-requires-metadata
      match:
        any:
          - resources:
              kinds: ["PolicyException"]
      validate:
        message: >
          Break-glass PolicyException objects require annotations:
          security.break-glass/ticket, security.break-glass/requested-by,
          security.break-glass/approved-by, security.break-glass/expires-at (RFC3339).
        deny:
          conditions:
            any:
              - key: "{{ request.object.metadata.annotations.\"security.break-glass/ticket\" || '' }}"
                operator: Equals
                value: ""
              - key: "{{ request.object.metadata.annotations.\"security.break-glass/requested-by\" || '' }}"
                operator: Equals
                value: ""
              - key: "{{ request.object.metadata.annotations.\"security.break-glass/approved-by\" || '' }}"
                operator: Equals
                value: ""
              - key: "{{ request.object.metadata.annotations.\"security.break-glass/expires-at\" || '' }}"
                operator: Equals
                value: ""

    - name: policy-exception-requires-controlled-approval
      match:
        any:
          - resources:
              kinds: ["PolicyException"]
      context:
        - name: approvalRecords
          apiCall:
            urlPath: "/api/v1/namespaces/policy-exceptions/configmaps?labelSelector=security.break-glass%2Fexception-name={{ request.object.metadata.name }}"
            jmesPath: "items"
      validate:
        message: >
          Break-glass PolicyException objects require a matching controller-managed
          approval record in the policy-exceptions namespace. The verified approval
          record must match the PolicyException annotations
          security.break-glass/ticket, security.break-glass/requested-by, and
          security.break-glass/approved-by.
        deny:
          conditions:
            any:
              - key: "{{ regex_match('^(INC|CHG)-[0-9]+$', request.object.metadata.annotations.\"security.break-glass/ticket\" || '') }}"
                operator: Equals
                value: false
              - key: "{{ approvalRecords | length(@) }}"
                operator: NotEquals
                value: 1
              - key: "{{ approvalRecords[0].metadata.labels.\"security.break-glass/verified\" || '' }}"
                operator: NotEquals
                value: "true"
              - key: "{{ approvalRecords[0].data.exceptionName || '' }}"
                operator: NotEquals
                value: "{{ request.object.metadata.name || '' }}"
              - key: "{{ approvalRecords[0].data.ticket || '' }}"
                operator: NotEquals
                value: "{{ request.object.metadata.annotations.\"security.break-glass/ticket\" || '' }}"
              - key: "{{ approvalRecords[0].data.requestedBy || '' }}"
                operator: NotEquals
                value: "{{ request.object.metadata.annotations.\"security.break-glass/requested-by\" || '' }}"
              - key: "{{ approvalRecords[0].data.approvedBy || '' }}"
                operator: NotEquals
                value: "{{ request.object.metadata.annotations.\"security.break-glass/approved-by\" || '' }}"
              - key: "{{ regex_match('^(platform-oncall|repository-administrator)$', approvalRecords[0].data.approvedBy || '') }}"
                operator: Equals
                value: false
              - key: "{{ approvalRecords[0].data.requestedBy || '' }}"
                operator: Equals
                value: "{{ approvalRecords[0].data.approvedBy || '' }}"

    - name: policy-exception-must-not-be-expired
      match:
        any:
          - resources:
              kinds: ["PolicyException"]
      validate:
        message: "Break-glass PolicyException expires-at must be in the future (RFC3339)."
        deny:
          conditions:
            any:
              - key: "{{ time_after(time_now_utc(), request.object.metadata.annotations.\"security.break-glass/expires-at\") }}"
                operator: Equals
                value: true

    - name: policy-exception-must-disable-background
      match:
        any:
          - resources:
              kinds: ["PolicyException"]
      validate:
        message: "Break-glass PolicyException objects must set spec.background=false."
        pattern:
          spec:
            background: false

    - name: policy-exception-must-target-approved-policies
      match:
        any:
          - resources:
              kinds: ["PolicyException"]
      validate:
        message: >
          Break-glass PolicyException objects may only target the split cluster
          verify-* policies.
        foreach:
          - list: "request.object.spec.exceptions"
            deny:
              conditions:
                any:
                  - key: "{{ regex_match('^(verify-signature|verify-trivy|verify-zap|verify-sbom|verify-slsa)$', element.policyName || '') }}"
                    operator: Equals
                    value: false
