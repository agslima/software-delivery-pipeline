apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-sbom
  annotations:
    policies.kyverno.io/title: Verify SBOM attestation (SPDX)
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: critical
spec:
  validationActions: [Deny]
  webhookConfiguration:
    timeoutSeconds: 30

  # Standard Kubernetes Admission matching
  matchConstraints:
    resourceRules:
      - apiGroups: ['', 'apps']
        apiVersions: ['v1']
        operations: ['CREATE', 'UPDATE']
        resources: ['pods', 'deployments']
  matchImageReferences:
    - glob: "*/agslima/app-stayhealthy-backend*"
    - glob: "*/agslima/app-stayhealthy-worker*"
    - glob: "*/agslima/app-stayhealthy-frontend*"

  attestors:
    - name: githubActions
      cosign:
        keyless:
          identities:
            - issuer: "https://token.actions.githubusercontent.com"
              subjectRegExp: "^https://github\\.com/agslima/app-stayhealthy-pipeline/\\.github/workflows/release-build-push-dual-registry\\.yml@refs/tags/v.*$"
        ctlog:
          url: "https://rekor.sigstore.dev"
  attestations:
    - name: spdxSbom
      intoto:
        type: "https://spdx.dev/Document"
  validations:
    - expression: >-
        images.containers.map(image, verifyAttestationSignatures(image, attestations.spdxSbom, [attestors.githubActions])).all(e, e > 0)
      message: "Failed to verify SPDX SBOM attestation. Image must have an attached SBOM signed by the StayHealthy CI pipeline."
