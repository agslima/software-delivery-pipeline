# k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: software-delivery-pipeline
  namespace: prod
  labels:
    app: software-delivery-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: software-delivery-pipeline
  template:
    metadata:
      labels:
        app: software-delivery-pipeline
    spec:
      # Pod-Level Security Context
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers: 
      - name: app 
        image: docker.io/agslima/software-delivery-pipeline@sha256:ffb9ea7520e9419a82af9aac9e4bed874387a7e149b582e30e27e9ec812c3db2

        imagePullPolicy: Always
        
        ports:
        - containerPort: 3000
        
        # Container Sandbox
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]

        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
            ephemeral-storage: "500Mi"
          limits:
            memory: "128Mi"
            cpu: "500m"
            ephemeral-storage: "1Gi"
        
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 3000
          initialDelaySeconds: 15 
          periodSeconds: 20
          
        readinessProbe::
          httpGet:
            path: /api/v1/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
      
      volumes:
      - name: tmp-volume
        emptyDir: {}

