apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-governed-artifacts
  annotations:
    policies.kyverno.io/title: Enforce Governed Supply Chain (Prod)
    policies.kyverno.io/severity: critical
    policies.kyverno.io/description: >
      Enforces signed images and clean scans. 
      Includes a 'break-glass' exclusion for emergencies.
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  rules:

  # -------------------------------------------------------------------------
  # Rule 1: Enforce Image Signature
  # -------------------------------------------------------------------------
  - name: require-signed-image
    match:
      resources:
        kinds: ["Pod"]
    # BREAK GLASS MECHANISM -------------------------
    exclude:
      resources:
        selector:
          matchLabels:
            security.break-glass: "true"
    # -----------------------------------------------
    verifyImages:
      - imageReferences:
          - "docker.io/agslima/software-delivery-pipeline*"
        attestors:
          - entries:
              - keyless:
                  issuer: https://token.actions.githubusercontent.com
                  subjectRegExp: "^https://github.com/agslima/secure-app-analysis/.github/workflows/ci-cd.yml@refs/tags/v.*"

  # -------------------------------------------------------------------------
  # Rule 2: Require SLSA Build Provenance (v1)
  # -------------------------------------------------------------------------
  - name: require-build-provenance
    match:
      resources:
        kinds: ["Pod"]
    # BREAK GLASS MECHANISM -------------------------
    exclude:
      resources:
        selector:
          matchLabels:
            security.break-glass: "true"
    # -----------------------------------------------
    verifyImages:
      - imageReferences:
          - "docker.io/agslima/software-delivery-pipeline*"
        attestations:
          - predicateType: https://slsa.dev/provenance/v1
            conditions:
              - all:
                  - key: "{{ builder.id }}"
                    operator: Equals
                    value: https://github.com/actions/runner

  # -------------------------------------------------------------------------
  # Rule 3: Require SBOM
  # -------------------------------------------------------------------------
  - name: require-sbom
    match:
      resources:
        kinds: ["Pod"]
    # BREAK GLASS MECHANISM -------------------------
    exclude:
      resources:
        selector:
          matchLabels:
            security.break-glass: "true"
    # -----------------------------------------------
    verifyImages:
      - imageReferences:
          - "docker.io/agslima/software-delivery-pipeline*"
        attestations:
          - predicateType: https://spdx.dev/Document
            conditions:
              - all:
                  - key: "{{ metadata.spdxVersion }}"
                    operator: Regex
                    value: "SPDX-2.*"

  # -------------------------------------------------------------------------
  # Rule 4: Vulnerability Thresholds
  # -------------------------------------------------------------------------
  - name: require-vulnerability-scan
    match:
      resources:
        kinds: ["Pod"]
    # BREAK GLASS MECHANISM -------------------------
    exclude:
      resources:
        selector:
          matchLabels:
            security.break-glass: "true"
    # -----------------------------------------------
    verifyImages:
      - imageReferences:
          - "docker.io/agslima/software-delivery-pipeline*"
        attestations:
          - predicateType: vulns 
            conditions:
              - all:
                  - key: "{{ scanner.uri }}"
                    operator: Regex
                    value: ".*trivy.*"
                  
                  # CRITICAL: Zero Tolerance
                  - key: "{{ summary.critical }}"
                    operator: LessThanOrEquals
                    value: 0
                  
                  # HIGH: Realistic Tolerance (<= 5)
                  # Allows for upstream delays while catching major issues.
                  - key: "{{ summary.high }}"
                    operator: LessThanOrEquals
                    value: 5
