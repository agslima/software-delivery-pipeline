version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "ci"
      - "dependencies"

  # 2. Backend Dependencies
  # Looks for package.json in the backend folder
  - package-ecosystem: "npm"
    directory: "/app/server"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "nodejs"
      - "backend"

  # 3. Backend Dependencies
  # Looks for package.json in the backend folder
  - package-ecosystem: "npm"
    directory: "/app/client"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "nodejs"
      - "frontend"

  # 4. Docker Base Image
  - package-ecosystem: "docker"
    directory: "app/docker"
    schedule:
      interval: "monthly"
    labels:
      - "backend"
      - "docker"
      - "frontend"

  
