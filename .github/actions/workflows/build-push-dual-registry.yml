name: Build and Push Dual Registry

permissions:
  contents: read

defaults:
  run:
    shell: bash

###################################################################
#                                                                 #
#            Input and output argument definitions                #
#                                                                 #
###################################################################
on:
  workflow_call:
    secrets:
    
inputs:
  component_name:
    description: 'Matrix component name (e.g., backend)'
    required: true
  context:
    description: 'Build context path'
    required: true
  file:
    description: 'Dockerfile path'
    required: true
  image_repo:
    description: 'Base image repository name'
    required: true
  release_tag:
    description: 'Release tag for image'
    required: true
  github_sha:
    description: 'Commit SHA'
    required: true
  dockerhub_username:
    description: 'Docker Hub username'
    required: true
  dockerhub_token:
    description: 'Docker Hub access token'
    required: true
  ghcr_username:
    description: 'GitHub Username/Repository Owner'
    required: true
  ghcr_token:
    description: 'GitHub Token for GHCR authentication'
    required: true
  platforms:
    description: 'Container platforms'
    required: true
  signature-repository:
    description: 'Repository to storage all signatures'
    required: false
outputs:
      image-digest:
        description: "sha256 digest of container image"
        value: ${{ jobs.publish.outputs.image-digest }}

env:
  # disable harden runner
  STEP_SECURITY_HARDEN_RUNNER: ${{ vars.disable_harden_runner }}

jobs:
  publish:
    permissions:
      contents: read
      packages: write # Used to push images to `ghcr.io` if used.
      id-token: write # Needed to create an OIDC token for keyless signing
    runs-on: ubuntu-24.04
    outputs:  
      image-digest: ${{ steps.image.outputs.digest }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        if: ${{ vars.disable_harden_runner != 'true' }}
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
    - name: Install Cosign
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003
    - name: Login to Docker Hub
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_token }}
    - name: Login to GitHub Container Registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
      with:
        registry: ghcr.io
        username: ${{ inputs.ghcr_username }}
        password: ${{ inputs.ghcr_token }}
    - name: Set up build args for container image
      run: |
        echo "GIT_COMMIT=${GITHUB_SHA}" >> $GITHUB_ENV
        if git describe --exact-match --tags HEAD >/dev/null 2>&1; then
          echo "GIT_TAG=$(git describe --tags)" >> $GITHUB_ENV
        else
          echo "GIT_TAG=" >> $GITHUB_ENV
        fi
        if [ -z "$(git status --porcelain)" ]; then
          echo "GIT_TREE_STATE=clean" >> $GITHUB_ENV
        else
          echo "GIT_TREE_STATE=dirty" >> $GITHUB_ENV
        fi
        echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
        
    - name: Build & Push
      id: build
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.file }}
        push: true
        pull: true
        platforms: ${{ inputs.platforms }}
        no-cache: true
        provenance: false
        sbom: false
        labels: |
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
          org.opencontainers.image.version=${{ inputs.release_tag }}
        build-args: |
          GIT_TAG=${{env.GIT_TAG}}
          GIT_COMMIT=${{env.GIT_COMMIT}}
          BUILD_DATE=${{env.BUILD_DATE}}
          GIT_TREE_STATE=${{env.GIT_TREE_STATE}}
        tags: |
          docker.io/${{ inputs.dockerhub_username }}/${{ inputs.image_repo }}:${{ inputs.release_tag }}
          docker.io/${{ inputs.dockerhub_username }}/${{ inputs.image_repo }}:${{ github.sha }}
          ghcr.io/${{ github.repository_owner }}/${{ inputs.image_repo }}:${{ inputs.release_tag }}
          ghcr.io/${{ github.repository_owner }}/${{ inputs.image_repo }}:${{ github.sha }}
    - name: Export Digest Artifact
      run: |
        set -euo pipefail
        mkdir -p digests
        # Grab the digest directly from the build step output
        DIGEST="${{ steps.build.outputs.digest }}"
        test -n "$DIGEST" || (echo "::error::Digest empty"; exit 1)
        echo "$DIGEST" > "digests/digest-${{ inputs.component_name }}"
        # Export to GITHUB_ENV so subsequent steps can use it natively
        echo "IMAGE_DIGEST=$DIGEST" >> $GITHUB_ENV
    - name: Upload Digest Artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: digest-${{ inputs.component_name }}
        path: digests/digest-${{ inputs.component_name }}
        retention-days: 30
    - name: Prepare image references
      run: |
        set -euo pipefail
        echo "DOCKERHUB_IMAGE=docker.io/${{ inputs.dockerhub_username }}/${{ inputs.image_repo }}@${{ env.IMAGE_DIGEST }}" >> $GITHUB_ENV
        echo "GHCR_IMAGE=ghcr.io/${{ github.repository_owner }}/${{ inputs.image_repo }}@${{ env.IMAGE_DIGEST }}" >> $GITHUB_ENV
    - name: Sign Images with Cosign
      run: |
          set -euo pipefail
          echo "Signing starts: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "Signing DockerHub image: $DOCKERHUB_IMAGE"
          cosign sign --yes \
            --verbose \
            -a "repo=${{ github.repository }}" \
            -a "workflow=${{ github.workflow }}" \
            -a "workflow_ref=${{ github.workflow_ref }}" \
            -a "ref=${{ github.sha }}" \
            "$DOCKERHUB_IMAGE"
            
          echo "Signing GHCR image: $GHCR_IMAGE"
          cosign sign --yes \
            --verbose \
            -a "repo=${{ github.repository }}" \
            -a "workflow=${{ github.workflow }}" \
            -a "workflow_ref=${{ github.workflow_ref }}" \
            -a "ref=${{ github.sha }}" \
            "$GHCR_IMAGE"
            
          echo "Signing finished: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
