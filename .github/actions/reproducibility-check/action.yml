name: 'Reproducibility Build Check'
description: 'Runs a deterministic double-build to verify OCI manifest reproducibility.'
author: 'PE'

inputs:
  image-name:
    description: 'Target name for the image (e.g., app-stayhealthy-backend)'
    required: true
  dockerfile-path:
    description: 'Path to the Dockerfile'
    required: true
    default: 'Dockerfile'
  build-context:
    description: 'Path to the build context'
    required: true
    default: '.'
  release-tag:
    description: 'Release tag to inject as VERSION'
    required: true
  source-url:
    description: 'Repository URL for provenance'
    required: true
  report-script-path:
    description: 'Path to the Python reproducibility report script'
    required: true
    default: 'scripts/supply-chain/report-reproducibility-pilot.py'
  allow-mismatch:
    description: 'Set to "true" for a soft-gate pilot, "false" to fail the build on digest mismatch'
    required: false
    default: 'true'

runs:
  using: "composite"
  steps:
    - name: Calculate Deterministic Timestamps
      id: timestamps
      shell: bash
      env:
        GITHUB_SHA: ${{ github.sha }}
      run: |
        set -euo pipefail

        # Extract the Git commit timestamp for SOURCE_DATE_EPOCH
        COMMIT_TIMESTAMP=$(git log -1 --format=%ct ${GITHUB_SHA})
        # Validate that COMMIT_TIMESTAMP is numeric
        if ! [[ "$COMMIT_TIMESTAMP" =~ ^[0-9]+$ ]]; then
          echo "::error::Invalid commit timestamp: $COMMIT_TIMESTAMP"
          exit 1
        fi
        echo "source_date_epoch=$COMMIT_TIMESTAMP" >> "$GITHUB_OUTPUT"
        
        # Format the timestamp for BUILD_DATE in ISO 8601 format
        BUILD_DATE_ISO=$(python3 - <<EOF
          from datetime import datetime, UTC
          print(datetime.fromtimestamp(${COMMIT_TIMESTAMP}, UTC).strftime('%Y-%m-%dT%H:%M:%SZ'))
        EOF)
        echo "build_date_iso=$BUILD_DATE_ISO" >> "$GITHUB_OUTPUT"

    - name: Audit Break-Glass Status
      id: audit
      shell: bash
      env:
        ALLOW_MISMATCH: ${{ inputs.allow-mismatch }}
      run: |
        set -euo pipefail

        if [ "${ALLOW_MISMATCH}" == "true" ]; then
          echo "::warning title=SECURITY OVERRIDE ACTIVATED::The reproducibility hard gate has been bypassed via manual emergency override. This release is no longer guaranteed deterministic."
          
          # Add a "tainted" or "emergency" label to the final Docker image.
          echo "image_tainted=true" >> "$GITHUB_OUTPUT"
        else
          echo "Standard enforcement mode active. Reproducibility gate is enforced."
          echo "image_tainted=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Run reproducible builds (${{ inputs.image-name }})
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        DOCKERFILE_PATH: ${{ inputs.dockerfile-path }}
        BUILD_CONTEXT: ${{ inputs.build-context }}
        RELEASE_TAG: ${{ inputs.release-tag }}
        SOURCE_URL: ${{ inputs.source-url }}
        GITHUB_SHA: ${{ github.sha }}
        SOURCE_DATE_EPOCH: ${{ steps.timestamps.outputs.source_date_epoch }}
        BUILD_DATE_ISO: ${{ steps.timestamps.outputs.build_date_iso }}
        IMAGE_TAINTED: ${{ steps.audit.outputs.image_tainted }}
      run: |
        set -euo pipefail

        export TZ=UTC
        export LANG=C.UTF-8
        export LC_ALL=C.UTF-8
        
        [[ -f "${DOCKERFILE_PATH}" ]] || exit 1
        [[ -d "${BUILD_CONTEXT}" ]] || exit 1
        
        # Isolate artifacts per image to prevent collisions in matrix builds
        ARTIFACT_DIR="artifacts/repro-${IMAGE_NAME}"
        mkdir -p "${ARTIFACT_DIR}"

        build_once() {
          local output_file="$1"
          echo "Building with epoch: $SOURCE_DATE_EPOCH"
          echo "Tainted status: $IMAGE_TAINTED"
          
          docker buildx build \
            --platform linux/amd64 \
            --file "${DOCKERFILE_PATH}" \
            --no-cache \
            --provenance=false \
            --sbom=false \
            --build-arg BUILD_DATE="${BUILD_DATE_ISO}" \
            --build-arg SOURCE_DATE_EPOCH="${SOURCE_DATE_EPOCH}" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg VERSION="${RELEASE_TAG}" \
            --build-arg SOURCE="${SOURCE_URL}" \
            --output "type=oci,dest=${output_file},rewrite-timestamp=true" \
            "${BUILD_CONTEXT}"
        }

        echo "Executing Build 1..."
        build_once "${ARTIFACT_DIR}/run-1.oci.tar"
        
        echo "Executing Build 2..."
        build_once "${ARTIFACT_DIR}/run-2.oci.tar"

        echo "Generating SHA256 digests..."

        sha256sum "${ARTIFACT_DIR}/run-1.oci.tar" \
          > "${ARTIFACT_DIR}/run-1.sha256"

        sha256sum "${ARTIFACT_DIR}/run-2.oci.tar" \
          > "${ARTIFACT_DIR}/run-2.sha256"

    - name: Compare OCI outputs
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        ALLOW_MISMATCH: ${{ inputs.allow-mismatch }}
        REPORT_SCRIPT_PATH: ${{ inputs.report-script-path }}
      run: |
        set -euo pipefail
        
        [[ -f "${REPORT_SCRIPT_PATH}" ]] || exit 1

        ARTIFACT_DIR="artifacts/repro-${IMAGE_NAME}"
        
        # Conditionally apply the mismatch flag
        ARGS=()

        if [ "${ALLOW_MISMATCH}" = "true" ]; then
          ARGS+=(--allow-mismatch)
        fi

        python3 "${REPORT_SCRIPT_PATH}" \
          --image-name "${IMAGE_NAME}" \
          --first-archive "${ARTIFACT_DIR}/run-1.oci.tar" \
          --second-archive "${ARTIFACT_DIR}/run-2.oci.tar" \
          --output-dir "${ARTIFACT_DIR}" \
          "${ARGS[@]}"

    - name: Upload evidence artifact
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: reproducibility-evidence-${{ inputs.image-name }}
        path: artifacts/repro-${{ inputs.image-name }}/
        retention-days: 30
