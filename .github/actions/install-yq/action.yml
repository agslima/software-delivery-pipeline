name: 'Install Secure yq'
description: 'Downloads yq for Linux amd64 and verifies SHA-256 checksum before installing.'

inputs:
  version:
    description: 'The semantic version of yq to install (e.g., v4.46.3)'
    required: true
    default: 'v4.46.3'

runs:
  using: composite
  steps:
    - name: Download, verify, and install
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        YQ_BIN="yq_linux_amd64"
        BASE_URL="https://github.com/mikefarah/yq/releases/download/${VERSION}"
        YQ_BIN_URL="${BASE_URL}/${YQ_BIN}"
        YQ_CHECKSUMS_URL="${BASE_URL}/checksums"

        TMP_DIR="$(mktemp -d)"
        trap 'rm -rf "$TMP_DIR"' EXIT

        echo "⬇️ Downloading yq ${VERSION}..."
        curl --proto '=https' --tlsv1.2 -fsSL "$YQ_BIN_URL" -o "${TMP_DIR}/${YQ_BIN}"
        curl --proto '=https' --tlsv1.2 -fsSL "$YQ_CHECKSUMS_URL" | tr -d '\r' > "${TMP_DIR}/checksums"

        echo "🔍 Verifying binary checksum..."
        MATCH_COUNT="$(grep -Ec "[[:space:]]+\\*?(\\./)?${YQ_BIN}\$" "${TMP_DIR}/checksums")"
        [ "$MATCH_COUNT" -eq 1 ] || { echo "::error::Expected exactly one checksum entry for ${YQ_BIN}"; exit 1; }

        grep -E "[[:space:]]+\\*?(\\./)?${YQ_BIN}\$" "${TMP_DIR}/checksums" > "${TMP_DIR}/${YQ_BIN}.sha256"

        (
          cd "$TMP_DIR"
          sha256sum -c "${YQ_BIN}.sha256"
        )

        mkdir -p "$HOME/.local/bin"
        install -m 0755 "${TMP_DIR}/${YQ_BIN}" "$HOME/.local/bin/yq"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

        echo "✅ Installed:"
        yq --version
