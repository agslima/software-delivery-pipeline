name: 'Install Secure yq'
description: 'Downloads and installs yq with strict cryptographic checksum verification against a trusted, pinned hash.'

inputs:
  version:
    description: 'The semantic version of yq to install (e.g., v4.44.3)'
    required: true
    default: 'v4.44.3'
  expected_sha256:
    description: 'The pinned, trusted SHA256 checksum of the yq binary'
    required: true

runs:
  using: "composite"
  steps:
    - name: Download, Verify, and Install
      shell: bash
      run: |
        set -euo pipefail
        
        # Assign input to a variable for safer handling
        VERSION="${{ inputs.version }}"
        
        YQ_BIN_URL="https://github.com/mikefarah/yq/releases/download/${VERSION}/yq_linux_amd64"
        YQ_CHECKSUMS_URL="https://github.com/mikefarah/yq/releases/download/${VERSION}/checksums"
        
        TMP_DIR="$(mktemp -d)"
        trap 'rm -rf "$TMP_DIR"' EXIT

        echo "⬇️ Downloading yq ${VERSION} and checksums..."
        curl -fsSL "$YQ_BIN_URL" -o "${TMP_DIR}/yq_linux_amd64"
        curl -fsSL "$YQ_CHECKSUMS_URL" | tr -d '\r' > "${TMP_DIR}/checksums"

        echo "🔍 Verifying binary signature..."
        grep -E '[[:space:]]+\*?(\./)?yq_linux_amd64$' "${TMP_DIR}/checksums" > "${TMP_DIR}/yq_linux_amd64.sha256" \
          || { echo "::error::yq checksum entry missing for ${VERSION}"; exit 1; }

        (
          cd "$TMP_DIR"
          sha256sum -c yq_linux_amd64.sha256
        )

        echo "📦 Installing to /usr/local/bin/yq..."
        sudo install -m 0755 "${TMP_DIR}/yq_linux_amd64" /usr/local/bin/yq
        
        echo "✅ Installation successful:"
        yq --version
        
