name: 'Verify Signatures and Attestations'
description: 'Cryptographically verifies Cosign signatures, SBOM, Trivy, ZAP, and SLSA attestations for a given container image.'

inputs:
  image:
    description: 'The fully qualified container image URI (e.g., docker.io/user/repo@sha256:...)'
    required: true
  release-ref:
    description: 'The GitHub ref of the release (e.g., refs/tags/v1.0.0)'
    required: true
  release-tag:
    description: 'The release tag (e.g., v1.0.0)'
    required: true
  build-workflow-path:
    description: 'Path to the build workflow'
    required: true
  trivy-workflow-path:
    description: 'Path to the Trivy workflow'
    required: true
  zap-workflow-path:
    description: 'Path to the ZAP workflow'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Verify Image Security Policies
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        RELEASE_REF: ${{ inputs.release-ref }}
        RELEASE_TAG: ${{ inputs.release-tag }}
        BUILD_PATH: ${{ inputs.build-workflow-path }}
        TRIVY_PATH: ${{ inputs.trivy-workflow-path }}
        ZAP_PATH: ${{ inputs.zap-workflow-path }}
      run: |
        set -euo pipefail

        # Standardizing repo string for regex
        REPO_PREFIX="^https://github.com/${{ github.repository }}"
        TAG_REGEX="@refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$"
        OIDC_ISSUE="https://token.actions.githubusercontent.com"
      
        echo "🔐 Verifying signature for $IMAGE"
        cosign verify "$IMAGE" \
          --certificate-oidc-issuer "${OIDC_ISSUE}" \
          --certificate-identity-regexp "${REPO_PREFIX}/${BUILD_PATH}${TAG_REGEX}"
        
        echo "🧾 Verifying SBOM attestation..."
        cosign verify-attestation "$IMAGE" \
          --type "https://spdx.dev/Document" \
          --certificate-oidc-issuer "${OIDC_ISSUE}" \
          --certificate-identity-regexp "${REPO_PREFIX}/${BUILD_PATH}${TAG_REGEX}" \
          > /dev/null

        echo "🧾 Verifying Trivy attestation..."
        cosign verify-attestation "$IMAGE" \
          --type "https://security.sigstore.dev/attestations/vuln/trivy/v1" \
          --certificate-oidc-issuer "${OIDC_ISSUE}" \
          --certificate-identity-regexp "${REPO_PREFIX}/${TRIVY_PATH}${TAG_REGEX}" \
          > /dev/null

        echo "🧾 Verifying ZAP attestation..."
        cosign verify-attestation "$IMAGE" \
          --type "https://security.sigstore.dev/attestations/dast/zap/v1" \
          --certificate-oidc-issuer "${OIDC_ISSUE}" \
          --certificate-identity-regexp "${REPO_PREFIX}/${ZAP_PATH}${TAG_REGEX}" \
          > /dev/null

        echo "🧾 Verifying SLSA provenance attestation identity..."
        cosign verify-attestation "$IMAGE" \
          --type "https://slsa.dev/provenance/v1" \
          --certificate-oidc-issuer "${OIDC_ISSUE}" \
          --certificate-identity-regexp "${REPO_PREFIX}/${BUILD_PATH}${TAG_REGEX}" \
          > /dev/null

        echo "🔎 Verifying SLSA builder/source expectations..."
        slsa-verifier verify-image "$IMAGE" \
          --builder-id "https://github.com/slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml" \
          --source-uri "github.com/${{ github.repository }}" \
          --source-tag "$RELEASE_TAG" >> "$GITHUB_STEP_SUMMARY"

        echo "✅ All signatures & attestations verified for $IMAGE."
