name: "OPA Supply Chain Policy"

description: "Evaluate supply chain risk using versioned OPA policies"

inputs:
  evidence-file:
    required: true
    description: "Path to evidence file (JSON) containing context and findings"
  policy-bundle:
    required: true
    description: "Path to policy bundle (e.g., policy/bundles/v1)"
  threshold:
    required: true
    description: "Threshold for risk score"
  exposure:
    required: true
    description: "Exposure level"
  criticality:
    required: true
    description: "Criticality level"
  environment-tier:
    required: false
    default: "production"
    description: "Runtime environment tier for policy context"
  release-channel:
    required: false
    default: "stable"
    description: "Release channel for policy context"
  image-repo:
    required: false
    default: ""
    description: "Image repository name for evidence context"
  image-digest:
    required: false
    default: ""
    description: "Image digest for evidence context"

outputs:
  decision:
    description: "OPA release decision: allow or deny"
    value: ${{ steps.eval.outputs.decision }}
  risk_score:
    description: "OPA-calculated risk score"
    value: ${{ steps.risk.outputs.risk_score }}

runs:
  using: "composite"
  steps:
    - name: Install OPA
      uses: ./.github/actions/install-opa
      with:
        version: 'v1.16.2'
    - name: Prepare Input
      env:
        EXPOSURE: ${{ inputs.exposure }}
        CRITICALITY: ${{ inputs.criticality }}
        THRESHOLD: ${{ inputs.threshold }}
        EVIDENCE_FILE: ${{ inputs.evidence-file }}
        ENVIRONMENT_TIER: ${{ inputs.environment-tier }}
        RELEASE_CHANNEL: ${{ inputs.release-channel }}
        IMAGE_REPO: ${{ inputs.image-repo }}
        IMAGE_DIGEST: ${{ inputs.image-digest }}
      shell: bash
      run: |
        set -euo pipefail
        jq \
          --arg exposure "${EXPOSURE}" \
          --arg criticality "${CRITICALITY}" \
          --arg environment_tier "${ENVIRONMENT_TIER}" \
          --arg release_channel "${RELEASE_CHANNEL}" \
          --arg image_repo "${IMAGE_REPO}" \
          --arg image_digest "${IMAGE_DIGEST}" \
          --argjson threshold "${THRESHOLD}" \
          '
          .context = ((.context // {}) + {
              exposure: $exposure,
              criticality: $criticality,
              environment_tier: $environment_tier,
              release_channel: $release_channel
            }) |
          .policy = ((.policy // {}) + {
              threshold: $threshold
            }) |
          .asset = ((.asset // {}) + {
              image_repo: $image_repo,
              image_digest: $image_digest
            })
          ' "${EVIDENCE_FILE}" > enriched.json
    - name: Evaluate Policy
      id: eval
      env:
        POLICY_BUNDLE: ${{ inputs.policy-bundle }}
      shell: bash
      run: |
        set -euo pipefail

        RESULT=$(opa eval \
          --format=json \
          --input enriched.json \
          --data "${POLICY_BUNDLE}" \
          "data.supplychain")

        echo "$RESULT" > decision.json
        echo "$RESULT"

        ALLOW=$(jq -r '.result[0].expressions[0].value.allow // false' decision.json)
        if [[ "$ALLOW" = "true" ]]; then
          echo "decision=allow" >> $GITHUB_OUTPUT
        else
          echo "decision=deny" >> $GITHUB_OUTPUT
        fi
    - name: Extract Risk Score
      id: risk
      env:
        POLICY_BUNDLE: ${{ inputs.policy-bundle }}
      shell: bash
      run: |
        set -euo pipefail
        SCORE=$(opa eval \
          --format=raw \
          --input enriched.json \
          --data "${POLICY_BUNDLE}" \
          "data.supplychain.risk_score")

        echo "risk_score=$SCORE" >> $GITHUB_OUTPUT
    - name: Fail if Denied
      shell: bash
      run: |
        set -euo pipefail

        if [[ "${{ steps.eval.outputs.decision }}" = "deny" ]]; then
          echo "::error::Policy denied"
          exit 1
        fi
