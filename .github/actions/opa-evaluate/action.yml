name: "OPA Supply Chain Policy"

description: "Evaluate supply chain risk using versioned OPA policies"

inputs:
  evidence-file:
    required: true
  policy-bundle:
    required: true
    description: "Path to policy bundle (e.g., policy/bundles/v1)"
  threshold:
    required: true
  exposure:
    required: true
  criticality:
    required: true

outputs:
  decision:
    description: "allow or deny"
  risk_score:
    description: "calculated risk score"

runs:
  using: "composite"
  steps:
    - name: Install OPA
      shell: bash
      run: |
        curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
        chmod +x opa
        sudo mv opa /usr/local/bin/

    - name: Prepare Input
      shell: bash
      run: |
        jq \
          --arg exposure "${{ inputs.exposure }}" \
          --arg criticality "${{ inputs.criticality }}" \
          --argjson threshold "${{ inputs.threshold }}" \
          '
          . + {
            context: {
              exposure: $exposure,
              criticality: $criticality
            },
            policy: {
              threshold: $threshold
            }
          }
          ' "${{ inputs.evidence-file }}" > enriched.json

    - name: Evaluate Policy
      id: eval
      shell: bash
      run: |
        set -euo pipefail

        RESULT=$(opa eval \
          --format=json \
          --input enriched.json \
          --data "${{ inputs.policy-bundle }}" \
          "data.supplychain")

        echo "$RESULT" > decision.json
        echo "$RESULT"

        if echo "$RESULT" | grep -q '"allow": true'; then
          echo "decision=allow" >> $GITHUB_OUTPUT
        else
          echo "decision=deny" >> $GITHUB_OUTPUT
        fi

    - name: Extract Risk Score
      id: risk
      shell: bash
      run: |
        SCORE=$(opa eval \
          --format=raw \
          --input enriched.json \
          --data "${{ inputs.policy-bundle }}" \
          "data.supplychain.risk_score")

        echo "risk_score=$SCORE" >> $GITHUB_OUTPUT

    - name: Fail if Denied
      shell: bash
      run: |
        if [ "${{ steps.eval.outputs.decision }}" = "deny" ]; then
          echo "::error::Policy denied"
          exit 1
        fi
