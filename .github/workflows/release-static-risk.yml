name: Release - Static Risk Profile & Attest

permissions:
  contents: read
defaults:
  run:
    shell: bash
on:
  workflow_call:
    secrets:      
      ghcr_token:
        description: 'GitHub Token for GHCR authentication'
        required: true
      dockerhub_token:
        description: 'Docker Hub access token'
        required: true
    inputs:
      ghcr_username:
        description: 'GitHub Username/Repository Owner'
        required: true
        type: string
      dockerhub_username:
        description: 'Docker Hub username'
        required: true
        type: string
      image-digest-backend:
        description: 'Backend image digest (sha256:...)'
        required: true
        type: string
      image-digest-frontend:
        description: 'Frontend image digest (sha256:...)'
        required: true
        type: string
      image-digest-worker:
        description: 'Worker image digest (sha256:...)'
        required: true
        type: string
      sast-policy-version:
        description: 'Release SAST/supply-chain OPA policy version'
        required: false
        type: string
        default: 'v2'
      risk-threshold:
        description: 'OPA risk threshold for release gating'
        required: false
        type: number
        default: 20
      environment-tier:
        description: 'Environment tier used by release risk policy'
        required: false
        type: string
        default: 'production'
      release-channel:
        description: 'Release channel used by release risk policy'
        required: false
        type: string
        default: 'stable'

jobs:
  codeql-release-analysis:
    name: CodeQL Release Analysis
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: javascript-typescript
          build-mode: none
      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          category: release-static-risk
          upload: never
          output: codeql-results
      - name: Validate CodeQL SARIF
        run: |
          set -euo pipefail
          CODEQL_FILE="$(find codeql-results -type f \( -name '*.sarif' -o -name '*.json' \) | sort | head -n 1 || true)"
          test -n "$CODEQL_FILE" || { echo "::error::CodeQL SARIF output not found"; exit 1; }
          test -s "$CODEQL_FILE" || { echo "::error::CodeQL SARIF output is empty"; exit 1; }
          jq -e '(.runs? // []) | type == "array"' "$CODEQL_FILE" >/dev/null
          cp "$CODEQL_FILE" codeql-release.sarif
      - name: Upload CodeQL SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codeql-release-sarif
          path: codeql-release.sarif

  static-risk-scan:
    name: Static Risk Profile
    timeout-minutes: 15
    needs: [ codeql-release-analysis ]
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image_repo: app-stayhealthy-backend
            image-digest: ${{ inputs.image-digest-backend }}
            exposure: public
            criticality: high            
          - name: worker
            image_repo: app-stayhealthy-worker
            image-digest: ${{ inputs.image-digest-worker }}
            exposure: internal
            criticality: medium
          - name: frontend
            image_repo: app-stayhealthy-frontend
            image-digest: ${{ inputs.image-digest-frontend }}
            exposure: public
            criticality: medium
    env:
      DOCKER_USERNAME: ${{ inputs.dockerhub_username }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.70.0
          cache: false
      - name: Docker Hub Login  
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0  
        with:  
          username: ${{ inputs.dockerhub_username }}  
          password: ${{ secrets.dockerhub_token }}  
      - name: Scan Image (JSON)
        run: |
          set -euo pipefail
    
          IMAGE="docker.io/${DOCKER_USERNAME}/${{ matrix.image_repo }}@${{ matrix.image-digest }}"
          docker manifest inspect "$IMAGE" >/dev/null 2>&1 \
            || { echo "::error::Image not found (digest check failed)"; exit 1; }

          echo "Scanning $IMAGE"
          trivy image \
            --format json \
            --output "trivy-${{ matrix.name }}.json" \
            "$IMAGE"
          
          # Explicit output checks (fail closed)
          test -s "trivy-${{ matrix.name }}.json" || (echo "::error::Trivy JSON missing/empty"; exit 1)
          jq -e '.Results? | type=="array"' "trivy-${{ matrix.name }}.json" >/dev/null
      - name: Upload Trivy Scan Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-results-${{ matrix.name }}
          path: trivy-${{ matrix.name }}.json
      - name: Download CodeQL SARIF artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codeql-release-sarif
          path: static-risk-inputs/codeql
      # That generates a conservative VEX document that assumes all discovered CVEs 
      # are "affected" with no suppressions or mitigations.
      # The OPA step has a complete view of the potential vulnerabilities, 
      # This prevent any known vulnerabilities from being overlooked.
      - name: Generate conservative VEX assertions
        run: |
          set -euo pipefail
          mkdir -p static-risk-inputs/vex
          jq '
            {
              metadata: {
                author: "release-static-risk.yml",
                role: "conservative release VEX baseline",
                generated_at: (now | todate)
              },
              vulnerabilities: (
                [
                  .Results[]? |
                  (.Vulnerabilities // [])[] |
                  {
                    id: .VulnerabilityID,
                    status: "affected",
                    justification: "no_release_vex_suppression",
                    source: "trivy-image-scan"
                  }
                ]
                | unique_by(.id)
              )
            }
          ' "trivy-${{ matrix.name }}.json" > "vex-${{ matrix.name }}.json"
          jq -e '.vulnerabilities | type == "array"' "vex-${{ matrix.name }}.json" >/dev/null
      - name: Normalize static risk evidence
        run: |
          set -euo pipefail
          mkdir -p static-risk-inputs/codeql static-risk-inputs/vex

          CODEQL_FILE="$(find static-risk-inputs/codeql -type f \( -name '*.sarif' -o -name '*.json' \) | sort | head -n 1 || true)"
          VEX_FILE="vex-${{ matrix.name }}.json"
          test -n "$CODEQL_FILE" || { echo "::error::CodeQL SARIF artifact missing"; exit 1; }
          test -s "$CODEQL_FILE" || { echo "::error::CodeQL SARIF artifact empty"; exit 1; }
          test -s "$VEX_FILE" || { echo "::error::VEX JSON missing/empty"; exit 1; }

          bash scripts/security/release/sast-build-evidence.sh \
            "trivy-${{ matrix.name }}.json" \
            "$CODEQL_FILE" \
            "$VEX_FILE" \
            "security-evidence-${{ matrix.name }}.json"
      - name: Evaluate static risk policy
        id: opa
        continue-on-error: true
        uses: ./.github/actions/opa-evaluate/static-risk-release
        with:
          evidence-file: security-evidence-${{ matrix.name }}.json
          policy-bundle: policies/release/${{ inputs.sast-policy-version }}.sast-supplychain.rego
          threshold: ${{ inputs.risk-threshold }}
          exposure: ${{ matrix.exposure }}
          criticality: ${{ matrix.criticality }}
          environment-tier: ${{ inputs.environment-tier }}
          release-channel: ${{ inputs.release-channel }}
          image-repo: ${{ matrix.image_repo }}
          image-digest: ${{ matrix.image-digest }}
      - name: Preserve static risk decision artifacts
        if: always()
        run: |
          set -euo pipefail
          cp enriched.json "security-evidence-enriched-${{ matrix.name }}.json"
          cp decision.json "opa-decision-${{ matrix.name }}.json"
      - name: Upload static risk artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: static-risk-results-${{ matrix.name }}
          path: |
            security-evidence-${{ matrix.name }}.json
            security-evidence-enriched-${{ matrix.name }}.json
            opa-decision-${{ matrix.name }}.json
            vex-${{ matrix.name }}.json
      - name: Fail if static risk policy denied
        if: steps.opa.outputs.decision == 'deny'
        run: exit 1
      - name: Summarize static risk decision
        run: |
          set -euo pipefail
          echo "OPA decision=${{ steps.opa.outputs.decision }} risk_score=${{ steps.opa.outputs.risk_score }}"
          
  attest-static-risk-results:
    name: Attest Static Risk Results with Cosign
    timeout-minutes: 10
    if: success()  # Ensure all scans passed
    runs-on: ubuntu-latest
    needs: [ static-risk-scan ]
    permissions:
      contents: read
      id-token: write # For OIDC auth with Cosign
      packages: write # For GHCR package metadata updates (optional)
    env:
      DOCKER_USERNAME: ${{ inputs.dockerhub_username }}
      TRIVY_VERSION: v0.70.0 # Needed in the attestation predicate
      TRIVY_PREDICATE_TYPE: "https://security.sigstore.dev/attestations/vuln/trivy/v1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image_repo: app-stayhealthy-backend
            image-digest: ${{ inputs.image-digest-backend }}
            exposure: public
            criticality: high
          - name: worker
            image_repo: app-stayhealthy-worker
            image-digest: ${{ inputs.image-digest-worker }}
            exposure: internal
            criticality: medium
          - name: frontend
            image_repo: app-stayhealthy-frontend
            image-digest: ${{ inputs.image-digest-frontend }}
            exposure: public
            criticality: medium
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 #v4.1.2
      - name: Docker Hub Login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ inputs.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}
      - name: GHCR Login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0  
        with:  
          registry: ghcr.io  
          username: ${{ inputs.ghcr_username }}  
          password: ${{ secrets.ghcr_token }} 
      - name: Download Trivy scan artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: trivy-results-${{ matrix.name }}
          path: trivy-downloads
      - name: Download static risk artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: static-risk-results-${{ matrix.name }}
          path: static-risk-downloads
      - name: Read Digest
        run: |
          set -euo pipefail
          DIGEST="${{ matrix.image-digest }}"
          cat <<EOF >> "$GITHUB_ENV"
          DIGEST=$DIGEST
          DOCKER_IMAGE=docker.io/${DOCKER_USERNAME}/${{ matrix.image_repo }}@${DIGEST}
          GHCR_IMAGE=ghcr.io/${{ inputs.ghcr_username }}/${{ matrix.image_repo }}@${DIGEST}
          EOF
      - name: Create static risk attestation predicate
        uses: ./.github/actions/security-gate/create-static-risk-attestation-predicate
        with:
          decision-file: static-risk-downloads/opa-decision-${{ matrix.name }}.json
          evidence-file: static-risk-downloads/security-evidence-enriched-${{ matrix.name }}.json
          image-digest: ${{ matrix.image-digest }}
          image-repo: ${{ matrix.image_repo }}
          exposure: ${{ matrix.exposure }}
          criticality: ${{ matrix.criticality }}
          policy-version: ${{ inputs.sast-policy-version }}
          trivy-version: ${{ env.TRIVY_VERSION }}
          output-file: sast-attestation-${{ matrix.name }}.json
      - name: Static Risk Attestations
        run: |
          set -euo pipefail
          echo "Signing starts: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          IMAGES=("$DOCKER_IMAGE" "$GHCR_IMAGE")
          FAILURES=()
          for IMAGE in "${IMAGES[@]}"; do
            echo "Attest image: $IMAGE"
            if cosign attest --yes \
              --predicate sast-attestation-${{ matrix.name }}.json \
              --type "$TRIVY_PREDICATE_TYPE" \
              "$IMAGE"; then
              echo "✅ Attested: $IMAGE"
            else
              FAILURES+=("$IMAGE")
            fi
          done
          if [[ ${#FAILURES[@]} -gt 0 ]]; then
            echo "::error::Failed to attest: ${FAILURES[*]}"
            exit 1
          fi
          echo "Attestation finished: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
