name: Build and Push Dual Registry

permissions:
  contents: read
  
defaults:
  run:
    shell: bash
    
on:
  workflow_call:
    secrets:
      ghcr_username:
        description: 'GitHub Username/Repository Owner'
        required: true
      ghcr_token:
        description: 'GitHub Token for GHCR authentication'
        required: true
      dockerhub_username:
        description: 'Docker Hub username'
        required: true
      dockerhub_token:
        description: 'Docker Hub access token'
        required: true
    
    inputs:
      context:
        description: 'Build context path'
        required: true
        type: string
      file:
        description: 'Dockerfile path'
        required: true
        type: string
      image_repo:
        description: 'Base image repository name'
        required: true
        type: string
      digest_artifact_name:
        description: 'Digest artifact suffix; defaults to image_repo when omitted'
        required: false
        type: string
        default: ''
      release_tag:
        description: 'Release tag for image'
        required: true
        type: string
      github_sha:
        description: 'Commit SHA'
        required: true
        type: string
      platforms:
        description: 'Container platforms'
        required: true
        type: string
      environment:
        description: 'Target GitHub environment for the build job (optional; use for environment context/protection)'
        required: false
        type: string
        default: production
      sbom-repository:
        description: 'Container registry repository for SBOM artifacts (e.g. ghcr.io/owner/sbom)'
        required: true
        type: string
      signature-repository:
        description: 'Container registry repository for signature artifacts (e.g. ghcr.io/owner/signatures)'
        required: true
        type: string
    outputs:
      image-digest:
        description: "sha256 digest of container image"
        value: ${{ jobs.build-publish.outputs.image-digest }}

jobs:
  build-publish:
    permissions:
      contents: read
      packages: write # Used to push images to `ghcr.io` if used.
      id-token: write # Needed to create an OIDC token for keyless signing
    # This job uses the caller-provided GitHub environment value.
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-24.04
    outputs:  
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.github_sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ secrets.ghcr_username }}
          password: ${{ secrets.ghcr_token }}
      - name: Set up build args for container image
        run: |
          echo "GIT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          if git describe --exact-match --tags HEAD >/dev/null 2>&1; then
            echo "GIT_TAG=$(git describe --tags)" >> $GITHUB_ENV
          else
            echo "GIT_TAG=" >> $GITHUB_ENV
          fi
          if [ -z "$(git status --porcelain)" ]; then
            echo "GIT_TREE_STATE=clean" >> $GITHUB_ENV
          else
            echo "GIT_TREE_STATE=dirty" >> $GITHUB_ENV
          fi
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
          
      - name: Build & Push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          platforms: ${{ inputs.platforms }}
          push: true
          pull: true
          no-cache: true
          # SLSA provenance is generated by the dedicated release-gate jobs.
          provenance: false
          sbom: false
          labels: |
            org.opencontainers.image.revision=${{ inputs.github_sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.release_tag }}
          build-args: |
            GIT_TAG=${{ env.GIT_TAG }}
            GIT_COMMIT=${{ env.GIT_COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            GIT_TREE_STATE=${{ env.GIT_TREE_STATE }}
          tags: |
            docker.io/${{ secrets.dockerhub_username }}/${{ inputs.image_repo }}:${{ inputs.release_tag }}
            docker.io/${{ secrets.dockerhub_username }}/${{ inputs.image_repo }}:${{ inputs.github_sha }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_repo }}:${{ inputs.release_tag }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_repo }}:${{ inputs.github_sha }}
      - name: Export Digest Artifact
        run: |
          set -euo pipefail
          mkdir -p digests
          DIGEST_ARTIFACT_NAME="${{ inputs.digest_artifact_name || inputs.image_repo }}"
          # Grab the digest directly from the build step output
          DIGEST="${{ steps.build.outputs.digest }}"
          test -n "$DIGEST" || (echo "::error::Digest empty"; exit 1)
          echo "$DIGEST" > "digests/digest-${DIGEST_ARTIFACT_NAME}"
          # Export to GITHUB_ENV so subsequent steps can use it natively
          echo "IMAGE_DIGEST=$DIGEST" >> $GITHUB_ENV
      - name: Prepare image references
        run: |
          set -euo pipefail
          echo "DOCKERHUB_IMAGE=docker.io/${{ secrets.dockerhub_username }}/${{ inputs.image_repo }}@${{ env.IMAGE_DIGEST }}" >> $GITHUB_ENV
          echo "GHCR_IMAGE=ghcr.io/${{ github.repository_owner }}/${{ inputs.image_repo }}@${{ env.IMAGE_DIGEST }}" >> $GITHUB_ENV
      - name: Sign Images with Cosign
        run: |
            set -euo pipefail

            echo "Signing starts: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Signing DockerHub image: $DOCKERHUB_IMAGE"
            export COSIGN_REPOSITORY="${{ inputs.signature-repository }}"
            COSIGN_EXPERIMENTAL=1 \
            cosign sign --yes \
              --verbose \
              -a "repo=${{ github.repository }}" \
              -a "workflow=${{ github.workflow }}" \
              -a "workflow_ref=${{ github.workflow_ref }}" \
              -a "ref=${{ inputs.github_sha }}" \
              "$DOCKERHUB_IMAGE"
              
            echo "Signing GHCR image: $GHCR_IMAGE"
            cosign sign --yes \
              --verbose \
              -a "repo=${{ github.repository }}" \
              -a "workflow=${{ github.workflow }}" \
              -a "workflow_ref=${{ github.workflow_ref }}" \
              -a "ref=${{ inputs.github_sha }}" \
              "$GHCR_IMAGE"
              
            echo "Signing finished: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            
      - name: Upload Digest Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: digest-${{ inputs.digest_artifact_name || inputs.image_repo }}
          path: digests/digest-${{ inputs.digest_artifact_name || inputs.image_repo }}
          retention-days: 30
          
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          # Targets the GHCR image to generate the SBOM (since digests match, the SBOM is identical)
          image: "ghcr.io/${{ github.repository_owner }}/${{ inputs.image_repo }}@${{ env.IMAGE_DIGEST }}"
          format: spdx-json
          output-file: sbom-${{ inputs.image_repo }}.spdx.json
          artifact-name: sbom-${{ inputs.image_repo }}.spdx.json
          upload-artifact: true
          upload-release-assets: auto
            
      - name: Cosign SBOM attestation
        env:
          COSIGN_REPOSITORY: ${{ inputs.sbom-repository }}
        run: |
          # Define both registry targets that share the exact same image digest
          IMAGES=(
            "ghcr.io/${{ github.repository_owner }}/${{ inputs.image_repo }}@${{ env.IMAGE_DIGEST }}"
            "docker.io/${{ secrets.dockerhub_username }}/${{ inputs.image_repo }}@${{ env.IMAGE_DIGEST }}"
          )
          for IMAGE in "${IMAGES[@]}"; do
            echo "Attesting SBOM to $IMAGE"
            cosign attest \
              --yes \
              --predicate "sbom-${{ inputs.image_repo }}.spdx.json" \
              --type spdxjson \
              "$IMAGE"
          done
