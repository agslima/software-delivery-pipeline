name: Release - Build and Push Dual Registry

permissions:
  contents: read
  
defaults:
  run:
    shell: bash
    
on:
  workflow_call:
    secrets:      
      ghcr_token:
        description: 'GitHub Token for GHCR authentication'
        required: true      
      dockerhub_token:
        description: 'Docker Hub access token'
        required: true
    inputs:
      context:
        description: 'Build context path'
        required: true
        type: string
      file:
        description: 'Dockerfile path'
        required: true
        type: string
      image_repo:
        description: 'Base image repository name'
        required: true
        type: string
      release_tag:
        description: 'Release tag for image'
        required: true
        type: string
      github_sha:
        description: 'Commit SHA'
        required: true
        type: string
      platforms:
        description: 'Container platforms'
        required: true
        type: string
      environment:
        description: 'Target GitHub environment for the build job (optional; use for environment context/protection)'
        required: false
        type: string
        default: production
      ghcr_username:
        description: 'GitHub Username/Repository Owner'
        required: true
        type: string
      dockerhub_username:
        description: 'Docker Hub username'
        required: true
        type: string
    outputs:
      image-digest:
        description: "sha256 digest of container image"
        value: ${{ jobs.build-publish.outputs.image-digest }}
      
jobs:
  # ---------------------------------------------------------
  # JOB 1: Untrusted Data Plane (Build Execution)
  # ---------------------------------------------------------
  build-publish:
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write # Used to push images to `ghcr.io`
    runs-on: ubuntu-latest
    env:
      CONTEXT: ${{ inputs.context }}
      FILE: ${{ inputs.file }}
      IMAGE_REPO: ${{ inputs.image_repo }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      PLATFORMS: ${{ inputs.platforms }}
      GITHUB_SHA: ${{ inputs.github_sha }}
      DOCKER_USERNAME: ${{ inputs.dockerhub_username }}
    outputs:  
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit # change to block later 
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.GITHUB_SHA }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v2.5.0
        with:
          # Forces the use of an isolated container for the build environment
          driver: docker-container
          # buildx-stable-1 v0.29.0
          driver-opts: |
            image=moby/buildkit@sha256:e5d9d1763945ca186d48cbf5b0ff3e062eb917fb8a80da6da87144edb7320a90
          buildkitd-flags: ""
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ inputs.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ inputs.ghcr_username }}
          password: ${{ secrets.ghcr_token }}
      - name: Extract build metadata
        id: build-meta
        run: |
          echo "GIT_TREE_STATE=$(if [ -z "$(git status --porcelain)" ]; then echo "clean"; else echo "dirty"; fi)" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          # Automatically generate tags for both GHCR and Docker.
          images: |
            docker.io/${{ inputs.dockerhub_username }}/${{ env.IMAGE_REPO}}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_REPO }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }},enable=${{ env.RELEASE_TAG != '' }}
            type=raw,value=${{ env.GITHUB_SHA }}
          # Generate standard OCI labels automatically
          labels: |
            org.opencontainers.image.revision=${{ env.GITHUB_SHA }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ env.RELEASE_TAG }}
      - name: Build & Push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v4.0.0
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.FILE }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          pull: true
          no-cache: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_TAG=${{ env.RELEASE_TAG }}
            GIT_COMMIT=${{ env.GITHUB_SHA }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            GIT_TREE_STATE=${{ env.GIT_TREE_STATE }}
      - name: Export Digest Artifact
        run: |
          set -euo pipefail
          mkdir -p digests
          DIGEST_ARTIFACT_NAME="$IMAGE_REPO"
          DIGEST="${{ steps.build.outputs.digest }}"
          if [ -z "$DIGEST" ]; then
            echo "::error::Digest empty"
            exit 1
          fi
          echo "$DIGEST" > "digests/digest-${DIGEST_ARTIFACT_NAME}"
      - name: Upload Digest Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: digest-${{ env.IMAGE_REPO }}
          path: digests/digest-${{ env.IMAGE_REPO }}
          retention-days: 30

  # ---------------------------------------------------------
  # JOB 2: Trusted Control Plane (Signature and Attestation)
  # ---------------------------------------------------------      
  sign-and-attest:
    runs-on: ubuntu-latest
    needs: [build-publish]
    env:
      IMAGE_REPO: ${{ inputs.image_repo }}
      GITHUB_SHA: ${{ inputs.github_sha }}
      DOCKER_USERNAME: ${{ inputs.dockerhub_username }}
      DIGEST: ${{ needs.build-publish.outputs.image-digest }}
    permissions:
      id-token: write          # Needed to get OIDC token for keyless signing
      actions: read            # Needed to read workflow info.
      packages: write          # Needed to login and upload attestations to ghcr.io.
      attestations: write      # Needed to upload attestations to the repository.
      artifact-metadata: write # Needed to upload SBOM as artifact    
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ inputs.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ inputs.ghcr_username }}
          password: ${{ secrets.ghcr_token }}
      - name: Prepare Images References
        run: |
          set -euo pipefail
          echo "DOCKER_IMAGE=docker.io/${DOCKER_USERNAME}/${IMAGE_REPO}@${DIGEST}" >> "$GITHUB_ENV"
          echo "GHCR_IMAGE=ghcr.io/${{ github.repository_owner }}/${IMAGE_REPO}@${DIGEST}" >> "$GITHUB_ENV"
      - name: Sign Images with Cosign
        run: |
          set -euo pipefail
          echo "Signing starts: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          IMAGES=(
            "$DOCKER_IMAGE"
            "$GHCR_IMAGE"
          )
          for IMAGE in "${IMAGES[@]}"; do
            echo "Signing image: $IMAGE"
            cosign sign --yes \
              --verbose \
              -a "repo=${{ github.repository }}" \
              -a "workflow=${{ github.workflow }}" \
              -a "workflow_ref=${{ github.workflow_ref }}" \
              -a "ref=$GITHUB_SHA" \
              "$IMAGE"
          done
          echo "Signing finished: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          # Targets the GHCR image to generate the SBOM (since digests match, the SBOM is identical)
          image: ${{ env.GHCR_IMAGE }}
          format: spdx-json
          output-file: sbom-${{ env.IMAGE_REPO }}.spdx.json
          artifact-name: sbom-${{ env.IMAGE_REPO }}.spdx.json
          upload-artifact: true
          upload-release-assets: auto
      - name: Cosign SBOM attestation
        run: |
          set -euo pipefail
          echo "Signing starts: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          IMAGES=(
            "$DOCKER_IMAGE"
            "$GHCR_IMAGE"
          )
          for IMAGE in "${IMAGES[@]}"; do
            cosign attest \
              --yes \
              --predicate "sbom-${IMAGE_REPO}.spdx.json" \
              --type spdxjson \
              "$IMAGE"
          done
          echo "Attestation finished: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

  # ---------------------------------------------------------
  # JOB 3: Trusted Control Plane (SLSA L3 Provenance)
  # ---------------------------------------------------------
  generate-slsa-provenance:
    name: Generate SLSA Provenance (${{ matrix.registry }})
    needs: [build-publish]
    permissions:
      id-token: write   # To sign the provenance.
      packages: write   # To upload assets to release.
      actions: read     # To read the workflow path.
    strategy:
      fail-fast: false
      matrix:
        include:
          - registry: ghcr
            prefix: ghcr.io
            username: ${{ inputs.ghcr_username }}
            secret_name: ghcr_token
          - registry: docker
            prefix: docker.io
            username: ${{ inputs.dockerhub_username }}
            secret_name: dockerhub_token
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ matrix.prefix }}/${{ matrix.username }}/${{ inputs.image_repo }}
      digest: ${{ needs.build-publish.outputs.image-digest }}
      registry-username: ${{ matrix.username }}
    secrets:
      registry-password: ${{ secrets[matrix.secret_name] }}
