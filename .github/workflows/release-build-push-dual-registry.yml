name: Release - Build and Push Dual Registry

permissions:
  contents: read
  
defaults:
  run:
    shell: bash
    
on:
  workflow_call:
    secrets:      
      ghcr_token:
        description: 'GitHub Token for GHCR authentication'
        required: true      
      dockerhub_token:
        description: 'Docker Hub access token'
        required: true
    inputs:
      context:
        description: 'Build context path'
        required: true
        type: string
      file:
        description: 'Dockerfile path'
        required: true
        type: string
      image_repo:
        description: 'Base image repository name'
        required: true
        type: string
      release_tag:
        description: 'Release tag for image'
        required: true
        type: string
      github_sha:
        description: 'Commit SHA'
        required: true
        type: string
      platforms:
        description: 'Container platforms'
        required: true
        type: string
      environment:
        description: 'Target GitHub environment for the build job (optional; use for environment context/protection)'
        required: false
        type: string
        default: production
      ghcr_username:
        description: 'GitHub Username/Repository Owner'
        required: true
        type: string
      dockerhub_username:
        description: 'Docker Hub username'
        required: true
        type: string
      gcp_project_id:
        description: 'GCP Project ID for Artifact Registry'
        required: true
        type: string
      gcp_project_number:
        description: 'GCP Project Number for Workload Identity'
        required: true
        type: string
      gar_location:
        description: 'GCP region for Artifact Registry'
        required: true
        type: string
      npm_virtual_repo:
        description: 'Artifact Registry NPM virtual repository name'
        required: true
        type: string
    outputs:
      image-digest:
        description: "sha256 digest of container image"
        value: ${{ jobs.build-publish.outputs.image-digest }}
      
jobs:
  
  # ---------------------------------------------------------
  # JOB 1: Untrusted Data Plane (Build Execution)
  # ---------------------------------------------------------
  build-publish:
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write # Used to push images to `ghcr.io`
    runs-on: ubuntu-latest
    env:
      CONTEXT: ${{ inputs.context }}
      FILE: ${{ inputs.file }}
      IMAGE_REPO: ${{ inputs.image_repo }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      PLATFORMS: ${{ inputs.platforms }}
      GITHUB_SHA: ${{ inputs.github_sha }}
      DOCKER_USERNAME: ${{ inputs.dockerhub_username }}
      GCP_PROJECT_ID: ${{ inputs.gcp_project_id }}
      GCP_PROJECT_NUMBER: ${{ inputs.gcp_project_number }}
      GAR_LOCATION: ${{ inputs.gar_location }}
      NPM_VIRTUAL_REPO: ${{ inputs.npm_virtual_repo }}
      GCP_PROJECT_ID: ${{ inputs.gcp_project_id }}
      GCP_PROJECT_NUMBER: ${{ inputs.gcp_project_number }}
      GAR_LOCATION: ${{ inputs.gar_location }}
      NPM_VIRTUAL_REPO: ${{ inputs.npm_virtual_repo }}
    outputs:  
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit # change to block later 
          egress-policy: audit # change to block later 
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.GITHUB_SHA }}
          fetch-depth: 0
          persist-credentials: false
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: 'projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-sa@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com'
          token_format: 'access_token'
      - name: Generate Secure .npmrc
        env:
          GAR_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          set -euo pipefail
          umask 077
          cat > "${RUNNER_TEMP}/.npmrc.build" <<EOF
          registry=https://${GAR_LOCATION}-npm.pkg.dev/${GCP_PROJECT_ID}/${NPM_VIRTUAL_REPO}/
          //${GAR_LOCATION}-npm.pkg.dev/${GCP_PROJECT_ID}/${NPM_VIRTUAL_REPO}/:_authToken=${GAR_TOKEN}
          //${GAR_LOCATION}-npm.pkg.dev/${GCP_PROJECT_ID}/${NPM_VIRTUAL_REPO}/:always-auth=true
          EOF
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v2.5.0
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v2.5.0
        with:
          # Forces the use of an isolated container for the build environment
          # Forces the use of an isolated container for the build environment
          driver: docker-container
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ inputs.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ inputs.ghcr_username }}
          password: ${{ secrets.ghcr_token }}
      - name: Extract build metadata
        id: build-meta
        run: |
          echo "GIT_TREE_STATE=$(if [ -z "$(git status --porcelain)" ]; then echo "clean"; else echo "dirty"; fi)" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          # Automatically generate tags for both GHCR and Docker.
          images: |
            docker.io/${{ inputs.dockerhub_username }}/${{ env.IMAGE_REPO}}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_REPO }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }},enable=${{ env.RELEASE_TAG != '' }}
            type=raw,value=${{ env.GITHUB_SHA }}
          # Generate standard OCI labels automatically
          labels: |
            org.opencontainers.image.revision=${{ env.GITHUB_SHA }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ env.RELEASE_TAG }}
      - name: Build & Push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v4.0.0
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.FILE }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          pull: true
          no-cache: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secret-files: |
            npmrc=${{ runner.temp }}/.npmrc.build
          secret-files: |
            npmrc=${{ runner.temp }}/.npmrc.build
          build-args: |
            GIT_TAG=${{ env.RELEASE_TAG }}
            GIT_COMMIT=${{ env.GITHUB_SHA }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            GIT_TREE_STATE=${{ env.GIT_TREE_STATE }}
      - name: Clean up .npmrc
        if: always()
        run: rm -f "${RUNNER_TEMP}/.npmrc.build"
      - name: Clean up .npmrc
        if: always()
        run: rm -f "${RUNNER_TEMP}/.npmrc.build"
      - name: Export Digest Artifact
        run: |
          set -euo pipefail
          mkdir -p digests
          DIGEST_ARTIFACT_NAME="$IMAGE_REPO"
          DIGEST="${{ steps.build.outputs.digest }}"
          if [ -z "$DIGEST" ]; then
            echo "::error::Digest empty"
            exit 1
          fi
          echo "$DIGEST" > "digests/digest-${DIGEST_ARTIFACT_NAME}"
      - name: Upload Digest Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: digest-${{ env.IMAGE_REPO }}
          path: digests/digest-${{ env.IMAGE_REPO }}
          retention-days: 30

  # ---------------------------------------------------------
  # JOB 2: Trusted Control Plane (Signature and Attestation)
  # ---------------------------------------------------------      
  sign-and-attest:
    runs-on: ubuntu-latest
    needs: [build-publish]
    env:
      IMAGE_REPO: ${{ inputs.image_repo }}
      GITHUB_SHA: ${{ inputs.github_sha }}
      DOCKER_USERNAME: ${{ inputs.dockerhub_username }}
      DIGEST: ${{ needs.build-publish.outputs.image-digest }}
    permissions:
      id-token: write # Needed to get OIDC token for keyless signing
      actions: read # Needed to read workflow info.
      packages: write # Needed to login and upload attestations to ghcr.io.
      attestations: write # Needed to upload attestations to the repository's native OPA registry.
      artifact-metadata: write # Needed to upload SBOM as artifact    
      attestations: write # Needed to upload attestations to the repository's native OPA registry.
      artifact-metadata: write # Needed to upload SBOM as artifact    
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v2.1.0
        with:
          username: ${{ inputs.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v2.1.0
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v2.1.0
        with:
          registry: ghcr.io
          username: ${{ inputs.ghcr_username }}
          password: ${{ secrets.ghcr_token }}
      - name: Prepare Images References
        run: |
          set -euo pipefail
          echo "DOCKER_IMAGE=docker.io/${DOCKER_USERNAME}/${IMAGE_REPO}@${DIGEST}" >> "$GITHUB_ENV"
          echo "GHCR_IMAGE=ghcr.io/${{ github.repository_owner }}/${IMAGE_REPO}@${DIGEST}" >> "$GITHUB_ENV"
      - name: Sign Images with Cosign
        run: |
          set -euo pipefail
          echo "Signing starts: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          IMAGES=(
            "$DOCKER_IMAGE"
            "$GHCR_IMAGE"
          )
          for IMAGE in "${IMAGES[@]}"; do
            echo "Signing image: $IMAGE"
            cosign sign --yes \
              --verbose \
              -a "repo=${{ github.repository }}" \
              -a "workflow=${{ github.workflow }}" \
              -a "workflow_ref=${{ github.workflow_ref }}" \
              -a "ref=$GITHUB_SHA" \
              "$IMAGE"
          done
          echo "Signing finished: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          # Targets the GHCR image to generate the SBOM (since digests match, the SBOM is identical)
          image: ${{ env.GHCR_IMAGE }}
          format: spdx-json
          output-file: sbom-${{ env.IMAGE_REPO }}.spdx.json
          artifact-name: sbom-${{ env.IMAGE_REPO }}.spdx.json
          upload-artifact: true
          upload-release-assets: auto
      - name: Cosign SBOM attestation
        run: |
          set -euo pipefail
          echo "Signing starts: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          IMAGES=(
            "$DOCKER_IMAGE"
            "$GHCR_IMAGE"
          )
          for IMAGE in "${IMAGES[@]}"; do
            cosign attest \
              --yes \
              --predicate "sbom-${IMAGE_REPO}.spdx.json" \
              --type spdxjson \
              "$IMAGE"
          done
          echo "Attestation finished: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
      - name: Attest Build Provenance - Docker 
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: docker.io/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_REPO }}
          subject-digest: ${{ env.DIGEST }}
          push-to-registry: true
      - name: Attest Build Provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_REPO }}
          subject-digest: ${{ env.DIGEST }}
          push-to-registry: true
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.3.0
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.3.0
        with:
          name: sbom-${{ env.IMAGE_REPO }}
          path: sbom-${{ env.IMAGE_REPO }}.spdx.json
          retention-days: 30
