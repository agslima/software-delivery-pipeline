name: "Release"

on:
  push:
    tags:
      - 'v*.*.*'    
permissions:
  contents: read
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve Release Tag
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Set Release Tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "release_tag=$REF_NAME" >> "$GITHUB_OUTPUT"

  run-trivy:
    name: Run Trivy
    needs: resolve
    permissions:
      contents: read
      security-events: write # Required to upload SARIF
      issues: write          # Required to open an incident issue on failure
      actions: read          # Required for workflow context resolution
    uses: ./.github/workflows/ci-security-deep.yml

  build-push-backend:
    name: Build & Push
    needs: [resolve, run-trivy]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/build-push-dual-registry.yml
    with:
      context: app
      file: app/docker/Dockerfile.server
      image_repo: app-stayhealthy-backend
      release_tag: ${{ needs.resolve.outputs.release_tag }}
      github_sha: ${{ github.sha }}
      platforms: linux/amd64
    secrets:
      dockerhub_username: ${{ vars.DOCKER_HUB_USERNAME }}
      dockerhub_token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      ghcr_username: ${{ github.repository_owner }}
      ghcr_token: ${{ secrets.GITHUB_TOKEN }}
                    
  build-push-frontend:
    name: Build & Push
    needs: [resolve, run-trivy]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/build-push-dual-registry.yml
    with:
      context: app
      file: app/docker/Dockerfile.client
      image_repo: app-stayhealthy-frontend
      release_tag: ${{ needs.resolve.outputs.release_tag }}
      github_sha: ${{ github.sha }}
      platforms: linux/amd64
    secrets:
      dockerhub_username: ${{ vars.DOCKER_HUB_USERNAME }}
      dockerhub_token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      ghcr_username: ${{ github.repository_owner }}
      ghcr_token: ${{ secrets.GITHUB_TOKEN }}

  build-push-worker:
    name: Build & Push
    needs: [resolve, run-trivy]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/build-push-dual-registry.yml
    with:
      context: app
      file: app/docker/Dockerfile.worker
      image_repo: app-stayhealthy-worker
      release_tag: ${{ needs.resolve.outputs.release_tag }}
      github_sha: ${{ github.sha }}
      platforms: linux/amd64
    secrets:
      dockerhub_username: ${{ vars.DOCKER_HUB_USERNAME }}
      dockerhub_token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      ghcr_username: ${{ github.repository_owner }}
      ghcr_token: ${{ secrets.GITHUB_TOKEN }}
  
  attest-sbom:
    name: Attest SBOM
    runs-on: ubuntu-latest
    needs: [resolve, build-push-backend]
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write
    env:
      SBOM_PREDICATE_TYPE: "https://spdx.dev/Document"
    strategy:
      fail-fast: true
      matrix:
        include:
          - component: backend
            digest: ${{ needs.buil-push-backend.outputs.image-digest }}
            container_name: app-stayhealthy-backend
          - component: worker
            digest: ${{ needs.download-digest.outputs.app-worker-digest }}
            container_name: app-stayhealthy-worker
          - component: frontend
            digest: ${{ needs.download-digest.outputs.app-frontend-digest }}
            container_name: app-stayhealthy-frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.release_tag }}
      - name: Generate SBOM and Attest - GHCR
        uses: ./.github/actions/sbom-and-attest
        with:
          image_name: ghcr.io/${{ github.repository_owner }}/${{ matrix.container_name }}
          image_digest: ${{ matrix.digest }}
          registry: ghcr.io
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          sbom-predicate-type: ${{ env.SBOM_PREDICATE_TYPE }}
          sbom-repository: ghcr.io/${{ github.repository_owner }}/sbom
      - name: Generate SBOM and Attest - Docker
        uses: ./.github/actions/sbom-and-attest
        with:
          image_name: docker.io/${{ vars.DOCKER_HUB_USERNAME }}/${{ matrix.container_name }}
          image_digest: ${{ matrix.digest }}
          registry: docker.io
          registry_username: ${{ vars.DOCKER_HUB_USERNAME }}
          registry_password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          sbom-predicate-type: ${{ env.SBOM_PREDICATE_TYPE }}
          sbom-repository: docker.io/${{ vars.DOCKER_HUB_USERNAME }}/sbom

  
  
  generate-slsa-provenance-backend-ghcr:
    needs: [build-push-backend] 
    if: false
    permissions:
      id-token: write   # To sign the provenance.
      packages: write   # To upload assets to release.
      actions: read     # To read the workflow path.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: $ ghcr.io/${{ github.repository_owner }}/app-stayhealthy-backend
      digest: ${{ needs.build-push-backend.outputs.image-digest }}
      registry-username: ${{ github.repository_owner }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  generate-slsa-provenance-frontend-ghcr:
    needs: [build-push-frontend] 
    if: false
    permissions:
      id-token: write   # To sign the provenance.
      packages: write   # To upload assets to release.
      actions: read     # To read the workflow path.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: $ ghcr.io/${{ github.repository_owner }}/app-stayhealthy-frontend
      digest: ${{ needs.build-push-frontend.outputs.image-digest }}
      registry-username: ${{ github.repository_owner }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
  
  generate-slsa-provenance-worker-ghcr:
    needs: [build-push-worker] 
    if: false
    permissions:
      id-token: write   # To sign the provenance.
      packages: write   # To upload assets to release.
      actions: read     # To read the workflow path.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: $ ghcr.io/${{ github.repository_owner }}/app-stayhealthy-worker
      digest: ${{ needs.build-push-worker.outputs.image-digest }}
      registry-username: ${{ github.repository_owner }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
  
  generate-slsa-provenance-backend-docker:
    needs: [build-push-backend] 
    if: false
    permissions:
      id-token: write   # To sign the provenance.
      packages: write   # To upload assets to release.
      actions: read     # To read the workflow path.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: docker.io/${{ vars.DOCKER_HUB_USERNAME }}/app-stayhealthy-backend
      digest: ${{ needs.build-push-backend.outputs.image-digest }}
      registry-username: ${{ vars.DOCKER_HUB_USERNAME }}
    secrets:
      registry-password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }} 
      
  generate-slsa-provenance-frontend-docker:
    needs: [build-push-frontend] 
    if: false
    permissions:
      id-token: write   # To sign the provenance.
      packages: write   # To upload assets to release.
      actions: read     # To read the workflow path.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: docker.io/${{ vars.DOCKER_HUB_USERNAME }}/app-stayhealthy-frontend
      digest: ${{ needs.build-push-frontend.outputs.image-digest }}
      registry-username: ${{ vars.DOCKER_HUB_USERNAME }}
    secrets:
      registry-password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
  
  generate-slsa-provenance-worker-docker:
    needs: [build-push-worker] 
    if: false
    permissions:
      id-token: write   # To sign the provenance.
      packages: write   # To upload assets to release.
      actions: read     # To read the workflow path.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: docker.io/${{ vars.DOCKER_HUB_USERNAME }}/app-stayhealthy-worker
      digest: ${{ needs.build-push-worker.outputs.image-digest }}
      registry-username: ${{ vars.DOCKER_HUB_USERNAME }}
    secrets:
      registry-password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
  
  
