name: CI – Release Gate

on:
  push:
    tags:
      - v*

jobs:
  release-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build Image
        run: |
          docker build -t app:${{ github.ref_name }} app/
          docker push app:${{ github.ref_name }}

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Trivy Gate
        run: |
          trivy image app:${{ github.ref_name }} \
            --severity HIGH,CRITICAL \
            --exit-code 1

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Image
        run: cosign sign app:${{ github.ref_name }}

      - name: Attest Vulnerabilities
        run: cosign attest \
          --predicate trivy-results.json \
          --type vuln \
          app:${{ github.ref_name }}
