name: "Release"

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # Canonical predicateTypes (Aligned with Kyverno policies)
  TRIVY_PREDICATE_TYPE: "https://security.sigstore.dev/attestations/vuln/trivy/v1"
  ZAP_PREDICATE_TYPE: "https://security.sigstore.dev/attestations/dast/zap/v1"
  SBOM_PREDICATE_TYPE: "https://spdx.dev/Document"

jobs:
  # ==================================================================
  # JOB 0: Resolve Tag + Checkout Deterministically
  # ==================================================================
  resolve:
    name: Resolve Release Tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Set Release Tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "release_tag=$REF_NAME" >> "$GITHUB_OUTPUT"

  # ==================================================================
  # JOB 1: Build + Push (Digest is the artifact identity)
  # ==================================================================
  build-push:
    name: Build & Push (Digest)
    runs-on: ubuntu-latest
    needs: [resolve]
    environment: production
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      app-backend-digest: ${{ steps.release-backend.outputs.digest }}
      app-frotend-digest: ${{ steps.release-frontend.outputs.digest }}
      app-worker-digest: ${{ steps.release-worker.outputs.digest }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - component: backend
            main-path: app
            container_file: app/docker/Dockerfile.server
            container_name: app-stayhealthy-backend
          - component: worker
            main-path: app
            container_file: app/docker/Dockerfile.worker
            container_name: app-stayhealthy-worker
          - componnent: frontend
            main-path: app
            container_file: app/docker/Dockerfile.client
            container_name: app-stayhealthy-frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-tags: true
          ref: ${{ needs.resolve.outputs.release_tag }}
  
      - name: Publish Backend
        id: release-backend
        uses: ./.github/workflows/image-reuse.yaml
        with:
          makefile-target: app-publish-backend
          ghcr: ghcr.io
          ghrc-registry-username: ${{ github.actor }}
          ghrc-registry-password: ${{ secrets.GITHUB_TOKEN }}
          ghrc-repository: ${{ github.repository_owner }}
          docker: docker.io
          docker-username: ${{ secrets.DOCKER_HUB_USERNAME }}
          docker-password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          docker-repository: agslima/app-stayhealthy-backend
          version: ${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64
          push: true
          sign-image: true
          signature-repository: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}/app-stayhealthy/backend
          main-path: ./app/docker
      
  # ==================================================================
  # JOB 2: Trivy Scan (1 run per image digest) + gate
  # ==================================================================
  trivy-scan:
    name: Trivy Scan (Digest Gate)
    runs-on: ubuntu-latest
    needs: [build-push, resolve]
    permissions:
      contents: read
    env:
      TRIVY_VERSION: "0.58.1"
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: backend
            image_repo: app-stayhealthy-backend
            exposure: public
            criticality: high
          - name: worker
            image_repo: app-stayhealthy-worker
            exposure: internal
            criticality: medium
          - name: frontend
            image_repo: app-stayhealthy-frontend
            exposure: public
            criticality: medium
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.release_tag }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8.0.1
        with:
          name: digest-${{ matrix.name }}
          path: digests

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Install Trivy
        run: |
          set -euo pipefail
          curl -sfL "https://raw.githubusercontent.com/aquasecurity/trivy/v${{ env.TRIVY_VERSION }}/contrib/install.sh" | sh -s -- -b /usr/local/bin
          trivy --version

      - name: Scan Image (JSON)
        run: |
          set -euo pipefail
          DIGEST="$(cat digests/digest-${{ matrix.name }})"
          IMAGE="${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_repo }}@$DIGEST"
          echo "Scanning $IMAGE"

          trivy image \
            --format json \
            --output "trivy-${{ matrix.name }}.json" \
            "$IMAGE"

          # Explicit output checks (fail closed)
          test -s "trivy-${{ matrix.name }}.json" || (echo "::error::Trivy JSON missing/empty"; exit 1)
          jq -e '.Results? | type=="array"' "trivy-${{ matrix.name }}.json" >/dev/null

      - name: Gate (CRITICAL>0 or HIGH>5)
        run: |
          set -euo pipefail
          FILE="trivy-${{ matrix.name }}.json"
          CRIT=$(jq '[.Results[]? | (.Vulnerabilities // [])[] | select(.Severity=="CRITICAL")] | length' "$FILE")
          HIGH=$(jq '[.Results[]? | (.Vulnerabilities // [])[] | select(.Severity=="HIGH")] | length' "$FILE")
          echo "CRITICAL=$CRIT HIGH=$HIGH"

          if [ "$CRIT" -gt 0 ] || [ "$HIGH" -gt 5 ]; then
            echo "::error::⛔ Trivy Gate Failed for ${{ matrix.name }} (CRIT=$CRIT HIGH=$HIGH)"
            exit 1
          fi
          echo "✅ Trivy Gate Passed"

      - name: Upload Trivy Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: trivy-results-${{ matrix.name }}
          path: trivy-${{ matrix.name }}.json
          retention-days: 30

  # ==================================================================
  # JOB 3: DAST (compose uses the exact digests) + gate
  # ==================================================================
  dast-analysis:
    name: DAST (Digest-based)
    runs-on: ubuntu-latest
    needs: [trivy-scan, build-push, resolve]
    permissions:
      contents: read
    env:
      ZAP_IMG: ghcr.io/zaproxy/zaproxy@sha256:4bef6bcb753a95aa2f69f36e400a77dcc47ced2d10d26902d52f616fa292f5e1 # v2.17.0
      ZAP_TARGET_FRONTEND: "http://127.0.0.1:4173"
      ZAP_TARGET_BACKEND: "http://127.0.0.1:8080"
      ZAP_CONTEXT_FILE: ${{ github.workspace }}/.zap/context.context
      ZAP_RULES_FILE: ${{ github.workspace }}/.zap/rules.tsv
      HEALTH_TIMEOUT: "120" # seconds
      COMPOSE_PROJECT_NAME: dast-${{ github.run_id }}-${{ github.run_attempt }} 

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.release_tag }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8.0.1
        with:
          name: digest-backend
          path: digests
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8.0.1
        with:
          name: digest-worker
          path: digests
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8.0.1
        with:
          name: digest-frontend
          path: digests

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set Variables + Compose Secrets (file-based)
        working-directory: app
        run: |
          set -euo pipefail
          
          SECRETS_DIR="${RUNNER_TEMP}/compose-secrets"
          ENV_FILE=".env"

          rm -f "$ENV_FILE"
          rm -rf "$SECRETS_DIR"
          mkdir -p "$SECRETS_DIR"
          {
            echo "ADMIN_USER=${{ vars.ADMIN_USER }}"
            echo "DB_USER=${{ vars.DB_USER }}"
            echo "DB_NAME=${{ vars.DB_NAME }}"
            echo "COMPOSE_PROJECT_NAME=${{ env.COMPOSE_PROJECT_NAME }}"
            echo "SECRETS_PATH=${SECRETS_DIR}"
          } >> "$ENV_FILE"
          chmod 644 "$ENV_FILE"

          # Compose secrets files
          printf "%s" "${{ secrets.JWT_SECRET }}" > "${SECRETS_DIR}/jwt_secret.txt"
          printf "%s" "${{ secrets.ADMIN_PASS }}" > "${SECRETS_DIR}/admin_pass.txt"
          printf "%s" "${{ secrets.DB_PASS }}" > "${SECRETS_DIR}/db_pass.txt"
          printf "%s" "${{ secrets.DATA_ENCRYPTION_KEY }}" > "${SECRETS_DIR}/data_encryption_key.txt"
          chmod 644 "${SECRETS_DIR}"/*.txt

          echo "Secrets dir: ${SECRETS_DIR}"

      - name: Start Ephemeral Environment (Pinned Digests)
        working-directory: app
        run: |
          set -euo pipefail

          BACKEND_DIGEST="$(cat ../digests/digest-backend)"
          WORKER_DIGEST="$(cat ../digests/digest-worker)"
          FRONTEND_DIGEST="$(cat ../digests/digest-frontend)"

          export BACKEND_IMAGE="docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/app-stayhealthy-backend@$BACKEND_DIGEST"
          export WORKER_IMAGE="docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/app-stayhealthy-worker@$WORKER_DIGEST"
          export FRONTEND_IMAGE="docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/app-stayhealthy-frontend@$FRONTEND_DIGEST"

          echo "BACKEND_IMAGE=$BACKEND_IMAGE"
          echo "WORKER_IMAGE=$WORKER_IMAGE"
          echo "FRONTEND_IMAGE=$FRONTEND_IMAGE"

          # Compose should reference BACKEND_IMAGE / FRONTEND_IMAGE
          docker compose -f docker-compose.prod.yml -f docker-compose.release.yml up -d

          echo "⏳ Waiting for Backend..."
          timeout 90s bash -c 'until curl -s http://127.0.0.1:8080/health > /dev/null; do sleep 5; done'
          echo "⏳ Waiting for Worker..."
          timeout 90s bash -c 'until docker compose exec worker wget -qO- http://127.0.0.1:8090/ready > /dev/null; do sleep 5; done' 
          echo "⏳ Waiting for Frontend..."
          timeout 90s bash -c 'until curl -s http://127.0.0.1:4173 > /dev/null; do sleep 5; done'
          docker compose ps
          echo "✅ Application is live!"

      - name: OWASP ZAP Baseline (Frontend)
        working-directory: app
        run: |
          set -euo pipefail
          mkdir -p zap-out
          chmod 777 zap-out
          cp "$ZAP_CONTEXT_FILE" zap-out/context.context
          cp "$ZAP_RULES_FILE"   zap-out/rules.tsv

          VOL_PATH="$(pwd)/zap-out"
          echo "ZAP volume: $VOL_PATH"
          echo "ZAP image: ${{ env.ZAP_IMG }}"

          docker run --rm \
            --network host \
            -v "$VOL_PATH:/zap/wrk/:rw" \
            "${{ env.ZAP_IMG }}" zap-baseline.py \
            -t "${{ env.ZAP_TARGET_FRONTEND }}" \
            -n /zap/wrk/context.context \
            -c /zap/wrk/rules.tsv \
            -r zap-frontend.html \
            -J zap-frontend.json \
            -I || true

          test -s "zap-out/zap-frontend.json" || (echo "::error::ZAP frontend JSON missing/empty (scanner crash?)"; exit 1)
          jq -e 'type=="object"' "zap-out/zap-frontend.json" >/dev/null

      - name: OWASP ZAP Baseline (Backend)
        working-directory: app
        run: |
          set -euo pipefail

          VOL_PATH="$(pwd)/zap-out"

          docker run --rm \
            --network host \
            -v "$VOL_PATH:/zap/wrk/:rw" \
            "${{ env.ZAP_IMG }}" zap-baseline.py \
            -t "${{ env.ZAP_TARGET_BACKEND }}" \
            -n /zap/wrk/context.context \
            -c /zap/wrk/rules.tsv \
            -r zap-backend.html \
            -J zap-backend.json \
            -I || true

          test -s "zap-out/zap-backend.json" || (echo "::error::ZAP backend JSON missing/empty (scanner crash?)"; exit 1)
          jq -e 'type=="object"' "zap-out/zap-backend.json" >/dev/null


      - name: Gate ZAP (High > 0)
        working-directory: app
        run: |
          set -euo pipefail

          for FILE in zap-out/zap-frontend.json zap-out/zap-backend.json; do
            test -s "$FILE" || (echo "::error::ZAP report missing/empty: $FILE"; exit 1)
            jq -e 'type=="object"' "$FILE" >/dev/null

            HIGHS=$(jq '[.site[]? | .alerts[]? | select(.riskcode=="3")] | length' "$FILE")
            echo "$FILE => High=$HIGHS"
            if [ "$HIGHS" -gt 0 ]; then
              echo "::error::⛔ DAST Gate Failed ($FILE High=$HIGHS)"
              exit 1
            fi
          done

          echo "✅ DAST Gate Passed"

      - name: Upload ZAP Artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: zap-results
          path: app/zap-out/
          retention-days: 30

      - name: Cleanup Secrets + Env
        if: always()
        working-directory: app
        run: |
          set -euo pipefail
          rm -f .env
          if [ -n "${COMPOSE_SECRETS_DIR:-}" ] && [ -d "${COMPOSE_SECRETS_DIR:-}" ]; then
            rm -rf "${COMPOSE_SECRETS_DIR}"
          fi

      - name: Teardown
        if: always()
        working-directory: app
        run: docker compose down -v --remove-orphans

  # ==================================================================
  # JOB 4: Sign + Attest + SBOM + Provenance (only after gates)
  # ==================================================================
  sign-and-attest:
    name: Sign & Attest (Governed)
    runs-on: ubuntu-latest
    needs: [dast-analysis, build-push, trivy-scan, resolve]
    environment: production
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      IMAGE: ""
      DIGEST: ""
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: backend
            image_repo: app-stayhealthy-backend
          - name: worker
            image_repo: app-stayhealthy-worker
          - name: frontend
            image_repo: app-stayhealthy-frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.release_tag }}

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 #v4.1.1

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8.0.1
        with:
          name: digest-${{ matrix.name }}
          path: digests

      - name: Read Digest
        run: |
          set -euo pipefail
          DIGEST="$(cat digests/digest-${{ matrix.name }})"
          echo "DIGEST=$DIGEST" >> "$GITHUB_ENV"
          echo "IMAGE=docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_repo }}@$DIGEST" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8.0.1
        with:
          name: trivy-results-${{ matrix.name }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8.0.1
        with:
          name: zap-results
          path: zap-downloads

      - name: Sign image
        env:
          IMAGE: docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_repo }}@$DIGEST
          COSIGN_REPOSITORY: docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/signatures
        run: |
          set -euo pipefail
          
          echo "COSIGN_REPOSITORY=$COSIGN_REPOSITORY"
          echo "Signing image: $IMAGE"
          echo "Signing starts: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          cosign sign --yes "$IMAGE" \
            -a "repo=${{ github.repository }}" \
            -a "workflow=${{ github.workflow }}" \
            -a "ref=${{ github.sha }}"
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-identity-regexp="^https://github.com/${{ github.repository }}/.github/workflows/.*@.*$"

          echo "Signing finished: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "Checking artifacts in registry..."
          cosign tree "$IMAGE"
          
      - name: Create & Push Trivy Attestation (from scan artifact)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          FILE="trivy-${{ matrix.name }}.json"
          test -s "$FILE" || (echo "::error::Missing trivy JSON"; exit 1)

          jq '
            ([.Results[]? | (.Vulnerabilities // [])[] | select(.Severity=="CRITICAL")] | length) as $crit |
            ([.Results[]? | (.Vulnerabilities // [])[] | select(.Severity=="HIGH")] | length) as $high |
            {
              scanner: { name: "trivy", version: env.TRIVY_VERSION, uri: "https://github.com/aquasecurity/trivy" },
              summary: { critical: $crit, high: $high },
              result: (if ($crit > 0 or $high > 5) then "FAIL" else "PASS" end),
              timestamp: (now | todate)
            }
          ' "$FILE" > trivy-attestation.json
      - name: Trivy Attestation (from scan artifact)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cosign attest --yes \
            --predicate trivy-attestation.json \
            --type "${{ env.TRIVY_PREDICATE_TYPE }}" \
            "$IMAGE"  
      - name: Create & Push ZAP Attestation (from DAST artifacts)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          FE="zap-downloads/zap-frontend.json"
          BE="zap-downloads/zap-backend.json"
          test -s "$FE" || (echo "::error::Missing ZAP FE json"; exit 1)
          test -s "$BE" || (echo "::error::Missing ZAP BE json"; exit 1)

          HIGH_FE=$(jq '[.site[]? | .alerts[]? | select(.riskcode=="3")] | length' "$FE")
          HIGH_BE=$(jq '[.site[]? | .alerts[]? | select(.riskcode=="3")] | length' "$BE")
          HIGH=$((HIGH_FE + HIGH_BE))

          jq -n --argjson high "$HIGH" '
            {
              scanner: { name: "owasp-zap", uri: "https://www.zaproxy.org/" },
              summary: { high: $high },
              result: (if ($high > 0) then "FAIL" else "PASS" end),
              timestamp: (now | todate)
            }
          ' > zap-attestation.json
      - name: ZAP Attestation (from DAST artifacts)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cosign attest --yes \
            --predicate zap-attestation.json \
            --type "${{ env.ZAP_PREDICATE_TYPE }}" \
            "$IMAGE"
      - name: Verify Signature (OIDC identity)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail

          echo "🔍 Resolving signature location..."
          cosign triangulate "$IMAGE"

          echo "🔐 Verifying signature against Rekor..."
          cosign verify \
            "$IMAGE" \
            --rekor-url https://rekor.sigstore.dev \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/ci-release-gate\.yml@refs/tags/v.*"
          
          echo "✅ Signature Verified (Rekor-backed)"

      - name: Generate SBOM
        if: startsWith(github.ref, 'refs/tags/')
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 #v0.24.0
        with:
          image: ${{ env.IMAGE }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json
          artifact-name: sbom-${{ matrix.name }}.spdx.json
          upload-release-assets: false

      - name: Validate SBOM
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          test -s "sbom-${{ matrix.name }}.spdx.json" || (echo "::error::Missing SBOM file"; exit 1)
          
      - name: Attest SBOM
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cosign attest --yes \
            --predicate "sbom-${{ matrix.name }}.spdx.json" \
            --type "${{ env.SBOM_PREDICATE_TYPE }}" \
            "$IMAGE"

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 #v4.1.0
        with:
          subject-name: docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_repo }}
          subject-digest: ${{ env.DIGEST }}
          push-to-registry: true
