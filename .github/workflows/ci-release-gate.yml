name: "Release"

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag (e.g., v1.2.3)'
        required: true
        type: string
        
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ==================================================================
  # STAGE 1: Dynamic Analysis (DAST) - Runs against the Full Stack
  # ==================================================================
  
  dast-analysis:
      name: "DAST (OWASP ZAP)"
      runs-on: ubuntu-latest
      permissions:
        contents: read
        security-events: write
      steps:
        - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
              
        - name: Start Ephemeral Environment
          working-directory: app
          run: |
            set -euo pipefail
            # Ensure we build fresh images for the test
            docker compose up -d --build

            echo "⏳ Waiting for Backend..."
            timeout 90s bash -c 'until curl -s http://127.0.0.1:8080/health > /dev/null; do sleep 5; done'

            echo "⏳ Waiting for Frontend..."
            timeout 90s bash -c 'until curl -s http://127.0.0.1:4173 > /dev/null; do sleep 5; done'

            docker compose ps
            echo "✅ Application is live!"

        - name: OWASP ZAP Baseline Scan
          run: |
            set -euo pipefail
            mkdir -p zap-out
            chmod 777 zap-out

            # Network host allows ZAP to see localhost:4173
            docker run --rm \
              --network host \
              -v "$(pwd)/zap-out:/zap/wrk/:rw" \
              ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
              -t http://127.0.0.1:4173 \
              -r zap-report.html \
              -J zap-report.json \
              -I || true
          
        - name: Check Vulnerability Thresholds
          run: |
            set -euo pipefail
            FILE="zap-out/zap-report.json"
            test -s "$FILE" || (echo "::error::❌ ZAP Report not found or empty!"; exit 1)

            HIGHS=$(jq '[.site[]? | .alerts[]? | select(.riskcode == "3")] | length' "$FILE")
            echo "📊 Scan Results: Found $HIGHS High Severity Vulnerabilities."

            if [ "$HIGHS" -gt 0 ]; then
              echo "::error::⛔ DAST Failed! Blocked $HIGHS High severity vulnerabilities."
              exit 1
            fi

            echo "✅ DAST Scan Passed."

        - name: Upload ZAP Report
          if: always() 
          uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f #v6.0.0
          with:
            name: zap-results
            path: zap-out/
            retention-days: 5

  # ==================================================================
  # STAGE 2: RELEASE BUILD (Matrix)
  # ==================================================================

  build-push:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [ dast-analysis ] 
    environment: production
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: true 
      matrix:
        include:
          - name: backend
            context: app/server
            file: app/docker/Dockerfile.server
            image_repo: app-stayheathy-backend
          - name: frontend
            context: app/client
            file: app/docker/Dockerfile.client
            image_repo: app-stayheathy-frontend

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f #v3.12.0

      - uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build & Push
        id: build
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_repo }}:${{ github.sha }}
            ${{ format('{0}/{1}:{2}', secrets.DOCKER_HUB_USERNAME, matrix.image_repo, github.ref_name) }}

      - name: Export Digest
        run: |
          mkdir -p digests
          DIGEST="${{ steps.build.outputs.digest }}"
          if [[ -z "$DIGEST" ]]; then
            echo "Error: Digest is empty!"
            exit 1
          fi
          echo "$DIGEST" > digests/digest-${{ matrix.name }}
                
      - name: Upload Digest Artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f #v6.0.0
        with:
          name: digest-${{ matrix.name }}     
          path: digests/digest-${{ matrix.name }}
          retention-days: 1

      # Generate & Upload Trivy JSON
      - name: Install Trivy
        run: |
          TRIVY_VERSION=0.58.1
          curl -sfL raw.githubusercontent.com/aquasecurity/trivy/v${TRIVY_VERSION}/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate Trivy Report
        run: |
          IMAGE_REF="${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_repo }}:${{ github.sha }}"
          trivy image --format json --output trivy-results.json "$IMAGE_REF"

      - name: Upload Trivy JSON Artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f #v6.0.0
        with:
          name: trivy-results-${{ matrix.name }}
          path: trivy-results.json

  # ==================================================================
  # STAGE 3: SIGNING & ATTESTATION
  # ==================================================================  
  
  sign-and-attest:
    name: Sign & Attest
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      packages: write
      id-token: write
      attestations: write

    strategy:
      matrix:
        include:
          - name: backend
            image_repo: app-stayheathy-backend
          - name: frontend
            image_repo: app-stayheathy-frontend

    steps:
      - uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad #v4.0.0
      
      - uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # 1. Get Digest
      - name: Download Digest Artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4.1.7
        with:
          name: digest-${{ matrix.name }}
          path: digests

      - name: Read Digest
        run: |
          DIGEST=$(cat digests/digest-${{ matrix.name }})
          echo "DIGEST=$DIGEST" >> $GITHUB_ENV
          echo "IMAGE=${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_repo }}@$DIGEST" >> $GITHUB_ENV

      # 2. Get Reports
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4.1.7
        with:
          name: trivy-results-${{ matrix.name }}
      
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4.1.7
        with:
          name: zap-results
          path: zap-downloads
        
      # ------------------------------------------------------------------
      # TRIVY ATTESTATION (Specific to this image)
      # ------------------------------------------------------------------
      - name: Create & Push Trivy Attestation
        run: |
          jq '
            ([.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length) as $crit |
            ([.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length) as $high |
            {
              scanner: { name: "trivy", version: "0.58.1" },
              summary: { critical: $crit, high: $high },
              result: (if ($crit > 0 or $high > 5) then "FAIL" else "PASS" end),
              timestamp: (now | todate)
            }
          ' trivy-results.json > trivy-attestation.json

          cosign attest --yes \
            --predicate trivy-attestation.json \
            --type https://aquasecurity.github.io/trivy/attestation/v1 \
            "$IMAGE"

      # ------------------------------------------------------------------
      # ZAP ATTESTATION (Shared Report)
      # ------------------------------------------------------------------
      - name: Create & Push ZAP Attestation
        run: |
          ZAP_FILE=$(find zap-downloads -name "zap-report.json" -type f | head -n 1)
          
          jq '
            ([.site[].alerts[]? | select(.riskcode=="3")] | length) as $high |
            {
              scanner: { name: "owasp-zap" },
              summary: { high: $high },
              result: (if ($high > 0) then "FAIL" else "PASS" end),
              timestamp: (now | todate)
            }
          ' "$ZAP_FILE" > zap-attestation.json

          cosign attest --yes \
            --predicate zap-attestation.json \
            --type https://www.zaproxy.org/docs/attestations/zap-baseline/v1 \
            "$IMAGE"

      # ------------------------------------------------------------------
      # SIGNING & SBOM
      # ------------------------------------------------------------------
      - run: cosign sign --yes "$IMAGE"

      # Catch signing errors early
      - run: |
          cosign verify "$IMAGE" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp \
            "https://github.com/${{ github.repository }}/.github/workflows/.*"
      
      - uses: anchore/sbom-action@0b82b0b1a22399a1c542d4d656f70cd903571b5c #v0.21.1
        with:
          image: ${{env.IMAGE}}
          format: spdx-json
          output-file: sbom.spdx.json

      - run: |
          cosign attest --yes --type spdx --predicate sbom.spdx.json "$IMAGE"
      
      - uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a #v3.0.0
        with:
          subject-name: index.docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_repo }}
          subject-digest: ${{ env.DIGEST }}
          push-to-registry: true