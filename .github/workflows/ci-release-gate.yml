name: "Release"

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and publish (e.g., v1.2.3)'
        required: true
        type: string
permissions:
  contents: read
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve Release Tag
    runs-on: ubuntu-latest    
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Set Release Tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            test -n "$INPUT_TAG" || { echo "::error::tag input required"; exit 1; }
            [[ "$INPUT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::Invalid tag: $INPUT_TAG"; exit 1; }
            echo "release_tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

  run-trivy:
    name: Run Trivy
    needs: resolve
    permissions:
      contents: read
      security-events: write # Required to upload SARIF
      issues: write          # Required to open an incident issue on failure
      actions: read          # Required for workflow context resolution
    uses: ./.github/workflows/ci-security-deep.yml

  build-push-backend:
    name: Build & Push
    needs: [resolve, run-trivy]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      actions: read
    uses: ./.github/workflows/release-build-push-dual-registry.yml
    with:
      environment: production
      context: app
      file: app/docker/Dockerfile.server
      image_repo: app-stayhealthy-backend
      release_tag: ${{ needs.resolve.outputs.release_tag }}
      github_sha: ${{ github.sha }}
      platforms: linux/amd64
      dockerhub_username: ${{ vars.DOCKER_HUB_USERNAME }}
      ghcr_username: ${{ github.repository_owner }}
    secrets:      
      dockerhub_token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      ghcr_token: ${{ secrets.GITHUB_TOKEN }}

  reproducibility-pilot-backend:
    name: Reproducibility Pilot (Backend)
    needs: [resolve, build-push-backend]
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Run reproducibility pilot builds
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
          GITHUB_SHA: ${{ github.sha }}
          SOURCE_URL: https://github.com/${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/reproducibility-pilot

          build_once() {
            local output_file="$1"
            docker buildx build \
              --platform linux/amd64 \
              --file app/docker/Dockerfile.server \
              --pull \
              --no-cache \
              --provenance=false \
              --sbom=false \
              --build-arg BUILD_DATE=1970-01-01T00:00:00Z \
              --build-arg VCS_REF="${GITHUB_SHA}" \
              --build-arg VERSION="${RELEASE_TAG}" \
              --build-arg SOURCE="${SOURCE_URL}" \
              --output "type=oci,dest=${output_file}" \
              app
          }

          build_once artifacts/reproducibility-pilot/backend-run-1.oci.tar
          build_once artifacts/reproducibility-pilot/backend-run-2.oci.tar

      - name: Compare reproducibility pilot outputs
        id: reproducibility-pilot
        run: |
          python3 scripts/report-reproducibility-pilot.py \
            --image-name app-stayhealthy-backend \
            --first-archive artifacts/reproducibility-pilot/backend-run-1.oci.tar \
            --second-archive artifacts/reproducibility-pilot/backend-run-2.oci.tar \
            --output-dir artifacts/reproducibility-pilot

      - name: Upload reproducibility pilot artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: reproducibility-pilot-backend
          path: artifacts/reproducibility-pilot/
          retention-days: 30
                    
  build-push-frontend:
    name: Build & Push
    needs: [resolve, run-trivy]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write 
      actions: read
    uses: ./.github/workflows/release-build-push-dual-registry.yml
    with:
      environment: production
      context: app
      file: app/docker/Dockerfile.client
      image_repo: app-stayhealthy-frontend
      release_tag: ${{ needs.resolve.outputs.release_tag }}
      github_sha: ${{ github.sha }}
      platforms: linux/amd64
      dockerhub_username: ${{ vars.DOCKER_HUB_USERNAME }}
      ghcr_username: ${{ github.repository_owner }}
    secrets:      
      dockerhub_token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      ghcr_token: ${{ secrets.GITHUB_TOKEN }}

  build-push-worker:
    name: Build & Push
    needs: [resolve, run-trivy]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      actions: read
    uses: ./.github/workflows/release-build-push-dual-registry.yml
    with:
      environment: production
      context: app
      file: app/docker/Dockerfile.worker
      image_repo: app-stayhealthy-worker
      release_tag: ${{ needs.resolve.outputs.release_tag }}
      github_sha: ${{ github.sha }}
      platforms: linux/amd64
      dockerhub_username: ${{ vars.DOCKER_HUB_USERNAME }}
      ghcr_username: ${{ github.repository_owner }}
    secrets:      
      dockerhub_token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      ghcr_token: ${{ secrets.GITHUB_TOKEN }}
  
  generate-slsa-provenance-backend-ghcr:
    needs: [build-push-backend]
    permissions:
      id-token: write   # To sign the provenance.
      packages: write   # To upload assets to release.
      actions: read     # To read the workflow path.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ghcr.io/${{ github.repository_owner }}/app-stayhealthy-backend
      digest: ${{ needs.build-push-backend.outputs.image-digest }}
      registry-username: ${{ github.repository_owner }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  generate-slsa-provenance-frontend-ghcr:
    needs: [build-push-frontend]
    permissions:
      id-token: write   # To sign the provenance.
      packages: write   # To upload assets to release.
      actions: read     # To read the workflow path.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ghcr.io/${{ github.repository_owner }}/app-stayhealthy-frontend
      digest: ${{ needs.build-push-frontend.outputs.image-digest }}
      registry-username: ${{ github.repository_owner }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
  
  generate-slsa-provenance-worker-ghcr:
    needs: [build-push-worker]
    permissions:
      id-token: write   # To sign the provenance.
      packages: write   # To upload assets to release.
      actions: read     # To read the workflow path.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ghcr.io/${{ github.repository_owner }}/app-stayhealthy-worker
      digest: ${{ needs.build-push-worker.outputs.image-digest }}
      registry-username: ${{ github.repository_owner }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
  
  generate-slsa-provenance-backend-docker:
    needs: [build-push-backend]
    permissions:
      id-token: write   # To sign the provenance.
      packages: write   # To upload assets to release.
      actions: read     # To read the workflow path.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: docker.io/${{ vars.DOCKER_HUB_USERNAME }}/app-stayhealthy-backend
      digest: ${{ needs.build-push-backend.outputs.image-digest }}
      registry-username: ${{ vars.DOCKER_HUB_USERNAME }}
    secrets:
      registry-password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

  generate-slsa-provenance-frontend-docker:
    needs: [build-push-frontend]
    permissions:
      id-token: write   # To sign the provenance.
      packages: write   # To upload assets to release.
      actions: read     # To read the workflow path.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: docker.io/${{ vars.DOCKER_HUB_USERNAME }}/app-stayhealthy-frontend
      digest: ${{ needs.build-push-frontend.outputs.image-digest }}
      registry-username: ${{ vars.DOCKER_HUB_USERNAME }}
    secrets:
      registry-password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
  
  generate-slsa-provenance-worker-docker:
    needs: [build-push-worker]
    permissions:
      id-token: write   # To sign the provenance.
      packages: write   # To upload assets to release.
      actions: read     # To read the workflow path.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: docker.io/${{ vars.DOCKER_HUB_USERNAME }}/app-stayhealthy-worker
      digest: ${{ needs.build-push-worker.outputs.image-digest }}
      registry-username: ${{ vars.DOCKER_HUB_USERNAME }}
    secrets:
      registry-password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
  
  trivy-scan:
    name: Trivy Scan (Digest Gate)
    needs: [ build-push-frontend, build-push-backend, build-push-worker ]
    permissions:
      contents: read
      packages: write # Used to push images to `ghcr.io` if used.
      id-token: write # Needed to create an OIDC token for keyless signing
      attestations: write # Needed to upload attestations to the GitHub registry      
    uses: ./.github/workflows/release-trivy.yml
    with:
      image-digest-backend: ${{ needs.build-push-backend.outputs.image-digest }}
      image-digest-frontend: ${{ needs.build-push-frontend.outputs.image-digest }}
      image-digest-worker: ${{ needs.build-push-worker.outputs.image-digest }}
      ghcr_username: ${{ github.repository_owner }}
      dockerhub_username: ${{ vars.DOCKER_HUB_USERNAME }}
    secrets:
      dockerhub_token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      ghcr_token: ${{ secrets.GITHUB_TOKEN }}
     
  dast-analysis:
    name: DAST (Digest-based)
    needs: [ build-push-frontend, build-push-backend, build-push-worker, resolve ]
    permissions:
      contents: read
      id-token: write
      packages: write # Used to pull images from `ghcr.io` if used.
      attestations: write
    uses: ./.github/workflows/release-dast.yml
    with:
      release_tag: ${{ needs.resolve.outputs.release_tag }}
      github_sha: ${{ github.sha }}
      image-digest-backend: ${{ needs.build-push-backend.outputs.image-digest }}
      image-digest-frontend: ${{ needs.build-push-frontend.outputs.image-digest }}
      image-digest-worker: ${{ needs.build-push-worker.outputs.image-digest }}
      dockerhub_username: ${{ vars.DOCKER_HUB_USERNAME }}
      ghcr_username: ${{ github.repository_owner }}
      admin_user: ${{ vars.ADMIN_USER }}
      db_user: ${{ vars.DB_USER }}
      db_name: ${{ vars.DB_NAME }}
    secrets:
      dockerhub_token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      admin_pass: ${{ secrets.ADMIN_PASS }}
      db_pass: ${{ secrets.DB_PASS }}
      jwt_secret: ${{ secrets.JWT_SECRET }}
      data_encryption_key: ${{ secrets.DATA_ENCRYPTION_KEY }}    
