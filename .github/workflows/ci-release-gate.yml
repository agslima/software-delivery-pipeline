name: "Release"

on:
  push:
    tags:
      - 'v*.*.*'
  # Used for test
  workflow_dispatch:
    inputs:
        tag:
          description: 'Release tag to build (vX.Y.Z)'
          type: string
          required: true
        enable_full_gate:
          description: 'Enable run-trivy, build/push and downstream scans'
          type: boolean
          default: false
        OVERRIDE_REPRODUCIBILITY_GATE:
          description: '⚠️ BREAK GLASS: Bypass reproducibility gate (Requires Incident Ticket)'
          type: boolean
          required: true
          default: false
permissions:
  contents: read
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve Release Tag
    runs-on: ubuntu-latest    
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
      - name: Set Release Tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            test -n "$INPUT_TAG" || { echo "::error::tag input required"; exit 1; }
            [[ "$INPUT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::Invalid tag: $INPUT_TAG"; exit 1; }
            echo "release_tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi   
          
  run-trivy:
    name: Run Trivy
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_full_gate }}
    needs: [resolve]
    permissions:
      contents: read
      security-events: write # Required to upload SARIF
      issues: write          # Required to open an incident issue on failure
      actions: read          # Required for workflow context resolution
    uses: ./.github/workflows/ci-security-deep.yml

  reproducibility-check:
    name: Reproducibility Check
    needs: [resolve]
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: backend
            manifest: Dockerfile.server
          - image_name: worker
            manifest: Dockerfile.worker
          - image_name: frontend
            manifest: Dockerfile.client
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            auth.docker.io:443
            github.com:443
            production.cloudflare.docker.com:443
            registry-1.docker.io:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0 # Required for accurate Git history timestamps
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v2.5.0
      - name: Run Composite Reproducibility Check (${{ matrix.image_name }})
        uses: ./.github/actions/reproducibility-check
        with:
          image-name: '${{ matrix.image_name }}'
          dockerfile-path: 'app/docker/${{ matrix.manifest }}'
          build-context: 'app'
          release-tag: ${{ needs.resolve.outputs.release_tag }}
          source-url: 'https://github.com/${{ github.repository }}'
          # If the manual input is true, allow the mismatch. Otherwise, enforce the hard gate.
          allow-mismatch: ${{ github.event.inputs.OVERRIDE_REPRODUCIBILITY_GATE == 'true' && 'true' || 'false' }}

  build-push-backend:
    name: Build & Push
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_full_gate }}
    needs: [resolve, run-trivy, reproducibility-check]
    permissions:
      contents: read           # Needed to read repository contents.
      packages: write          # Needed to login and upload attestations to ghcr.io.
      id-token: write          # Needed to get OIDC token for keyless signing
      attestations: write      # Needed to upload attestations to the repository.
      actions: read            # Needed to read workflow info.
      artifact-metadata: write # Needed to upload SBOM as artifact
    uses: ./.github/workflows/release-build-push-dual-registry.yml
    with:
      environment: production
      context: app
      file: app/docker/Dockerfile.server
      image_repo: app-stayhealthy-backend
      release_tag: ${{ needs.resolve.outputs.release_tag }}
      github_sha: ${{ github.sha }}
      platforms: linux/amd64
      dockerhub_username: ${{ vars.DOCKER_HUB_USERNAME }}
      ghcr_username: ${{ github.repository_owner }}
    secrets:      
      dockerhub_token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      ghcr_token: ${{ secrets.GITHUB_TOKEN }}
                    
  build-push-frontend:    
    name: Build & Push
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_full_gate }}
    needs: [resolve, run-trivy, reproducibility-check]
    permissions:
      contents: read           # Needed to read repository contents.
      packages: write          # Needed to login and upload attestations to ghcr.io.
      id-token: write          # Needed to get OIDC token for keyless signing
      attestations: write      # Needed to upload attestations to the repository.
      actions: read            # Needed to read workflow info.
      artifact-metadata: write # Needed to upload SBOM as artifact
    uses: ./.github/workflows/release-build-push-dual-registry.yml
    with:
      environment: production
      context: app
      file: app/docker/Dockerfile.client
      image_repo: app-stayhealthy-frontend
      release_tag: ${{ needs.resolve.outputs.release_tag }}
      github_sha: ${{ github.sha }}
      platforms: linux/amd64
      dockerhub_username: ${{ vars.DOCKER_HUB_USERNAME }}
      ghcr_username: ${{ github.repository_owner }}
    secrets:      
      dockerhub_token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      ghcr_token: ${{ secrets.GITHUB_TOKEN }}

  build-push-worker:    
    name: Build & Push
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_full_gate }}
    needs: [resolve, run-trivy, reproducibility-check]
    permissions:
      contents: read           # Needed to read repository contents.
      packages: write          # Needed to login and upload attestations to ghcr.io.
      id-token: write          # Needed to get OIDC token for keyless signing
      attestations: write      # Needed to upload attestations to the repository.
      actions: read            # Needed to read workflow info.
      artifact-metadata: write # Needed to upload SBOM as artifact
    uses: ./.github/workflows/release-build-push-dual-registry.yml
    with:
      environment: production
      context: app
      file: app/docker/Dockerfile.worker
      image_repo: app-stayhealthy-worker
      release_tag: ${{ needs.resolve.outputs.release_tag }}
      github_sha: ${{ github.sha }}
      platforms: linux/amd64
      dockerhub_username: ${{ vars.DOCKER_HUB_USERNAME }}
      ghcr_username: ${{ github.repository_owner }}
    secrets:      
      dockerhub_token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      ghcr_token: ${{ secrets.GITHUB_TOKEN }}
  
  trivy-scan:    
    name: Trivy Scan (Digest Gate)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_full_gate }}
    needs: [ build-push-frontend, build-push-backend, build-push-worker ]
    permissions:
      contents: read
      packages: write     # Used to push images to `ghcr.io` if used.
      id-token: write     # Needed to create an OIDC token for keyless signing
      attestations: write # Needed to upload attestations to the GitHub registry      
    uses: ./.github/workflows/release-static-risk.yml
    with:
      image-digest-backend: ${{ needs.build-push-backend.outputs.image-digest }}
      image-digest-frontend: ${{ needs.build-push-frontend.outputs.image-digest }}
      image-digest-worker: ${{ needs.build-push-worker.outputs.image-digest }}
      ghcr_username: ${{ github.repository_owner }}
      dockerhub_username: ${{ vars.DOCKER_HUB_USERNAME }}
    secrets:
      dockerhub_token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      ghcr_token: ${{ secrets.GITHUB_TOKEN }}
     
  dast-analysis:
    name: DAST (Digest-based)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_full_gate }}
    needs: [ build-push-frontend, build-push-backend, build-push-worker, resolve ]
    permissions:
      contents: read
      id-token: write     # Needed to create an OIDC token for keyless signing of the provenance.
      packages: write     # Used to pull images from `ghcr.io` if used.
      attestations: write # Needed to upload attestations to the GitHub registry
    uses: ./.github/workflows/release-dast.yml
    with:
      release_tag: ${{ needs.resolve.outputs.release_tag }}
      github_sha: ${{ github.sha }}
      image-digest-backend: ${{ needs.build-push-backend.outputs.image-digest }}
      image-digest-frontend: ${{ needs.build-push-frontend.outputs.image-digest }}
      image-digest-worker: ${{ needs.build-push-worker.outputs.image-digest }}
      dockerhub_username: ${{ vars.DOCKER_HUB_USERNAME }}
      ghcr_username: ${{ github.repository_owner }}
      admin_user: ${{ vars.ADMIN_USER }}
      db_user: ${{ vars.DB_USER }}
      db_name: ${{ vars.DB_NAME }}
    secrets:
      dockerhub_token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      admin_pass: ${{ secrets.ADMIN_PASS }}
      db_pass: ${{ secrets.DB_PASS }}
      jwt_secret: ${{ secrets.JWT_SECRET }}
      data_encryption_key: ${{ secrets.DATA_ENCRYPTION_KEY }}    
