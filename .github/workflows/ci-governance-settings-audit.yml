name: Governance Settings Audit

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Audit source: live GitHub settings or local fixtures"
        required: true
        default: live
        type: choice
        options:
          - live
          - fixtures-pass
          - fixtures-drift
  schedule:
    - cron: '0 6 1 1,4,7,10 *'

permissions:
  contents: read

jobs:
  governance-settings-audit:
    name: Governance Settings Audit
    runs-on: ubuntu-latest
    env:
      AUDIT_MODE: ${{ inputs.mode || 'live' }}
      GOVERNANCE_AUDIT_REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Governance Drift Check (README/evidence/workflows)
        run: |
          set -euo pipefail
          mkdir -p artifacts/governance-settings-audit
          make governance-drift-check 2>&1 | tee artifacts/governance-settings-audit/governance-drift-check.txt

      - name: Validate audit token availability
        if: env.AUDIT_MODE == 'live'
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB }}
        run: |
          set -euo pipefail
          test -n "${GH_TOKEN}" || {
            echo "::error::Missing PAT_GITHUB secret. Configure a fine-grained token with read-only Administration access for repository settings audit."
            exit 1
          }
          ENVIRONMENT_NAME="$(jq -r '.environment.name' .github/governance-settings-audit.json)"
          for API_PATH in \
            "repos/${GOVERNANCE_AUDIT_REPO}/rulesets?includes_parents=false" \
            "repos/${GOVERNANCE_AUDIT_REPO}/codeowners/errors" \
            "repos/${GOVERNANCE_AUDIT_REPO}/environments/${ENVIRONMENT_NAME}" \
            "repos/${GOVERNANCE_AUDIT_REPO}/environments/${ENVIRONMENT_NAME}/deployment-branch-policies"
          do
            if ! gh api -H "Accept: application/vnd.github+json" "${API_PATH}" >/dev/null; then
              echo "::error::PAT_GITHUB cannot read ${API_PATH}. Configure a fine-grained token with repository Administration read permission so the governance settings audit can query rulesets, CODEOWNERS enforcement, environments, and deployment branch policies."
              exit 1
            fi
          done

      - name: Run governance settings audit (live)
        if: env.AUDIT_MODE == 'live'
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB }}
        run: |
          set -euo pipefail
          chmod +x scripts/audit-governance-settings.sh
          scripts/audit-governance-settings.sh \
            --repo "${GOVERNANCE_AUDIT_REPO}" \
            --output-dir artifacts/governance-settings-audit

      - name: Run governance settings audit (fixtures-pass)
        if: env.AUDIT_MODE == 'fixtures-pass'
        run: |
          set -euo pipefail
          chmod +x scripts/audit-governance-settings.sh
          scripts/audit-governance-settings.sh \
            --repo "${GOVERNANCE_AUDIT_REPO}" \
            --fixtures-dir scripts/fixtures/governance-audit/pass \
            --output-dir artifacts/governance-settings-audit

      - name: Run governance settings audit (fixtures-drift)
        if: env.AUDIT_MODE == 'fixtures-drift'
        run: |
          set -euo pipefail
          chmod +x scripts/audit-governance-settings.sh
          scripts/audit-governance-settings.sh \
            --repo "${GOVERNANCE_AUDIT_REPO}" \
            --fixtures-dir scripts/fixtures/governance-audit/drift \
            --output-dir artifacts/governance-settings-audit

      - name: Publish summary to workflow run
        if: always()
        shell: bash
        run: |
          if [[ -f artifacts/governance-settings-audit/governance-drift-check.txt ]]; then
            {
              echo '## Governance Drift Check'
              echo
              echo '```text'
              cat artifacts/governance-settings-audit/governance-drift-check.txt
              echo '```'
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ -f artifacts/governance-settings-audit/summary.md ]]; then
            cat artifacts/governance-settings-audit/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload governance settings audit artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: governance-settings-audit
          path: artifacts/governance-settings-audit
          retention-days: 90
