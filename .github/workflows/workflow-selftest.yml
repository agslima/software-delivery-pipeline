name: Workflow Self-Test

on:
  schedule:
    - cron: "0 4 * * 0" # Sundays 04:00 UTC
      timezone: America/Sao_Paulo
  workflow_dispatch: {}
  pull_request:  # add itself for testing changes to this workflow
    paths:
      - '.github/workflows/workflow-selftest.yml'
permissions:
      contents: read
concurrency:
  group: workflow-selftest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check workflow files
        uses: ./.github/actions/install-actionlint
      - name: Check workflow files
        run: actionlint -color

  workflow-input-provenance:
    name: Workflow Input Provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install workflow provenance dependencies
        run: python3 -m pip install --require-hashes -r scripts/supply-chain/requirements-workflow-provenance.txt
      - name: Check workflow input provenance
        run: make check-provenance
