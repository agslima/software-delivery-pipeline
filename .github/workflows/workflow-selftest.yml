name: Workflow Self-Test

on:
  schedule:
    - cron: "0 4 * * 0" # Sundays 04:00
      timezone: 'America/Sao_Paulo'
  workflow_dispatch: {}
  workflow_call: {}
  pull_request:  # add itself for testing changes to this workflow
    paths:
      - '.github/workflows/workflow-selftest.yml'
permissions:
      contents: read
concurrency:
  group: workflow-selftest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: agslima/app-stayhealthy-pipeline/.github/actions/install-actionlint@15d9dd4d59697a40376935f5b8b795f6b34793e9
      - name: Check workflow files
        run: actionlint -color
  
  run_macaron:
    name: Run Oracle Macaron
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        persist-credentials: false
    # Check the GitHub Actions workflows in the repository for vulnerabilities.
    # Note: adjust the policy_purl to refer to your repository URL.
    - name: Run Macaron action
      id: run_macaron
      uses: oracle/macaron@4ddb55e3c9ef2c77b548be55c557078c4476fd9c # v0.24.0
      with:
        repo_path: ./
        policy_file: check-github-actions
        policy_purl: pkg:github.com/${{ github.repository }}@.*
        reports_retention_days: 2
