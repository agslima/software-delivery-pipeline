name: "CI/CD Pipeline"

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ==================================================================
  # STAGE 1: CI & VALIDATION
  # ==================================================================
  
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}      

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: 'app/server/package.json'
          cache: 'npm'
          cache-dependency-path: app/server/package-lock.json

      - name: Install Dependencies
        working-directory: app/server 
        run: npm ci
      
      - name: Unit Tests
        working-directory: app/server
        run: npm test

      # Secret Scanning
      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # (SAST) 
      # 3. TRIVY SETUP
      - name: Install Trivy
        run: |
          TRIVY_VERSION=0.58.1
          curl -sfL raw.githubusercontent.com/aquasecurity/trivy/v${TRIVY_VERSION}/contrib/install.sh | sh -s -- -b /usr/local/bin
          echo "Trivy installed successfully."

      # 4. TRIVY SCAN: Filesystem (Dependencies & Code Secrets)
      - name: Trivy Scan - Root FS
        run: |
          # A. Generate JSON for Governance Script (Includes ALL severities)
          trivy fs app/server \
            --scanners vuln,secret \
            --format json \
            --output trivy-results.json \
            || true
          
          # B. Generate SARIF for GitHub Security Tab (High/Critical Only)
          trivy fs app/server \
            --scanners vuln,secret \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-results.sarif \
            || true

      # 5. TRIVY SCAN: Kubernetes (IaC / Misconfigurations)
      - name: Trivy Scan - Infrastructure (K8s)
        run: |
          echo "Scanning Kubernetes Manifests..."
          trivy config k8s/ \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-k8s.sarif \
            || true

      # 6. Upload BOTH SARIF files (Code + K8s)
      - name: Upload Trivy SARIFs
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-code
      
      - name: Upload Trivy K8s Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-k8s.sarif
          category: trivy-infra

      # 7. Enforce Governance
      - name: Enforce Risk Acceptance Policy
        run: | 
          chmod +x scripts/check-security-debt.sh 
          # Point to the new Trivy JSON file
          scripts/check-security-debt.sh trivy-results.json
        
  # ------------------------------------------------------------------
  # JOB 2: Infrastructure Linting (Docker, Kubernetes)
  # ------------------------------------------------------------------
  infra-lint:
    name: Infrastructure Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # 1. Dockerfile Linting (Hadolint)
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: error

      # 2. DRIFT DETECTION (OPA / Conftest)
      - name: Policy Check - Dockerfile (OPA)
        uses: instrumenta/conftest-action@master
        with:
          files: app/Dockerfile
          policy: policies/dockerfile.rego
          # output: stdout

      # 3. SCHEMA VALIDATION (Kubeconform)
      - name: Validate K8s Manifests (Kubeconform)
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          entrypoint: "/kubeconform"
          args: "-summary -output text -ignore-missing-schemas k8s/"
            
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Install Kyverno CLI
        uses: kyverno/action-install-cli@v0.2.0
        with:
          release: 'v1.13.2'
          verify: true        
      
      - name: Kyverno Policy Unit Tests
        run: |
          kyverno test k8s/tests/
          echo "Kyverno Policy Unit Tests completed."
          
      - name: Validate Kubernetes Manifest Against Policy
        run: |
          kyverno apply k8s/policies/cluster-policy.yaml \
            --resource k8s/deployment.yaml \
            --values-file k8s/ci/apply-values.yaml \
            --audit-warn=false \
            || true
            
  # ------------------------------------------------------------------
  # JOB 3: Layer 4: Dynamic Analysis (DAST)
  # DAST: Only runs on Main branch (post-merge) or Tags to save PR time
  # ------------------------------------------------------------------
  dast-analysis:
      name: "DAST (OWASP ZAP)"
      runs-on: ubuntu-latest
      needs: [ code-quality, infra-lint ]
      if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
      permissions:
        contents: read
      steps:
        - uses: actions/checkout@v4
        
        # Use Buildx to use cache from previous runs
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Start App Container
          run: |
            docker build --load -t target-app ./app
            
            docker run -d -p 3000:8080 --name app-under-test target-app          
            
            echo "Waiting for application to launch..."          
            
            # Attempt to connect. If it times out after 60s, run the "||" block
            if ! timeout 60s bash -c 'until curl -s -f http://localhost:3000 > /dev/null; do sleep 2; done'; then
              echo "CRITICAL: Application failed to respond!"
              echo "DUMPING CONTAINER LOGS:"            
              # --- THIS COMMAND SAVES YOU HOURS OF DEBUGGING ---
              docker logs app-under-test
              # -------------------------------------------------            
              exit 1
            fi          
            
            echo "Application is live!"

        # Ensure ZAP container can write the report files
        - name: Fix Permissions for ZAP
          run: chmod -R 777 .

         # 2. RUN ZAP SCAN
         #- name: OWASP ZAP Baseline Scan
         # uses: zaproxy/action-baseline@v0.14.0
         # with:
         #   target: 'http://localhost:3000'
         #   fail_action: false # (Allows pipeline to pass, but still uploads the report)
         #   allow_issue_writing: false
         #   artifact_name: zap_scan            
         #   cmd_options: '-T 10' # options: '-a -T 10' (This forces a crash on ANY warning)
           
        - name: OWASP ZAP Baseline Scan
          run: |
            docker pull ghcr.io/zaproxy/zaproxy:stable
            docker run --network host -v $(pwd):/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:3000 \
            -J zap-report.json \
            -r zap-report.html \
            -I || true 
            # Note: We use '|| true' because we want to capture the results and attest them. 
            # We let Kyverno enforce the block later based on the data.

        - name: Upload ZAP Report
          uses: actions/upload-artifact@v4
          with:
            name: zap-results
            path: zap-report.json
            retention-days: 1

  # ==================================================================
  # STAGE 2: RELEASE (TAGS ONLY)
  # ==================================================================

  build-push:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [ code-quality, infra-lint, dast-analysis ] 
    if: startsWith(github.ref, 'refs/tags/v')
    # environment: production
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: true # Fail fast in production releases!
      matrix:
        include:
          - name: app
            context: ./app
            image_repo: software-delivery-pipeline

    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Enable Caching
      - name: Build & Push
        id: build
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: ${{ matrix.context }}
          push: true
          # Enable GitHub Actions Caching
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_repo }}:${{ github.sha }}
            ${{ format('{0}/{1}:{2}', secrets.DOCKER_HUB_USERNAME, matrix.image_repo, github.ref_name) }}

      - name: Export Digest
        run: |
          mkdir -p digests
          DIGEST="${{ steps.build.outputs.digest }}"
          
          # Debugging: Print digest to logs to prove it exists
          echo "Captured Digest: $DIGEST"
          
          if [[ -z "$DIGEST" ]]; then
            echo "Error: Digest is empty!"
            exit 1
          fi
          
          echo "$DIGEST" > digests/digest-${{ matrix.name }}
      
      - name: Upload Digest Artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.name }}     
          path: digests/digest-${{ matrix.name }}
          retention-days: 1
          if-no-files-found: error # Fail if file is missing

      # UPDATED: Generate & Upload Trivy JSON
      - name: Generate Trivy Report
        run: |
          # Use the exact SHA we just pushed to avoid race conditions
          IMAGE_REF="${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_repo }}:${{ github.sha }}"
          
          # Install Trivy (Using official script is safer/faster)
          TRIVY_VERSION=0.58.1
          curl -sfL raw.githubusercontent.com/aquasecurity/trivy/v${TRIVY_VERSION}/contrib/install.sh | sh -s -- -b /usr/local/bin
      
          trivy image \
            --format json \
            --output trivy-results.json \
            "$IMAGE_REF"

      - name: Upload Trivy JSON Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json
     
  # ------------------------------------------------------------------
  # JOB 2: SIGNING & ATTESTATION
  # ------------------------------------------------------------------
  sign-and-attest:
    name: Sign & Attest
    needs: build-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    # environment: production
    permissions:
      packages: write
      id-token: write
      attestations: write

    strategy:
      matrix:
        include:
          - name: app
            image_repo: software-delivery-pipeline

    steps:
      - uses: sigstore/cosign-installer@v3.7.0
      
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Download Digest Artifact
        uses: actions/download-artifact@v4
        with:
          name: digest-${{ matrix.name }}
          path: digests

      - name: Read Digest
        run: |
          # Verify file exists
          ls -R digests/
          
          DIGEST=$(cat digests/digest-${{ matrix.name }})
          echo "DIGEST=$DIGEST" >> $GITHUB_ENV
          echo "IMAGE=${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_repo }}@$DIGEST" >> $GITHUB_ENV

      # 1. Download Raw Reports
      - uses: actions/download-artifact@v4
        with:
          name: trivy-results
      - uses: actions/download-artifact@v4
        with:
          name: zap-results

      - name: Create & Push Trivy Attestation
        run: |
          # 1. Calculate Logic
          # 2. Output ONLY the inner predicate body (No "predicateType" wrapper here!)
          
          jq '
            ([.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length) as $crit |
            ([.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length) as $high |
            ([.Results[].Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length) as $med |
            ([.Results[].Vulnerabilities[]? | select(.Severity=="LOW")] | length) as $low |
            {
              scanner: {
                name: "trivy",
                version: "0.58.1",
                uri: "https://github.com/aquasecurity/trivy"
              },
              summary: {
                critical: $crit,
                high: $high,
                medium: $med,
                low: $low
              },
              result: (if ($crit > 0 or $high > 5) then "fail" else "pass" end),
              timestamp: (now | todate)
            }
          ' trivy-results.json > trivy-attestation.json

          # 3. Attest using the --type flag to define the URL
          cosign attest --yes \
            --predicate trivy-attestation.json \
            --type https://security.sigstore.dev/attestations/vuln/trivy/v1 \
            "$IMAGE"

      # 4. TRANSFORM ZAP JSON -> ATTESTATION PREDICATE
      - name: Create & Push ZAP Attestation
        run: |
          # Debugging: Verify exactly where the file is
          ls -R 
          # Output ONLY the inner predicate body
          jq '
            ([.site[].alerts[]? | select(.riskcode=="3")] | length) as $high |
            ([.site[].alerts[]? | select(.riskcode=="2")] | length) as $med |
            ([.site[].alerts[]? | select(.riskcode=="1")] | length) as $low |
            {
              scanner: {
                name: "owasp-zap",
                version: "2.14.0",
                uri: "https://www.zaproxy.org/"
              },
              target: {
                type: "http-service",
                url: "http://localhost:3000"
              },
              summary: {
                high: $high,
                medium: $med,
                low: $low
              },
              result: (if ($high > 0) then "fail" else "pass" end),
              timestamp: (now | todate)
            }
          ' zap-report.json > zap-attestation.json

          cosign attest --yes \
            --predicate zap-attestation.json \
            --type https://security.sigstore.dev/attestations/dast/zap/v1 \
            "$IMAGE"


      - run: cosign sign --yes "$IMAGE"

      - run: |
          cosign verify "$IMAGE" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp \
            "https://github.com/${{ github.repository }}/.github/workflows/.*"
      
      - uses: anchore/sbom-action@v0
        with:
          image: ${{env.IMAGE}}
          format: spdx-json
          output-file: sbom-${{ matrix.image_repo }}.spdx.json
          artifact-name: sbom-${{ matrix.image_repo }}.spdx.json

      - run: |
          cosign attest --yes --type spdx --predicate sbom-${{ matrix.image_repo }}.spdx.json "$IMAGE"

      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: index.docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_repo }}
          subject-digest: ${{ env.DIGEST }}
          push-to-registry: true
      
      - name: Verify Build Provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh attestation verify "oci://${{ env.IMAGE }}" \
            --repo "${{ github.repository }}"

  # ------------------------------------------------------------------
  # GitOps Enforcement  (Policy-as-Code)
  # ------------------------------------------------------------------
  gitops-enforcement:
    name: GitOps Enforcement
    needs: sign-and-attest
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && github.run_attempt == 1
    # environment: production
    permissions: 
      contents: write
      pull-requests: write
    strategy:
      matrix:
        include:
          - name: app
            image_repo: software-delivery-pipeline  
    steps:
      - uses: actions/checkout@v4
      - name: Download Digest Artifact
        uses: actions/download-artifact@v4
        with:
          name: digest-${{ matrix.name }}
          path: digests

      - name: Read Digest
        run: |
          DIGEST=$(cat digests/digest-${{ matrix.name }})
          echo "DIGEST=$DIGEST" >> $GITHUB_ENV  
          echo "IMAGE=${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_repo }}@$DIGEST" >> $GITHUB_ENV

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Install Kyverno CLI
        uses: kyverno/action-install-cli@v0.2.0
        with:
          release: 'v1.13.2'
          verify: true  
                
      - name: Configure Policy with Correct Username
        run: |
          # Dynamic Replacement to ensure policy matches secret
          sed -i "s|docker.io/agslima/|docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/|g" k8s/policies/cluster-policy.yaml
          sed -i "s|github.com/agslima/|github.com/${{ github.repository_owner }}/|g" k8s/policies/cluster-policy.yaml

      #- name: Create Kyverno Values File (Mocking Context)
      #  run: |
      #    cat <<EOF > kyverno-values.yaml
      #    policies:
      #      - name: enforce-governed-artifacts
      #        resources:
      #          - name: software-delivery-pipeline
      #            values:
      #              request.operation: UPDATE
      #          EOF

      - name: GitOps - Update Manifest Version
        run: |
          sed -i "s|image: .*|image: docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image_repo }}@${{ env.DIGEST }}|g" k8s/deployment.yaml
          
          echo "Updated Kubernetes Manifest:"
          cat k8s/deployment.yaml

      - name: Validate Kubernetes Manifest Against Policy
        run: |
          # Create a temp file to store logs
          LOG_FILE=$(mktemp)

          # ---------------------------------------------------
          # FIX 1: Add "|| true" so the script doesn't die immediately
          # ---------------------------------------------------
          kyverno apply k8s/policies/cluster-policy.yaml \
            --resource k8s/deployment.yaml \
            --values-file k8s/ci/apply-values.yaml \
            --audit-warn=false > "$LOG_FILE" 2>&1 || true
          
          # Now this will actually run and show you the error!
          cat "$LOG_FILE"
          
          # ---------------------------------------------------
          # FIX 2: Check logic handles the rest
          # ---------------------------------------------------
          
          # 1. Check for the "Policies Skipped" (Variable Mismatch) error
          if grep -q "Policies Skipped" "$LOG_FILE"; then
            echo "::error::❌ CONFIG ERROR: Digest mismatch between Deployment and Values file."
            exit 1
          fi

          # 2. Check for actual policy violations (fail count > 0)
          if ! grep -q "fail: 0" "$LOG_FILE"; then
            echo "::error::❌ Policy Violation Detected."
            exit 1
          fi

          echo "✅ Policy successfully applied and validated."      

      - name: Commit & Push GitOps Update
        run: |
          set -euo pipefail

          BRANCH="gitops/update-app-${{ github.ref_name }}"
          git checkout -B "$BRANCH"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/deployment.yaml

          if git diff --staged --quiet; then
            echo "No changes detected, skipping commit."
            exit 0
          fi

          git commit -m "gitops: deploy app @ ${{ env.DIGEST }}"
          git push origin "$BRANCH"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB }}
        run: |
          gh pr create \
            --head "gitops/update-app-${{ github.ref_name }}" \
            --base main \
            --title "Deploy app ${{ github.ref_name }}" \
            --body "Automated GitOps update. Image digest: ${{ env.DIGEST }}" \
            || echo "PR already exists."            
