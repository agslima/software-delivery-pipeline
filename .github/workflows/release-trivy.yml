name: Release - Trivy Scan & Attest

permissions:
  contents: read
defaults:
  run:
    shell: bash
on:
  workflow_call:
    secrets:      
      ghcr_token:
        description: 'GitHub Token for GHCR authentication'
        required: true
      dockerhub_token:
        description: 'Docker Hub access token'
        required: true
    inputs:
      ghcr_username:
        description: 'GitHub Username/Repository Owner'
        required: true
        type: string
      dockerhub_username:
        description: 'Docker Hub username'
        required: true
        type: string
      image-digest-backend:
        description: 'Backend image digest (sha256:...)'
        required: true
        type: string
      image-digest-frontend:
        description: 'Frontend image digest (sha256:...)'
        required: true
        type: string
      image-digest-worker:
        description: 'Worker image digest (sha256:...)'
        required: true
        type: string

jobs:
  trivy-release-scan:
    name: Run Trivy Image
    timeout-minutes: 15
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image_repo: app-stayhealthy-backend
            image-digest: ${{ inputs.image-digest-backend }}
            exposure: public
            criticality: high            
          - name: worker
            image_repo: app-stayhealthy-worker
            image-digest: ${{ inputs.image-digest-worker }}
            exposure: internal
            criticality: medium
          - name: frontend
            image_repo: app-stayhealthy-frontend
            image-digest: ${{ inputs.image-digest-frontend }}
            exposure: public
            criticality: medium
    env:
      DOCKER_USERNAME: ${{ inputs.dockerhub_username }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.70.0
          cache: false
      - name: Docker Hub Login  
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0  
        with:  
          username: ${{ inputs.dockerhub_username }}  
          password: ${{ secrets.dockerhub_token }}  
      - name: Scan Image (JSON)
        run: |
          set -euo pipefail
    
          IMAGE="docker.io/${DOCKER_USERNAME}/${{ matrix.image_repo }}@${{ matrix.image-digest }}"
          docker manifest inspect "$IMAGE" >/dev/null 2>&1 \
            || { echo "::error::Image not found (digest check failed)"; exit 1; }

          echo "Scanning $IMAGE"
          trivy image \
            --format json \
            --output "trivy-${{ matrix.name }}.json" \
            "$IMAGE"
          
          # Explicit output checks (fail closed)
          test -s "trivy-${{ matrix.name }}.json" || (echo "::error::Trivy JSON missing/empty"; exit 1)
          jq -e '.Results? | type=="array"' "trivy-${{ matrix.name }}.json" >/dev/null
      - name: Upload Trivy Scan Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-results-${{ matrix.name }}
          path: trivy-${{ matrix.name }}.json
      - name: Gate (CRITICAL>0 or HIGH>5)
        run: |
          set -euo pipefail
          FILE="trivy-${{ matrix.name }}.json"
          CRIT=$(jq '[.Results[]? | (.Vulnerabilities // [])[] | select(.Severity=="CRITICAL")] | length' "$FILE")
          HIGH=$(jq '[.Results[]? | (.Vulnerabilities // [])[] | select(.Severity=="HIGH")] | length' "$FILE")
          echo "CRITICAL=$CRIT HIGH=$HIGH"

          if [ "$CRIT" -gt 0 ] || [ "$HIGH" -gt 5 ]; then
            echo "::error::⛔ Trivy Gate Failed for ${{ matrix.name }} (CRIT=$CRIT HIGH=$HIGH)"
            exit 1
          fi
          echo "✅ Trivy Gate Passed"
          
  sign-and-attest:
    name: Sign & Attest
    timeout-minutes: 10
    if: success()  # Ensure all scans passed
    runs-on: ubuntu-latest
    needs: [ trivy-release-scan ]
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    env:
      DOCKER_USERNAME: ${{ inputs.dockerhub_username }}
      TRIVY_VERSION: v0.70.0 # Needed in the attestation predicate
      TRIVY_PREDICATE_TYPE: "https://security.sigstore.dev/attestations/vuln/trivy/v1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image_repo: app-stayhealthy-backend
            image-digest: ${{ inputs.image-digest-backend }}
          - name: worker
            image_repo: app-stayhealthy-worker
            image-digest: ${{ inputs.image-digest-worker }}
          - name: frontend
            image_repo: app-stayhealthy-frontend
            image-digest: ${{ inputs.image-digest-frontend }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 #v4.1.1
      - name: Docker Hub Login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ inputs.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}
      - name: GHCR Login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0  
        with:  
          registry: ghcr.io  
          username: ${{ inputs.ghcr_username }}  
          password: ${{ secrets.ghcr_token }} 
      - name: Download Trivy scan artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: trivy-results-${{ matrix.name }}
          path: trivy-downloads
      - name: Read Digest
        run: |
          set -euo pipefail
          DIGEST="${{ matrix.image-digest }}"
          echo "DIGEST=$DIGEST" >> "$GITHUB_ENV"
          echo "DOCKER_IMAGE=docker.io/${DOCKER_USERNAME}/${{ matrix.image_repo }}@${DIGEST}" >> "$GITHUB_ENV"
          echo "GHCR_IMAGE=ghcr.io/${{ github.repository_owner }}/${{ matrix.image_repo }}@${DIGEST}" >> "$GITHUB_ENV"
      - name: Create the attestation predicate (from scan artifact)
        run: |
          set -euo pipefail
          FILE="trivy-downloads/trivy-${{ matrix.name }}.json"
          test -s "$FILE" || (echo "::error::Missing trivy JSON"; exit 1)

          jq -n \
            --arg digest "${DIGEST}" \
            --arg repo "${{ matrix.image_repo }}" \
            '
             ([.Results[]? | (.Vulnerabilities // [])[] | select(.Severity=="CRITICAL")] | length) as $crit |
             ([.Results[]? | (.Vulnerabilities // [])[] | select(.Severity=="HIGH")] | length) as $high |
             {
               scanner: { name: "trivy", version: env.TRIVY_VERSION, uri: "https://github.com/aquasecurity/trivy" },
               image_digest: $digest,
               image_repo: $repo,
               summary: { critical: $crit, high: $high },
               result: (if ($crit > 0 or $high > 5) then "FAIL" else "PASS" end),
               timestamp: (now | todate)
             }
            ' "$FILE" > trivy-attestation-${{ matrix.name }}.json
      - name: Trivy Attestations
        run: |
          set -euo pipefail
          echo "Signing starts: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          IMAGES=("$DOCKER_IMAGE" "$GHCR_IMAGE")
          FAILURES=()
          for IMAGE in "${IMAGES[@]}"; do
            echo "Attest image: $IMAGE"
            REPO_PATH=$(echo "$IMAGE" | cut -d'@' -f1)
            export COSIGN_REPOSITORY="$REPO_PATH"
            if cosign attest --yes \
              --predicate trivy-attestation-${{ matrix.name }}.json \
              --type "$TRIVY_PREDICATE_TYPE" \
              "$IMAGE"; then
              echo "✅ Attested: $IMAGE"
            else
              FAILURES+=("$IMAGE")
            fi
          done
          if [ ${#FAILURES[@]} -gt 0 ]; then
            echo "::error::Failed to attest: ${FAILURES[*]}"
            exit 1
          fi
          echo "Attestation finished: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
      - name: Upload Trivy Predicate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-attestation-${{ matrix.name }}
          path: trivy-attestation-${{ matrix.name }}.json
