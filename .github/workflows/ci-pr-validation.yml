name: CI
on:
  workflow_dispatch: {}
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================================================================
  # JOB 1: TEST & CODE QUALITY
  # ==================================================================
  code-quality:
    name: Code Quality (${{ matrix.component }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        component: ['server', 'client']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version-file: 'app/${{ matrix.component }}/package.json'
          cache: 'npm'
          cache-dependency-path: 'app/${{ matrix.component }}/package-lock.json'

      - name: Install Dependencies
        working-directory: app/${{ matrix.component }}
        run: npm ci --ignore-scripts

      - name: Lint
        working-directory: app/${{ matrix.component }}
        run: npm run lint

      - name: Unit Tests (TDD)
        working-directory: app/${{ matrix.component }}
        run: npm test

  # ==================================================================
  # JOB 2: INFRASTRUCTURE LINTING
  # ==================================================================   
  infra-lint:
    name: Infra Hygiene
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
        include:
          - service: backend
            path: app/docker/Dockerfile.server
          - service: frontend
            path: app/docker/Dockerfile.client
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      # 1. Hadolint (Lints the syntax)
      - name: Lint Dockerfile (${{ matrix.service }})
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 #v3.3.0
        with:
          dockerfile: ${{ matrix.path }}
          failure-threshold: error

      # 2. Conftest (OPA Policy)
      - name: Setup Conftest
        uses: princespaghetti/setup-conftest@417586a9b2e806fc5a95c72dfe98e296ef092b6f #v1.0.0

      - name: Run OPA Policy (${{ matrix.service }})
        run: |
          # Copy the specific file to a generic name for the policy check
          cp ${{ matrix.path }} Dockerfile
          conftest test Dockerfile \
            --policy policies/dockerfile.rego

      # 3. Kubeconform (Kubernetes Manifests)
      - name: Validate K8s Manifests
        if: matrix.service == 'backend'
        uses: docker://ghcr.io/yannh/kubeconform@sha256:0474f7372c0089c41890101f0e293db5798e05942c98bbcf8359f206731115ea # v0.7.0
        with:
          entrypoint: "/kubeconform"
          args: "-summary -output text -ignore-missing-schemas k8s/"

  # ==================================================================
  # JOB 3: Security Scan (Code + IaC)
  # ==================================================================
  security-scan:
    name: Security Quality Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0

      # 1. Secret Scanning
      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Trivy DB
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ github.workflow }}
          restore-keys: |
            trivy-db-${{ runner.os }}-
      - name: Set scan skip dirs
        id: vars
        run: |
          echo "SKIP_DIRS=node_modules,dist,build,vendor,coverage,.git,.cache,.venv,tmp" >> "$GITHUB_OUTPUT"
      
      # 4. TRIVY SCAN: Filesystem (Dependencies & Code Secrets)
      - name: Trivy Scan - Root FS
        id: trivy-scan
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478
        with:
          scan-type: 'fs'
          scan-ref: .
          scanners: 'vuln'
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
          format: 'table'
          skip-dirs: ${{ steps.vars.outputs.SKIP_DIRS }}
          ignore-unfixed: true
          exit-code: 1
      
      - name: Trivy config scan (misconfig) - gate
        id: trivy-config-scan
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          exit-code: "1"
          skip-dirs: ${{ steps.vars.outputs.SKIP_DIRS }}
      
      - name: 🚨 Notify Slack on Failure
        if: failure() && steps.trivy-scan.outcome == 'failure'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: '#ff0000'
          SLACK_TITLE: 'Security Gate Blocked Merge'
          SLACK_MESSAGE: 'Trivy found Critical vulnerabilities. Auto-merge has been aborted.'
          SLACK_USERNAME: 'Security Bot'
          SLACK_ICON: 'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'

