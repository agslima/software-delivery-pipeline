name: CI – PR Validation
on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================================================================
  # JOB 1: TEST & CODE QUALITY
  # ==================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # --- 1. BACKEND (Node.js) ---
      - name: Setup Node.js (Backend)
        uses: actions/setup-node@v3
        with:
          node-version-file: 'app/server/package.json'
          cache: 'npm'
          cache-dependency-path: app/server/package-lock.json

      - name: Install Backend Deps
        working-directory: app/server
        run: npm ci

      - name: Unit Tests (TDD)
        working-directory: app/server
        run: npm test

      - name: Lint Backend
        working-directory: app/server
        run: npm run lint


      # --- 2. FRONTEND (React) ---
      - name: Install Frontend Deps
        working-directory: app/client
        run: npm ci

      - name: Lint Frontend
        working-directory: app/client
        run: npm run lint

      - name: Test Frontend
        working-directory: app/client
        run: npm test -- --passWithNoTests
  
  # ==================================================================
  # JOB 2: INFRASTRUCTURE LINTING
  # ==================================================================   
  infra-lint:
    name: Infra Hygiene
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
        include:
          - service: backend
            path: app/docker/Dockerfile.server
          - service: frontend
            path: app/docker/Dockerfile.client
    steps:
      - uses: actions/checkout@v4

      # 1. Hadolint (Lints the syntax)
      - name: Lint Dockerfile (${{ matrix.service }})
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ matrix.path }}
          failure-threshold: error

      # 2. Conftest (OPA Policy)
      - name: Setup Conftest
        uses: princespaghetti/setup-conftest@v1 

      - name: Run OPA Policy (${{ matrix.service }})
        run: |
          # Copy the specific file to a generic name for the policy check
          cp ${{ matrix.path }} Dockerfile
          
          conftest test Dockerfile \
            --policy policies/dockerfile.rego

      # 3. Kubeconform (Kubernetes Manifests)
      - name: Validate K8s Manifests
        if: matrix.service == 'backend'
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          entrypoint: "/kubeconform"
          args: "-summary -output text -ignore-missing-schemas k8s/"
