name: CI
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================================================================
  # JOB 1: TEST & CODE QUALITY
  # ==================================================================
  code-quality:
    name: Code Quality (${{ matrix.component }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        component: ['server', 'client']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version-file: 'app/${{ matrix.component }}/package.json'
          cache: 'npm'
          cache-dependency-path: 'app/${{ matrix.component }}/package-lock.json'
      - name: Install Dependencies
        working-directory: app/${{ matrix.component }}
        run: npm ci --ignore-scripts
      - name: Lint
        working-directory: app/${{ matrix.component }}
        run: npm run lint
      - name: Unit Tests (TDD)
        working-directory: app/${{ matrix.component }}
        run: npm test

  # ==================================================================
  # JOB 2: INFRASTRUCTURE LINTING
  # ==================================================================   
  infra-lint:
    name: Infra Hygiene
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
        include:
          - service: backend
            path: app/docker/Dockerfile.server
          - service: frontend
            path: app/docker/Dockerfile.client
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      # 1. Hadolint (Lints the syntax)
      - name: Lint Dockerfile (${{ matrix.service }})
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 #v3.3.0
        with:
          dockerfile: ${{ matrix.path }}
          failure-threshold: error
      # 2. Conftest (OPA Policy)
      - name: Setup Conftest
        uses: princespaghetti/setup-conftest@417586a9b2e806fc5a95c72dfe98e296ef092b6f #v1.0.0

      - name: Run OPA Policy (${{ matrix.service }})
        run: |
          # Copy the specific file to a generic name for the policy check
          cp ${{ matrix.path }} Dockerfile
          conftest test Dockerfile \
            --policy policies/dockerfile.rego
      # 3. Kubeconform (Kubernetes Manifests)
      - name: Validate K8s Manifests
        if: matrix.service == 'backend'
        uses: docker://ghcr.io/yannh/kubeconform@sha256:0474f7372c0089c41890101f0e293db5798e05942c98bbcf8359f206731115ea # v0.7.0
        with:
          entrypoint: "/kubeconform"
          args: "-summary -output text -ignore-missing-schemas k8s/"
      - name: Install Cosign
        if: matrix.service == 'backend'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 #v4.1.1
      - name: Install Kyverno CLI
        if: matrix.service == 'backend'
        uses: kyverno/action-install-cli@fcee92fca5c883169ef9927acf543e0b5fc58289 # v0.2.0
        with:
          release: 'v1.17.1'
          verify: true
      - name: Run Kyverno Policy Tests
        if: matrix.service == 'backend'
        run: |
          kyverno test k8s/tests/
          kyverno test k8s/tests/ -f k8s/tests/policy-test.yaml
          kyverno test k8s/tests/ -f k8s/tests/cluster-verify-test.yaml

  migration-safety:
    name: Migration Safety
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Write PR body to file
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          cat > /tmp/pr-body.md <<'EOF'
          $PR_BODY
          EOF
      - name: Validate migration safety
        env:
          MIGRATION_CHECK_BASE: ${{ github.event.pull_request.base.sha }}
          MIGRATION_CHECK_HEAD: ${{ github.event.pull_request.head.sha }}
          MIGRATION_CHECK_PR_BODY_FILE: /tmp/pr-body.md
        run: python3 scripts/check-migration-safety.py

  # ==================================================================
  # JOB 4: Governance & Security Scan (Code + IaC)
  # ==================================================================
  governance-and-security-scan:
    name: Governance & Security Quality Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      security-events: read
    env:
      TRIVY_CACHE_DIR: ${{ github.workspace }}/.trivy-cache
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
      - name: Governance Drift Check (docs/workflow refs)
        run: make governance-drift-check
      - name: Governance Metadata Freshness Check
        run: make governance-metadata-check
      - name: Workflow Input Provenance Check (dry run)
        id: workflow-input-provenance
        continue-on-error: true
        run: make workflow-input-provenance-check
      - name: Workflow Input Provenance Check Result
        if: steps.workflow-input-provenance.outcome == 'failure'
        run: |
          echo "::warning::Workflow input provenance dry run detected mutable high-trust workflow inputs. Review the 'Workflow Input Provenance Check (dry run)' step output before promoting this control to a blocking gate."
      # 1. Secret Scanning
      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Compute Trivy DB cache key
        id: trivy-db-key
        run: echo "week=$(date -u +%G-%V)" >> "$GITHUB_OUTPUT"
      - name: Cache Trivy DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.TRIVY_CACHE_DIR }}
          key: trivy-db-${{ runner.os }}-${{ github.workflow }}-${{ steps.trivy-db-key.outputs.week }}
          restore-keys: |
            trivy-db-${{ runner.os }}-
      - name: Create Cache Dir
        run: mkdir -p "${{ env.TRIVY_CACHE_DIR }}"
      - name: Set scan skip dirs
        id: vars
        run: |
          # Keep policy fixtures in FS dependency scope, but exclude them from config misconfig scans
          # because test fixtures intentionally include insecure manifests.
          echo "FS_SKIP_DIRS=node_modules,dist,build,vendor,coverage,.git,.cache,.venv,tmp" >> "$GITHUB_OUTPUT"
          echo "CONFIG_SKIP_DIRS=k8s/tests,node_modules,dist,build,vendor,coverage,.git,.cache,.venv,tmp" >> "$GITHUB_OUTPUT"
      # TRIVY SCAN: Filesystem (Dependencies & Code Secrets)
      - name: Trivy Scan - Root FS
        id: trivy-scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: 'fs'
          scan-ref: .
          scanners: 'vuln'
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
          format: 'table'
          skip-dirs: ${{ steps.vars.outputs.FS_SKIP_DIRS }}
          ignore-unfixed: true
          exit-code: 1
      - name: Trivy config scan (misconfig) - gate
        id: trivy-config-scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          exit-code: "1"
          skip-dirs: ${{ steps.vars.outputs.CONFIG_SKIP_DIRS }}
