name: Security Scan

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}  # allow manual runs for testing
  pull_request:  # add itself for testing changes to this workflow
    paths:
      - '.github/workflows/ci-security-deep.yml'

concurrency:
  group: ci-security-deep-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ==================================================================
  # JOB 1: Security Governance (Single Trivy Scan)
  # ==================================================================
  security-governance:
    name: Security Governance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: write
      security-events: write
      issues: write
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
        with:
          fetch-depth: 0

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # TRIVY
      - name: Trivy Scan - Infrastructure
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-infra.sarif'
          severity: 'HIGH,CRITICAL'
          hide-progress: true
        continue-on-error: true

      # 2. CODE SCAN (Vulns & Secrets only)
      - name: Trivy Scan - Code
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,secret'
          format: 'sarif'
          output: 'trivy-code.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          skip-dirs: "node_modules,dist,build"
          hide-progress: true
        continue-on-error: true

      # 3. GOVERNANCE DATA (Full Scan)    
      - name: Generate Governance JSON
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,secret,config'
          format: 'json'
          output: 'trivy-governance.json'
          severity: 'MEDIUM,HIGH,CRITICAL'
          skip-dirs: "node_modules,dist,build"

      # Explicit output checks (The Gatekeeper)
      - name: Validate Scanner Outputs
        run: |
          set -euo pipefail
          test -s trivy-governance.json || (echo "::error::Missing/empty trivy-governance.json"; exit 1)
          test -s trivy-code.sarif || (echo "::error::Missing/empty trivy-code.sarif"; exit 1)
          test -s trivy-infra.sarif || (echo "::error::Missing/empty trivy-infra.sarif"; exit 1)
          echo "✅ Trivy outputs verified."

      # Reporting (Only runs if Validation passed)
      - name: Upload Trivy SARIF (Code)
        uses: github/codeql-action/upload-sarif@cdefb33c0f6224e58673d9004f47f7cb3e328b89 #v4.0.0
        with:
          sarif_file: trivy-code.sarif
          category: code

      - name: Upload Trivy SARIF (Infra)
        uses: github/codeql-action/upload-sarif@cdefb33c0f6224e58673d9004f47f7cb3e328b89 # v4.0.0
        with:
          sarif_file: trivy-infra.sarif
          category: infrastructure

      # Upload artifacts
      - name: Upload Trivy Artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f #v6.0.0
        if: always()
        with:
          name: trivy-deep-scan
          path: |
            trivy-governance.json
            trivy-code.sarif
            trivy-infra.sarif
          retention-days: 2

      # Governance gate
      - name: Enforce Risk Acceptance Policy
        run: |
          set -euo pipefail
          chmod +x scripts/check-security-debt.sh
          ./scripts/check-security-debt.sh trivy-governance.json

      # Auto-create issue on failure (idempotent per day)
      - name: Create Issue on Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TODAY="$(date -u +%Y-%m-%d)"
          TITLE="🚨 Security Deep Scan Failed (${TODAY})"
          BODY=$(cat <<EOF
          **Workflow:** CI – Security Deep Scan
          **Date (UTC):** ${TODAY}
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          **What to check**
          - Download artifact: \`trivy-deep-scan\`
          - Review Security tab SARIF alerts
          - Validate Trivy DB/network health if outputs are missing
          EOF
          )

          # Create only if not already created today
          if gh issue list --limit 50 --search "$TITLE" --json title | grep -q "$TITLE"; then
            echo "Issue already exists for today."
            exit 0
          fi

          gh issue create --title "$TITLE" --body "$BODY" --label "security" --label "governance"

  # ==================================================================
  # JOB 2: DAST
  # ==================================================================
  dast-scan:
    name: DAST (Lightweight)
    runs-on: ubuntu-latest
    needs: [security-governance]
    permissions:
      contents: read
      issues: write

    env:
      ZAP_IMG: ghcr.io/zaproxy/zaproxy:stable
      ZAP_FRONTEND_URL: http://127.0.0.1:4173
      ZAP_BACKEND_URL: http://127.0.0.1:8080
      HEALTH_TIMEOUT: "120" # seconds
      COMPOSE_PROJECT_NAME: dast-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      # 1) Variables + real Compose secrets (file-based, outside repo)
      - name: Set Variables + Compose Secrets (file-based)
        working-directory: app
        run: |
          set -euo pipefail

          # Keep secrets OUT of workspace: use RUNNER_TEMP
          SECRETS_DIR="${RUNNER_TEMP}/compose-secrets"
          ENV_FILE=".env"

          rm -f "$ENV_FILE"
          rm -rf "$SECRETS_DIR"
          mkdir -p "$SECRETS_DIR"

          # Non-secret env vars
           {
            echo "ADMIN_USER=${{ vars.ADMIN_USER }}"
            echo "DB_USER=${{ vars.DB_USER }}"
            echo "DB_NAME=${{ vars.DB_NAME }}"
            echo "COMPOSE_PROJECT_NAME=${{ env.COMPOSE_PROJECT_NAME }}"
            echo "SECRETS_PATH=${SECRETS_DIR}"
          } >> "$ENV_FILE"
          chmod 644 "$ENV_FILE"

          # Compose secrets files
          printf "%s" "${{ secrets.JWT_SECRET }}" > "${SECRETS_DIR}/jwt_secret.txt"
          printf "%s" "${{ secrets.ADMIN_PASS }}" > "${SECRETS_DIR}/admin_pass.txt"
          printf "%s" "${{ secrets.DB_PASS }}" > "${SECRETS_DIR}/db_pass.txt"
          chmod 600 "${SECRETS_DIR}"/*.txt

          echo "Secrets dir: ${SECRETS_DIR}"

      # 2) Ephemeral env (compose) + readiness checks      
      - name: Start Ephemeral Environment
        working-directory: app
        run: |
          set -euo pipefail

          docker compose up -d --build

          echo "⏳ Waiting for Backend health..."
          timeout "${{ env.HEALTH_TIMEOUT }}s" bash -c \
            'until curl -fsS http://127.0.0.1:8080/health >/dev/null; do sleep 5; done'

          echo "⏳ Waiting for Frontend..."
          timeout "${{ env.HEALTH_TIMEOUT }}s" bash -c \
            'until curl -fsS http://127.0.0.1:4173/health >/dev/null; do sleep 5; done'

          # Optional: stronger frontend check (serves index)
          echo "⏳ Verifying Frontend serves content..."
          timeout "${{ env.HEALTH_TIMEOUT }}s" bash -c \
            'until curl -fsS http://127.0.0.1:4173/ | head -n 1 | grep -qi "<!doctype"; do sleep 5; done' || true

          docker compose ps
          echo "✅ Application is live!"

      # 3) ZAP scan (Frontend + Backend)
      - name: OWASP ZAP Baseline (Frontend)
        working-directory: app
        run: |
          set -euo pipefail
          mkdir -p zap-out
          chmod 777 zap-out

          VOL_PATH="$(pwd)/zap-out"
          echo "ZAP volume: $VOL_PATH"
          echo "ZAP image: ${{ env.ZAP_IMG }}"

          docker run --rm \
            --network host \
            -v "$VOL_PATH:/zap/wrk/:rw" \
            "${{ env.ZAP_IMG }}" zap-baseline.py \
            -t "${{ env.ZAP_FRONTEND_URL }}" \
            -r zap-frontend.html \
            -J zap-frontend.json \
            -I || true

          test -s "zap-out/zap-frontend.json" || (echo "::error::ZAP frontend JSON missing/empty (scanner crash?)"; exit 1)
          jq -e 'type=="object"' "zap-out/zap-frontend.json" >/dev/null

      - name: OWASP ZAP Baseline (Backend)
        working-directory: app
        run: |
          set -euo pipefail
          VOL_PATH="$(pwd)/zap-out"
          test -d "$VOL_PATH" || (echo "::error::zap-out missing (previous step failed?)"; exit 1)

          docker run --rm \
            --network host \
            -v "$VOL_PATH:/zap/wrk/:rw" \
            "${{ env.ZAP_IMG }}" zap-baseline.py \
            -t "${{ env.ZAP_BACKEND_URL }}" \
            -r zap-backend.html \
            -J zap-backend.json \
            -I || true

          test -s "zap-out/zap-backend.json" || (echo "::error::ZAP backend JSON missing/empty (scanner crash?)"; exit 1)
          jq -e 'type=="object"' "zap-out/zap-backend.json" >/dev/null


      # 4) Gate: High findings must be 0 (frontend + backend)      
      - name: Gate ZAP (High > 0)
        working-directory: app
        run: |
          set -euo pipefail

          FE="zap-out/zap-frontend.json"
          BE="zap-out/zap-backend.json"

          HIGH_FE=$(jq '[.site[]? | .alerts[]? | select(.riskcode=="3")] | length' "$FE")
          HIGH_BE=$(jq '[.site[]? | .alerts[]? | select(.riskcode=="3")] | length' "$BE")

          echo "Frontend High=$HIGH_FE"
          echo "Backend  High=$HIGH_BE"

          # Write summary for later steps
          {
            echo "HIGH_FE=$HIGH_FE"
            echo "HIGH_BE=$HIGH_BE"
          } >> "$GITHUB_ENV"

          if [ "$HIGH_FE" -gt 0 ] || [ "$HIGH_BE" -gt 0 ]; then
            echo "::error::⛔ DAST Gate Failed (FE High=$HIGH_FE, BE High=$HIGH_BE)"
            exit 1
          fi

          echo "✅ DAST Gate Passed"

      # 5) Upload artifacts      
      - name: Upload ZAP Artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: zap-results
          path: app/zap-out/
          retention-days: 3

      # 6) Debug logs on failure      
      - name: Debug - Container Logs
        if: failure()
        working-directory: app
        run: |
          docker compose ps || true
          docker compose logs --no-color || true

      # 7) Alerting: create issue on failure (idempotent per day+workflow)      
      - name: Create Issue on Failure
        if: failure() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TODAY="$(date -u +%Y-%m-%d)"
          KEY="DAST_FAIL_${TODAY}_${{ github.workflow }}"

          TITLE="🚨 DAST Failed (${TODAY})"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          HIGH_FE="${HIGH_FE:-unknown}"
          HIGH_BE="${HIGH_BE:-unknown}"

          BODY=$(cat <<EOF
          **Key:** ${KEY}
          **Workflow:** ${{ github.workflow }}
          **Date (UTC):** ${TODAY}
          **Run:** ${RUN_URL}

          **Counts**
          - Frontend High: ${HIGH_FE}
          - Backend High: ${HIGH_BE}

          **Artifacts**
          - \`zap-results\` (HTML + JSON)

          **Triage**
          1) Open \`zap-frontend.html\` / \`zap-backend.html\`
          2) Confirm auth flows, redirects, CSP/headers, CORS behavior
          3) Review compose logs in the run output (step: Debug - Container Logs)
          EOF
          )

          # Idempotency: if an issue with the same Key exists, don't spam.
          if gh issue list --limit 100 --search "${KEY}" --json title,body | jq -e --arg k "${KEY}" '.[] | select(.body | contains($k))' >/dev/null; then
            echo "Issue already exists for ${KEY}."
            exit 0
          fi

          gh issue create \
            --title "$TITLE" \
            --body "$BODY" \
            --label "security" \
            --label "dast"

      - name: Cleanup Secrets + Env
        if: always()
        working-directory: app
        run: |
          set -euo pipefail
          rm -f .env
          if [ -n "${COMPOSE_SECRETS_DIR:-}" ] && [ -d "${COMPOSE_SECRETS_DIR:-}" ]; then
            rm -rf "${COMPOSE_SECRETS_DIR}"
          fi

      - name: Teardown
        if: always()
        working-directory: app
        run: docker compose down -v --remove-orphans
