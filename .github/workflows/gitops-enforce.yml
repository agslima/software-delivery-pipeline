name: GitOps Enforcement

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Release Run ID to promote'
        required: true
  workflow_run:
    workflows: ["Release"]
    types: [completed]
permissions:
  contents: read

concurrency:
  group: gitops-${{ github.event.workflow_run.id || github.event.inputs.run_id || github.run_id }}
  cancel-in-progress: false
  
jobs:      
  verify-context:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_run_id: ${{ steps.source-validation.outputs.release_run_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Validate Source and Get Run ID
        id: source-validation
        uses: ./.github/actions/validate-promotion
        with:
          run_id: ${{ github.event.inputs.run_id }} # Only populated on workflow_dispatch

  gitops:
    runs-on: ubuntu-latest
    needs: [verify-context]
    if: ${{ needs.verify-context.result == 'success' }}
    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write 
    env:      
      TRIVY_WORKFLOW_PATH: ".github/workflows/release-trivy.yml"      
      ZAP_WORKFLOW_PATH: ".github/workflows/release-dast.yml"
      BUILD_WORKFLOW_PATH: ".github/workflows/release-build-push-dual-registry.yml"
      TRIVY_PREDICATE_TYPE: "https://security.sigstore.dev/attestations/vuln/trivy/v1"
      ZAP_PREDICATE_TYPE: "https://security.sigstore.dev/attestations/dast/zap/v1"
      SBOM_PREDICATE_TYPE: "https://spdx.dev/Document"
      SLSA_PREDICATE_TYPE: "https://slsa.dev/provenance/v1"      
      SLSA_VERIFIER_BUILDER_ID: "https://github.com/slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml"
      OIDC_ISSUER: "https://token.actions.githubusercontent.com"
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Install go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.23.2'
          check-latest: false
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - name: Install Kyverno CLI
        uses: kyverno/action-install-cli@fcee92fca5c883169ef9927acf543e0b5fc58289 # v0.2.0
        with:
          release: 'v1.17.1'
          verify: true
      - name: yq - portable yaml processor
        uses: mikefarah/yq@751d8ad57b84f1794661bc70c0afb92a22ad7b3c # v4.53.2
      - name: Install Kustomize
        uses: imranismail/setup-kustomize@53f941b41dca13ed61874bbc6b4b6e1562877530 # v3.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - name: Install SLSA-Verifier
        uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1
      - name: Provision Token File
        shell: bash
        run: |
          TOKEN_PATH="${RUNNER_TEMP}/github_token.txt"
          touch "$TOKEN_PATH"
          chmod 600 "$TOKEN_PATH"
          echo "${{ secrets.GITHUB_TOKEN }}" > "$TOKEN_PATH"
      - name: Resolve Release Run Metadata
        id: release-meta
        uses: ./.github/actions/resolve-run-metadata
        with:
          run-id: ${{ needs.verify-context.outputs.release_run_id }}
          github-token-file: ${{ runner.temp }}/github_token.txt
          expected-workflow-name: 'Release'
      - name: Cleanup Token File
        if: always()
        shell: bash
        run: rm -f "${RUNNER_TEMP}/github_token.txt"
      - name: Print Validated Data
        run: |
          echo "Ref: ${{ steps.release-meta.outputs.release_ref }}"
          echo "Tag: ${{ steps.release-meta.outputs.release_tag }}"
          echo "SHA: ${{ steps.release-meta.outputs.release_sha }}"
      - name: Download Digests from Release Workflow
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          run-id: ${{ steps.release-meta.outputs.run_id }}
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: digest-*
          path: digests
      - name: Read & Validate Digests
        env:
          DOCKER_USERNAME: ${{ vars.DOCKER_HUB_USERNAME }}
        run: |
          set -euo pipefail
          COMPONENTS="backend worker frontend"
          for COMP in $COMPONENTS; do
            REPO="app-stayhealthy-${COMP}"
            FILE="digests/digest-${REPO}"
            if [ ! -s "$FILE" ]; then
              echo "::error::Digest file missing or empty for ${COMP} ($FILE)"
              exit 1
            fi
            DIGEST=$(cat "$FILE")
            if ! echo "$DIGEST" | grep -Eq '^sha256:[a-f0-9]{64}$'; then
              echo "::error::Invalid digest format for ${COMP}: ${DIGEST}"
              exit 1
            fi
            # Convert component name to uppercase (e.g., "backend" -> "BACKEND")
            PREFIX=$(echo "$COMP" | tr '[:lower:]' '[:upper:]')
            echo "${PREFIX}_DIGEST=${DIGEST}" >> "$GITHUB_ENV"
            echo "${PREFIX}_IMAGE=docker.io/${DOCKER_USERNAME}/${REPO}@${DIGEST}" >> "$GITHUB_ENV"
          done
          echo "✅ Loaded and validated all digests successfully." 
      - name: Verify Backend Signatures (Hard Gate)
        uses: ./.github/actions/verify-attestations
        with:
          image: ${{ env.BACKEND_IMAGE }}
          release-ref: ${{ steps.release-meta.outputs.release_ref }}
          release-tag: ${{ steps.release-meta.outputs.release_tag }}
          build-workflow-path: ${{ env.BUILD_WORKFLOW_PATH }}
          trivy-workflow-path: ${{ env.TRIVY_WORKFLOW_PATH }}
          zap-workflow-path: ${{ env.ZAP_WORKFLOW_PATH }}
      - name: Verify Worker Signatures (Hard Gate)
        uses: ./.github/actions/verify-attestations
        with:
          image: ${{ env.WORKER_IMAGE }}
          release-ref: ${{ steps.release-meta.outputs.release_ref }}
          release-tag: ${{ steps.release-meta.outputs.release_tag }}
          build-workflow-path: ${{ env.BUILD_WORKFLOW_PATH }}
          trivy-workflow-path: ${{ env.TRIVY_WORKFLOW_PATH }}
          zap-workflow-path: ${{ env.ZAP_WORKFLOW_PATH }}
      - name: Verify Frontend Signatures (Hard Gate)
        uses: ./.github/actions/verify-attestations
        with:
          image: ${{ env.FRONTEND_IMAGE }}
          release-ref: ${{ steps.release-meta.outputs.release_ref }}
          release-tag: ${{ steps.release-meta.outputs.release_tag }}
          build-workflow-path: ${{ env.BUILD_WORKFLOW_PATH }}
          trivy-workflow-path: ${{ env.TRIVY_WORKFLOW_PATH }}
          zap-workflow-path: ${{ env.ZAP_WORKFLOW_PATH }}     
      - name: Update README.MD - verification section
        env:
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
        run: |
          FILE="README.md"
          test -f "$FILE" || (echo "::error::Missing $FILE"; exit 1)
          BACKEND_REPO="${BACKEND_IMAGE%@*}"
          sed -i "s|IMAGE=\"${BACKEND_REPO}@.*\"|IMAGE=\"${BACKEND_IMAGE}\"|g" "$FILE"
          grep "IMAGE=\"${BACKEND_REPO}@" "$FILE"
          grep -q "$BACKEND_IMAGE" "$FILE" || (echo "::error::BACKEND_IMAGE not found in $FILE"; exit 1)
      - name: Update prod overlay digests
        run: |
          set -euo pipefail
          FILE="k8s/overlays/prod/kustomization.yaml"
          test -f "$FILE" || (echo "::error::Missing $FILE"; exit 1)
          yq -i '
            (.images[] | select(.name == "docker.io/agslima/app-stayhealthy-backend") | .digest) = strenv(BACKEND_DIGEST)
          ' "$FILE"
          yq -i '
            (.images[] | select(.name == "docker.io/agslima/app-stayhealthy-worker") | .digest) = strenv(WORKER_DIGEST)
          ' "$FILE"
          yq -i '
            (.images[] | select(.name == "docker.io/agslima/app-stayhealthy-frontend") | .digest) = strenv(FRONTEND_DIGEST)
          ' "$FILE"
          echo "✅ Updated prod overlay:"
          yq -r '.images[] | .name + " => " + .digest' "$FILE"
          # Fail closed
          yq -r '.images[].digest' "$FILE" | grep -q '^sha256:' || (
            echo "::error::Prod overlay digests not set correctly"
            exit 1
          )            
      - name: Validate Prod Manifests
        uses: ./.github/actions/validate-kubernetes-manifests
        with:
          overlay-path: 'k8s/overlays/prod'
          log-artifact-name: 'kyverno-gitops-prod-log'
          policies: |
            k8s/policies/cluster/verify-signature.yaml
            k8s/policies/cluster/verify-trivy.yaml
            k8s/policies/cluster/verify-zap.yaml
            k8s/policies/cluster/verify-sbom.yaml
            k8s/policies/cluster/verify-slsa.yaml
      - name: Create GitOps PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 #v8.1.1 
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: deploy promote ${{ steps.release-meta.outputs.release_sha }}"
          title: "chore: deploy release (${{ steps.release-meta.outputs.release_sha }})"
          body: |
            Automated GitOps promotion from a successful Release workflow run.
            **Source**
            - Release Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ steps.release-meta.outputs.run_id }}
            - Head SHA: `${{ steps.release-meta.outputs.release_sha }}`
            - Backend candidate canary: `${{ env.BACKEND_IMAGE }}`
            - Worker: `${{ env.WORKER_IMAGE }}`
            - Frontend: `${{ env.FRONTEND_IMAGE }}`
            **Rollout intent**
            - Prod backend stable digest remains unchanged until explicit promotion.
            - Prod backend canary digest is advanced automatically by this PR.
            **Supply Chain Verification**
            - cosign verify (signature): ✅
            - Trivy attestation: ✅ (`${{ env.TRIVY_PREDICATE_TYPE }}`)
            - ZAP attestation: ✅ (`${{ env.ZAP_PREDICATE_TYPE }}`)
            - SBOM attestation: ✅ (`${{ env.SBOM_PREDICATE_TYPE }}`)
            - SLSA provenance: ✅ (`${{ env.SLSA_PREDICATE_TYPE }}`)
            - Kyverno structural checks: ✅
          branch: gitops/deploy-${{ steps.release-meta.outputs.release_sha }}
          base: main
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          signoff: true
          delete-branch: true
          labels: |
            automated
          assignees: agslima
          reviewers: agslima
          draft: false
