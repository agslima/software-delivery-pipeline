name: GitOps Enforcement

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Release Run ID to promote'
        required: true
  workflow_run:
    workflows: ["Release"]
    types: [completed]
permissions:
      contents: read

concurrency:
  group: gitops-${{ github.event.workflow_run.id || github.event.inputs.run_id || github.run_id }}
  cancel-in-progress: false
  
jobs:
  verify-context:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_run_id: ${{ steps.validate.outputs.release_run_id }}
    steps:
      - name: Guardrails - Validate promotion source
        id: validate
        env:
          EVENT_NAME: ${{ github.event_name }}
          CURRENT_REPO: ${{ github.repository }}
          INPUT_RUN_ID: ${{ inputs.run_id }}
          WR_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WR_HEAD_REPO: ${{ github.event.workflow_run.head_repository.full_name }}
          WR_EVENT: ${{ github.event.workflow_run.event }}
          WR_REF: ${{ github.event.workflow_run.ref }}
          WR_HEAD_REF: ${{ github.event.workflow_run.head_branch }}
          WR_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            test -n "$INPUT_RUN_ID" || (echo "::error::workflow_dispatch requires run_id input."; exit 1)
            echo "release_run_id=$INPUT_RUN_ID" >> "$GITHUB_OUTPUT"
            echo "✅ Manual promotion request validated (run_id provided)."
            exit 0
          fi
          test -n "$WR_RUN_ID" || (echo "::error::Missing workflow_run.id for workflow_run trigger."; exit 1)
          if [[ "$WR_CONCLUSION" != "success" ]]; then
            echo "::error::Upstream Release workflow did not succeed (conclusion=$WR_CONCLUSION)."
            exit 1
          fi
          if [[ "$WR_HEAD_REPO" != "$CURRENT_REPO" ]]; then
            echo "::error::Security: workflow_run originated from a different repository ($WR_HEAD_REPO)."
            exit 1
          fi
          if [[ "$WR_EVENT" != "push" ]]; then
            echo "::error::Unsupported Release trigger event ($WR_EVENT). Expected push from a release tag."
            exit 1
          fi
          WR_EFFECTIVE_REF="${WR_REF:-$WR_HEAD_REF}"
          if [[ -z "$WR_EFFECTIVE_REF" ]]; then
            echo "::error::Missing upstream release ref for workflow_run trigger."
            exit 1
          fi
          if [[ "$WR_EFFECTIVE_REF" != refs/* ]]; then
            WR_EFFECTIVE_REF="refs/tags/$WR_EFFECTIVE_REF"
          fi
          if [[ "$WR_EFFECTIVE_REF" != refs/tags/* ]]; then
            echo "::error::Upstream Release workflow must originate from a tag push (ref=$WR_EFFECTIVE_REF)."
            exit 1
          fi
          echo "release_run_id=$WR_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "✅ workflow_run promotion source validated."

  gitops:
    runs-on: ubuntu-latest
    needs: [verify-context]
    if: ${{ needs.verify-context.result == 'success' }}
    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write 
    env:
      TRIVY_PREDICATE_TYPE: "https://security.sigstore.dev/attestations/vuln/trivy/v1"
      ZAP_PREDICATE_TYPE: "https://security.sigstore.dev/attestations/dast/zap/v1"
      SBOM_PREDICATE_TYPE: "https://spdx.dev/Document"
      SLSA_PREDICATE_TYPE: "https://slsa.dev/provenance/v0.2"
      SLSA_VERIFIER_BUILDER_ID: "https://github.com/slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml"
      SLSA_ATTESTATION_BUILDER_ID: "https://github.com/slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@refs/tags/v2.1.0"
      SLSA_BUILD_TYPE: "https://github.com/slsa-framework/slsa-github-generator/container@v1"
      SLSA_WORKFLOW_ENTRYPOINT: ".github/workflows/ci-release-gate.yml"
      BUILD_WORKFLOW_PATH: ".github/workflows/build-push-dual-registry.yml"
      OIDC_ISSUER: "https://token.actions.githubusercontent.com"
      YQ_VERSION: "v4.44.3"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      
      - name: Install go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.23.2'
          check-latest: true
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      
      - name: Install Kyverno CLI
        uses: kyverno/action-install-cli@fcee92fca5c883169ef9927acf543e0b5fc58289 # v0.2.0
        with:
          release: 'v1.17.1'
          verify: true
      - name: Install yq
        run: |
          set -euo pipefail
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${{env.YQ_VERSION}}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
          yq --version   
      - name: Install Kustomize
        uses: imranismail/setup-kustomize@53f941b41dca13ed61874bbc6b4b6e1562877530 # v3.0.0
      
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Install SLSA-Verifier
        run: |
          go install github.com/slsa-framework/slsa-verifier/v2/cli/slsa-verifier@v2.7.1
      - name: Resolve Release Run Metadata
        id: release-meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ needs.verify-context.outputs.release_run_id }}
        run: |
          set -euo pipefail
          test -n "$RUN_ID" || (echo "::error::Missing release run id."; exit 1)
          API_URL="${{ github.api_url }}/repos/${{ github.repository }}/actions/runs/${RUN_ID}"
          RUN_JSON="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL")"
          RELEASE_WORKFLOW_NAME="$(echo "$RUN_JSON" | jq -r '.name // empty')"
          RELEASE_CONCLUSION="$(echo "$RUN_JSON" | jq -r '.conclusion // empty')"
          RELEASE_EVENT="$(echo "$RUN_JSON" | jq -r '.event // empty')"
          RELEASE_REF="$(echo "$RUN_JSON" | jq -r '.ref // empty')"
          RELEASE_HEAD_REF="$(echo "$RUN_JSON" | jq -r '.head_branch // empty')"
          RELEASE_SHA="$(echo "$RUN_JSON" | jq -r '.head_sha // empty')"
          if [[ "$RELEASE_WORKFLOW_NAME" != "Release" ]]; then
            echo "::error::Run ${RUN_ID} is not from workflow 'Release' (found: ${RELEASE_WORKFLOW_NAME:-unknown})."
            exit 1
          fi
          if [[ "$RELEASE_CONCLUSION" != "success" ]]; then
            echo "::error::Release run ${RUN_ID} did not succeed (conclusion: ${RELEASE_CONCLUSION:-unknown})."
            exit 1
          fi
          if [[ "$RELEASE_EVENT" != "push" ]]; then
            echo "::error::Release run ${RUN_ID} must be triggered by push (event: ${RELEASE_EVENT:-unknown})."
            exit 1
          fi
          RELEASE_EFFECTIVE_REF="${RELEASE_REF:-$RELEASE_HEAD_REF}"
          if [[ -z "$RELEASE_EFFECTIVE_REF" ]]; then
            echo "::error::Could not resolve release ref for run ${RUN_ID}."
            exit 1
          fi
          if [[ "$RELEASE_EFFECTIVE_REF" != refs/tags/v*.*.* && "$RELEASE_EFFECTIVE_REF" != v*.*.* ]]; then 
            echo "::error::Release run ${RUN_ID} must originate from a tag push (ref: ${RELEASE_EFFECTIVE_REF})." 
            exit 1 
          fi
          if [[ "$RELEASE_EFFECTIVE_REF" != refs/* ]]; then
            RELEASE_EFFECTIVE_REF="refs/tags/$RELEASE_EFFECTIVE_REF"
          fi
          RELEASE_TAG="${RELEASE_EFFECTIVE_REF#refs/tags/}"
          test -n "$RELEASE_SHA" || (echo "::error::Could not resolve head SHA for release run ${RUN_ID}."; exit 1)
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "release_ref=$RELEASE_EFFECTIVE_REF" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
      - name: Download Digests from Release Workflow
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8.0.1
        with:
          run-id: ${{ steps.release-meta.outputs.run_id }}
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: digest-*
          path: digests
      - name: Read & Validate Digests
        run: |
          set -euo pipefail
          test -s digests/digest-backend || (echo "::error::digest-backend missing/empty"; exit 1)
          test -s digests/digest-worker || (echo "::error::digest-worker missing/empty"; exit 1)
          test -s digests/digest-frontend || (echo "::error::digest-frontend missing/empty"; exit 1)
          BACKEND_DIGEST="$(cat digests/digest-backend)"
          WORKER_DIGEST="$(cat digests/digest-worker)"
          FRONTEND_DIGEST="$(cat digests/digest-frontend)"
          # Fail-closed: must look like sha256:...
          echo "$BACKEND_DIGEST" | grep -Eq '^sha256:[a-f0-9]{64}$' || (echo "::error::Invalid backend digest"; exit 1)
          echo "$WORKER_DIGEST" | grep -Eq '^sha256:[a-f0-9]{64}$' || (echo "::error::Invalid worker digest"; exit 1)
          echo "$FRONTEND_DIGEST" | grep -Eq '^sha256:[a-f0-9]{64}$' || (echo "::error::Invalid frontend digest"; exit 1)
          echo "BACKEND_DIGEST=$BACKEND_DIGEST" >> $GITHUB_ENV
          echo "WORKER_DIGEST=$WORKER_DIGEST" >> $GITHUB_ENV
          echo "FRONTEND_DIGEST=$FRONTEND_DIGEST" >> $GITHUB_ENV
          echo "BACKEND_IMAGE=docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/app-stayhealthy-backend@$BACKEND_DIGEST" >> $GITHUB_ENV
          echo "WORKER_IMAGE=docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/app-stayhealthy-worker@$WORKER_DIGEST" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/app-stayhealthy-frontend@$FRONTEND_DIGEST" >> $GITHUB_ENV
          echo "✅ Loaded Digests."
      - name: Verify Signatures + Required Attestations (hard gate)
        env:
          RELEASE_REF: ${{ steps.release-meta.outputs.release_ref }}
          RELEASE_TAG: ${{ steps.release-meta.outputs.release_tag }}
        run: |
          set -euo pipefail
  
          verify_all () {
            local IMAGE="$1"
            local SLSA_ATTESTATION
            local SLSA_PROVENANCE

            SLSA_ATTESTATION="$(mktemp)"
            SLSA_PROVENANCE="$(mktemp)"
            
            # 1. Verify Image Signature
            echo "🔐 Verifying signature for $IMAGE"
            cosign verify "$IMAGE" \
              --certificate-oidc-issuer "${{ env.OIDC_ISSUER }}" \
              --certificate-identity-regexp "^https://github.com/${{ github.repository }}/${{ env.BUILD_WORKFLOW_PATH }}@refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$"
            
            echo "🧾 Verifying SBOM attestation..."
            cosign verify-attestation "$IMAGE" \
              --type "${{ env.SBOM_PREDICATE_TYPE }}" \
              --certificate-oidc-issuer "${{ env.OIDC_ISSUER }}" \
              --certificate-identity-regexp "^https://github.com/${{ github.repository }}/${{ env.BUILD_WORKFLOW_PATH }}@refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$" \
              > /dev/null

            echo "🧾 Verifying SLSA provenance attestation identity..."
            cosign verify-attestation "$IMAGE" \
              --type "${{ env.SLSA_PREDICATE_TYPE }}" \
              --certificate-oidc-issuer "${{ env.OIDC_ISSUER }}" \
              --certificate-identity "${{ env.SLSA_ATTESTATION_BUILDER_ID }}" \
              > "$SLSA_ATTESTATION"

            echo "🔎 Verifying SLSA builder/source expectations..."
            slsa-verifier verify-image "$IMAGE" \
              --builder-id "${{ env.SLSA_VERIFIER_BUILDER_ID }}" \
              --source-uri "github.com/${{ github.repository }}" \
              --source-tag "$RELEASE_TAG"

            jq -r '.[0].payload' "$SLSA_ATTESTATION" | base64 -d > "$SLSA_PROVENANCE"
            test -s "$SLSA_PROVENANCE" || (echo "::error::Decoded SLSA provenance payload missing for $IMAGE"; exit 1)

            jq -e \
              --arg predicate_type "${{ env.SLSA_PREDICATE_TYPE }}" \
              --arg builder_id "${{ env.SLSA_ATTESTATION_BUILDER_ID }}" \
              --arg build_type "${{ env.SLSA_BUILD_TYPE }}" \
              --arg config_source_uri "git+https://github.com/${{ github.repository }}@$RELEASE_REF" \
              --arg entry_point "${{ env.SLSA_WORKFLOW_ENTRYPOINT }}" \
              --arg github_event_name "push" \
              --arg github_ref "$RELEASE_REF" \
              '
                .predicateType == $predicate_type and
                .predicate.builder.id == $builder_id and
                .predicate.buildType == $build_type and
                .predicate.invocation.configSource.uri == $config_source_uri and
                .predicate.invocation.configSource.entryPoint == $entry_point and
                .predicate.invocation.environment.github_event_name == $github_event_name and
                .predicate.invocation.environment.github_ref == $github_ref
              ' "$SLSA_PROVENANCE" > /dev/null
          }
          verify_all "${{ env.BACKEND_IMAGE }}"
          verify_all "${{ env.WORKER_IMAGE }}"
          verify_all "${{ env.FRONTEND_IMAGE }}"
          echo "✅ All signatures & attestations verified."
      - name: Update prod digests (candidate canary + full promotion for non-canary services)
        run: |
          set -euo pipefail
          FILE="k8s/overlays/prod/kustomization.yaml"
          test -f "$FILE" || (echo "::error::Missing $FILE"; exit 1)
          yq -i '
            (.images[] | select(.name == "docker.io/agslima/app-stayhealthy-backend") | .digest) = strenv(BACKEND_DIGEST)
          ' "$FILE"
          yq -i '
            (.images[] | select(.name == "docker.io/agslima/app-stayhealthy-worker") | .digest) = strenv(WORKER_DIGEST)
          ' "$FILE"
          yq -i '
            (.images[] | select(.name == "docker.io/agslima/app-stayhealthy-frontend") | .digest) = strenv(FRONTEND_DIGEST)
          ' "$FILE"
          echo "✅ Updated prod overlay:"
          yq -r '.images[] | .name + " => " + .digest' "$FILE"
          # Fail closed
          yq -r '.images[].digest' "$FILE" | grep -q '^sha256:' || (
            echo "::error::Prod overlay digests not set correctly"
            exit 1
          )
      - name: Validate rendered prod manifests against cluster policy
        if: false
        run: |
          set -euo pipefail
          LOG_FILE="kyverno-gitops.log"
          : > "$LOG_FILE"
          # Render the manifest
          RENDERED_MANIFEST=$(mktemp)
          kustomize build k8s/overlays/prod > "$RENDERED_MANIFEST"
          test -s "$RENDERED_MANIFEST" || (echo "::error::Rendered manifest is empty"; exit 1)
          echo "=== Namespaces in rendered YAML ===" | tee -a "$LOG_FILE"
          yq -r 'select(.metadata != null) | .kind + " " + (.metadata.namespace // "NONE") + " " + .metadata.name' "$RENDERED_MANIFEST" \
          | sort | uniq -c | tee -a "$LOG_FILE"
          echo "=== Images in rendered YAML ===" | tee -a "$LOG_FILE"
          yq -r '
             select(.kind=="Deployment") |
             .metadata.name as $n |
             .spec.template.spec.containers[].image |
             $n + " => " + .
          ' "$RENDERED_MANIFEST" | tee -a "$LOG_FILE"
          echo "=== Kyverno policy evaluation (split policies) ===" | tee -a "$LOG_FILE"
          POLICIES=(
            "k8s/policies/cluster/verify-sbom.yaml"
            "k8s/policies/cluster/verify-slsa.yaml"
          )
          for POLICY in "${POLICIES[@]}"; do
            echo "" | tee -a "$LOG_FILE"
            echo "------------------------------------------------------------" | tee -a "$LOG_FILE"
            echo "Applying policy: $POLICY" | tee -a "$LOG_FILE"
            echo "------------------------------------------------------------" | tee -a "$LOG_FILE"
            kyverno apply "$POLICY" \
              --resource "$RENDERED_MANIFEST" \
              --registry -v=6 \
              --detailed-results \
              --continue-on-fail \
              | tee -a "$LOG_FILE"
          done
          echo "✅ Policy Validation Passed." | tee -a "$LOG_FILE"
      
      - name: Validate rendered prod manifests
        run: |
          set -euo pipefail

          LOG_FILE="kyverno-gitops.log"
          : > "$LOG_FILE"

          # 1. Render the manifest
          echo "Rendering Kustomize manifests..."
          RENDERED_MANIFEST=$(mktemp)
          kustomize build k8s/overlays/prod > "$RENDERED_MANIFEST"

          test -s "$RENDERED_MANIFEST" || (echo "::error::Rendered manifest is empty"; exit 1)

          # 2. Extract context for CI Logs
          echo "=== Namespaces in rendered YAML ===" | tee -a "$LOG_FILE"
          yq -r 'select(.metadata != null) | .kind + " " + (.metadata.namespace // "NONE") + " " + .metadata.name' "$RENDERED_MANIFEST" \
          | sort | uniq -c | tee -a "$LOG_FILE"

          echo "=== Images in rendered YAML ===" | tee -a "$LOG_FILE"
          yq -r '
            select(.kind=="Deployment") |
            .metadata.name as $n |
            .spec.template.spec.containers[].image |
            $n + " => " + .
          ' "$RENDERED_MANIFEST" | tee -a "$LOG_FILE"

          # 3. Evaluate Policies
          echo "=== Kyverno policy evaluation ===" | tee -a "$LOG_FILE"

          # Disable 'set -e' temporarily so a policy failure doesn't immediately kill the script
          set +e 

          # Run Kyverno against multiple policies simultaneously
          timeout 180 kyverno apply \
            k8s/policies/cluster/verify-sbom.yaml \
            k8s/policies/cluster/verify-slsa.yaml \
            --resource "$RENDERED_MANIFEST" \
            --registry \
            -v=6 \
            --detailed-results 2>&1 | tee -a "$LOG_FILE"

          # Capture the exit code of the Kyverno evaluation pipeline
          KYVERNO_EXIT_CODE=${PIPESTATUS[0]}

          # Re-enable strict error handling
          set -e

          echo "------------------------------------------------------------" | tee -a "$LOG_FILE"
          if [ "$KYVERNO_EXIT_CODE" -ne 0 ]; then
            echo "::error::Kyverno policy validation failed. Check the logs above." | tee -a "$LOG_FILE"
            exit "$KYVERNO_EXIT_CODE"
          else
            echo "Kyverno policy validation passed successfully." | tee -a "$LOG_FILE"
          fi
        
      - name: Upload Kyverno Log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kyverno-gitops-log
          path: kyverno-gitops.log
          retention-days: 30
      - name: Compose PR Metadata
        run: |
          set -euo pipefail
          RUN_ID="${{ steps.release-meta.outputs.run_id }}"
          RELEASE_SHA="${{ steps.release-meta.outputs.release_sha }}"
          REPO="${{ github.repository }}"
          SERVER_URL="${{ github.server_url }}"
          echo "RELEASE_RUN_URL=${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}" >> $GITHUB_ENV
          echo "RELEASE_SHA=${RELEASE_SHA}" >> $GITHUB_ENV
          # Use SHA-based branch name to avoid collisions
          echo "PR_BRANCH=gitops/deploy-${RELEASE_SHA}" >> $GITHUB_ENV
      - name: Create GitOps PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 #v8.1.1
        with:
          token: ${{ secrets.PAT_GITHUB }}
          commit-message: "deploy: promote ${{ env.RELEASE_SHA }}"
          title: "Deploy release (${{ env.RELEASE_SHA }})"
          body: |
            Automated GitOps promotion from a successful Release workflow run.
            **Source**
            - Release Run: ${{ env.RELEASE_RUN_URL }}
            - Head SHA: `${{ env.RELEASE_SHA }}`
            **Pinned Images**
            - Backend candidate canary: `${{ env.BACKEND_IMAGE }}`
            - Worker: `${{ env.WORKER_IMAGE }}`
            - Frontend: `${{ env.FRONTEND_IMAGE }}`
            **Rollout intent**
            - Prod backend stable digest remains unchanged until explicit promotion.
            - Prod backend canary digest is advanced automatically by this PR.
            **Supply Chain Verification**
            - cosign verify (signature): ✅
            - Trivy attestation: ✅ (`${{ env.TRIVY_PREDICATE_TYPE }}`)
            - ZAP attestation: ✅ (`${{ env.ZAP_PREDICATE_TYPE }}`)
            - SBOM attestation: ✅ (`${{ env.SBOM_PREDICATE_TYPE }}`)
            - Kyverno structural checks: ✅
          branch: ${{ env.PR_BRANCH }}
          base: main
          delete-branch: true
