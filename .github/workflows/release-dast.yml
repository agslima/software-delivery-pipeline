name: 'Release - DAST Analysis (Digest-based)'
# Workflow for running DAST analysis on release candidates using pinned image digests
# Governance: docs/governance.md (Release DAST gate control)
# Threat model: docs/threat-model.md (T-DAST-001: Runtime vulnerability discovery)
permissions:
  contents: read
defaults:
  run:
    shell: bash
on:
  workflow_call:
    secrets:      
      ghcr_token:
        description: 'GitHub Token for GHCR authentication'
        required: true      
      dockerhub_token:
        description: 'Docker Hub access token'
        required: true
      jwt_secret:
        description: 'JWT secret for the application (used in DAST environment)'
        required: true
      admin_pass:
        description: 'Admin password for the application'
        required: true
      db_pass:
        description: 'Database password for the application'
        required: true
      data_encryption_key:
        description: 'Data encryption key for the application'
        required: true
    inputs:
      dockerhub_username:
        description: 'Docker Hub username'
        required: true 
        type: string
      ghcr_username:
        description: 'GitHub Username/Repository Owner'
        required: true
        type: string
      image-digest-backend:
        description: 'Backend image digest (sha256:...)'
        required: true
        type: string
      image-digest-frontend:
        description: 'Frontend image digest (sha256:...)'
        required: true
        type: string
      image-digest-worker:
        description: 'Worker image digest (sha256:...)'
        required: true
        type: string
      admin_user:
        description: 'Admin username for the application'
        required: true
        type: string
      db_user:
        description: 'Database username for the application'
        required: true
        type: string
      db_name:
        description: 'Database name for the application'
        required: true
        type: string
      release_tag:
        description: 'Release tag for image'
        required: true
        type: string
      github_sha:
        description: 'Commit SHA'
        required: true
        type: string
        
jobs:
  dast-analysis:
    name: DAST (Digest-based)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      GITHUB_SHA: ${{ inputs.github_sha }}
      DOCKER_USERNAME: ${{ inputs.dockerhub_username }}
      JWT_SECRET: ${{ secrets.jwt_secret }}
      ADMIN_USER: ${{ inputs.admin_user }}
      DB_USER: ${{ inputs.db_user }}
      DB_NAME: ${{ inputs.db_name }}
      IMAGE_DIGEST_BACKEND: ${{ inputs.image-digest-backend }}
      IMAGE_DIGEST_FRONTEND: ${{ inputs.image-digest-frontend }}
      IMAGE_DIGEST_WORKER: ${{ inputs.image-digest-worker }}
      ADMIN_PASS: ${{ secrets.admin_pass }}
      DB_PASS: ${{ secrets.db_pass }}
      DATA_ENCRYPTION_KEY: ${{ secrets.data_encryption_key }}
      ZAP_IMG: ghcr.io/zaproxy/zaproxy@sha256:4bef6bcb753a95aa2f69f36e400a77dcc47ced2d10d26902d52f616fa292f5e1 # ZAP image v2.17.0 - Last verified: 2026-04-27 - Next review: 2026-07-27
      ZAP_TARGET_FRONTEND: "http://127.0.0.1:4173"
      ZAP_TARGET_BACKEND: "http://127.0.0.1:8080"
      ZAP_CONTEXT_FILE: ${{ github.workspace }}/.zap/context.context
      ZAP_RULES_FILE: ${{ github.workspace }}/.zap/rules.tsv
      HEALTH_TIMEOUT: "120" # seconds
      COMPOSE_PROJECT_NAME: dast-${{ github.run_id }}-${{ github.run_attempt }} 
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.GITHUB_SHA }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set Variables + Compose Secrets (file-based)
        working-directory: app
        run: |
          set -euo pipefail
          SECRETS_DIR="${RUNNER_TEMP}/compose-secrets"
          ENV_FILE=".env"
          rm -f "$ENV_FILE"
          rm -rf "$SECRETS_DIR"
          mkdir -p "$SECRETS_DIR"
          {
            echo "ADMIN_USER=${ADMIN_USER}"
            echo "DB_USER=${DB_USER}"
            echo "DB_NAME=${DB_NAME}"
            echo "COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}"
            echo "SECRETS_PATH=${SECRETS_DIR}"
          } >> "$ENV_FILE"
          chmod 644 "$ENV_FILE"
          # Compose secrets files
          printf "%s" "${JWT_SECRET}" > "${SECRETS_DIR}/jwt_secret.txt"
          printf "%s" "${ADMIN_PASS}" > "${SECRETS_DIR}/admin_pass.txt"
          printf "%s" "${DB_PASS}" > "${SECRETS_DIR}/db_pass.txt"
          printf "%s" "${DATA_ENCRYPTION_KEY}" > "${SECRETS_DIR}/data_encryption_key.txt"
          chmod 644 "${SECRETS_DIR}"/*.txt
          echo "Secrets dir: ${SECRETS_DIR}"
      - name: Start Ephemeral Environment (Pinned Digests)
        working-directory: app
        run: |
          set -euo pipefail
          BACKEND_DIGEST="${IMAGE_DIGEST_BACKEND}"
          WORKER_DIGEST="${IMAGE_DIGEST_WORKER}"
          FRONTEND_DIGEST="${IMAGE_DIGEST_FRONTEND}"
          export BACKEND_IMAGE="docker.io/${DOCKER_USERNAME}/app-stayhealthy-backend@${BACKEND_DIGEST}"
          export WORKER_IMAGE="docker.io/${DOCKER_USERNAME}/app-stayhealthy-worker@${WORKER_DIGEST}"
          export FRONTEND_IMAGE="docker.io/${DOCKER_USERNAME}/app-stayhealthy-frontend@${FRONTEND_DIGEST}"
          echo "BACKEND_IMAGE=$BACKEND_IMAGE"
          echo "WORKER_IMAGE=$WORKER_IMAGE"
          echo "FRONTEND_IMAGE=$FRONTEND_IMAGE"
          # Compose should reference BACKEND_IMAGE / FRONTEND_IMAGE
          docker compose -f docker-compose.prod.yml -f docker-compose.release.yml up -d
          echo "⏳ Waiting for Backend..."
          timeout 90s bash -c 'until curl -s http://127.0.0.1:8080/health > /dev/null; do sleep 5; done'
          echo "⏳ Waiting for Worker..."
          timeout 90s bash -c 'until docker compose exec -T worker wget -qO- http://127.0.0.1:8090/ready 2>/dev/null; do sleep 5; done' || (echo "⛔ Worker failed health check"; exit 1)
          echo "⏳ Waiting for Frontend..."
          timeout 90s bash -c 'until curl -s http://127.0.0.1:4173 > /dev/null; do sleep 5; done'
          docker compose ps
          echo "✅ Application is live!"
      - name: OWASP ZAP Baseline (Frontend)
        working-directory: app
        run: |
          set -euo pipefail
          mkdir -p zap-out
          chmod 777 zap-out
          cp "$ZAP_CONTEXT_FILE" zap-out/context.context
          cp "$ZAP_RULES_FILE"   zap-out/rules.tsv
          VOL_PATH="$(pwd)/zap-out"
          echo "ZAP volume: $VOL_PATH"
          echo "ZAP image: ${{ env.ZAP_IMG }}"
          docker run --rm \
            --network host \
            -v "$VOL_PATH:/zap/wrk/:rw" \
            "${{ env.ZAP_IMG }}" zap-baseline.py \
            -t "${{ env.ZAP_TARGET_FRONTEND }}" \
            -n /zap/wrk/context.context \
            -c /zap/wrk/rules.tsv \
            -r zap-frontend.html \
            -J zap-frontend.json \
            -I || true
          test -s "zap-out/zap-frontend.json" || (echo "::error::ZAP frontend JSON missing/empty (scanner crash?)"; exit 1)
          jq -e 'type=="object"' "zap-out/zap-frontend.json" >/dev/null
      - name: OWASP ZAP Baseline (Backend)
        working-directory: app
        run: |
          set -euo pipefail
          VOL_PATH="$(pwd)/zap-out" 
          docker run --rm \
            --network host \
            -v "$VOL_PATH:/zap/wrk/:rw" \
            "${{ env.ZAP_IMG }}" zap-baseline.py \
            -t "${{ env.ZAP_TARGET_BACKEND }}" \
            -n /zap/wrk/context.context \
            -c /zap/wrk/rules.tsv \
            -r zap-backend.html \
            -J zap-backend.json \
            -I || true
          test -s "zap-out/zap-backend.json" || (echo "::error::ZAP backend JSON missing/empty (scanner crash?)"; exit 1)
          jq -e 'type=="object"' "zap-out/zap-backend.json" >/dev/null
      - name: Gate ZAP (High > 0)
        working-directory: app
        run: |
          set -euo pipefail
          for FILE in zap-out/zap-frontend.json zap-out/zap-backend.json; do
            test -s "$FILE" || (echo "::error::ZAP report missing/empty: $FILE"; exit 1)
            jq -e 'type=="object"' "$FILE" >/dev/null
            HIGHS=$(jq '[.site[]? | .alerts[]? | select(.riskcode=="3")] | length' "$FILE")
            echo "$FILE => High=$HIGHS"
            if [ "$HIGHS" -gt 0 ]; then
              echo "::error::⛔ DAST Gate Failed ($FILE High=$HIGHS)"
              exit 1
            fi
          done
          echo "✅ DAST Gate Passed"
      - name: Upload ZAP Artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: zap-results
          path: app/zap-out/
          retention-days: 30
      - name: Cleanup Secrets + Env
        if: always()
        working-directory: app
        run: |
          set -euo pipefail
          SECRETS_DIR="${RUNNER_TEMP}/compose-secrets"
          rm -f .env
          if [ -d "${SECRETS_DIR}" ]; then
            shred -vfzu -n 3 "${SECRETS_DIR}"/*.txt 2>/dev/null || true
            rm -rf "${SECRETS_DIR}"
          fi
      - name: Teardown
        if: always()
        working-directory: app
        run: docker compose down -v --remove-orphans

  sign-and-attest:
    name: Sign & Attest (Governed)
    runs-on: ubuntu-latest
    needs: [ dast-analysis]
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      GITHUB_SHA: ${{ inputs.github_sha }}
      ZAP_PREDICATE_TYPE: "https://security.sigstore.dev/attestations/dast/zap/v1"
      ZAP_TARGET_FRONTEND: "http://127.0.0.1:4173"
      ZAP_TARGET_BACKEND: "http://127.0.0.1:8080"
      DOCKER_USERNAME: ${{ inputs.dockerhub_username }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image_repo: app-stayhealthy-backend
            image_digest: ${{ inputs.image-digest-backend }}
          - name: worker
            image_repo: app-stayhealthy-worker
            image_digest: ${{ inputs.image-digest-worker }}
          - name: frontend
            image_repo: app-stayhealthy-frontend
            image_digest: ${{ inputs.image-digest-frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.GITHUB_SHA }}
          fetch-depth: 0
          persist-credentials: false
      - name: Download DAST artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: zap-results
          path: zap-downloads
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: ${{ inputs.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          registry: ghcr.io
          username: ${{ inputs.ghcr_username }}
          password: ${{ secrets.ghcr_token }}
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 #v4.1.1
      - name: Read Digest
        run: |
          set -euo pipefail
          DIGEST="${{ matrix.image_digest }}"
          echo "DIGEST=$DIGEST" >> "$GITHUB_ENV"
          echo "DOCKER_IMAGE=docker.io/${DOCKER_USERNAME}/${{ matrix.image_repo }}@${DIGEST}" >> "$GITHUB_ENV"
          echo "GHCR_IMAGE=ghcr.io/${{ github.repository_owner }}/${{ matrix.image_repo }}@${DIGEST}" >> "$GITHUB_ENV"
      - name: Log Attestation Identity
        run: |
          set -euo pipefail
          echo "Attestation Identity Check:"
          echo "  Issuer: https://token.actions.githubusercontent.com"
          echo "  Workflow: ${{ github.repository }}/.github/workflows/${{ github.workflow_ref }}"
          echo "  Ref: ${{ github.ref }}"
      - name: Create ZAP Attestation (from DAST artifacts)
        run: |
          set -euo pipefail
          FE="zap-downloads/zap-frontend.json"
          BE="zap-downloads/zap-backend.json"
          test -s "$FE" || (echo "::error::Missing ZAP FE json"; exit 1)
          test -s "$BE" || (echo "::error::Missing ZAP BE json"; exit 1)

          HIGH_FE=$(jq '[.site[]? | .alerts[]? | select(.riskcode=="3")] | length' "$FE")
          HIGH_BE=$(jq '[.site[]? | .alerts[]? | select(.riskcode=="3")] | length' "$BE")
          HIGH=$((HIGH_FE + HIGH_BE))

          jq -n \
            --argjson high "$HIGH" \
            --arg image_repo "${{ matrix.image_repo }}" \
            --arg image_digest "${{ matrix.image_digest }}" \
            --arg fe_target  "${ZAP_TARGET_FRONTEND}" \
            --arg be_target  "${ZAP_TARGET_BACKEND}" \
            '{
               scanner: { name: "owasp-zap", uri: "https://www.zaproxy.org/" },
               dast_target: { frontend: $fe_target, backend: $be_target },image_repo: $image_repo,
               image_digest: $image_digest,
               summary: { high: $high },
               result: (if ($high > 0) then "FAIL" else "PASS" end),
               timestamp: (now | todate)
             }' > zap-attestation.json
      
      - name: Push ZAP Attestations
        run: |
          set -euo pipefail
          echo "Signing starts: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          IMAGES=(
            "${DOCKER_IMAGE}"
            "${GHCR_IMAGE}"
          )
          FAILURES=()
          for IMAGE in "${IMAGES[@]}"; do
            echo "Attest image: $IMAGE"
            REPO_PATH=$(echo "$IMAGE" | cut -d'@' -f1)
            export COSIGN_REPOSITORY="$REPO_PATH"
            if cosign attest \
              --yes \
              --predicate zap-attestation.json \
              --type "${{ env.ZAP_PREDICATE_TYPE }}" \
              "$IMAGE"; then
              echo "✅ Attested: $IMAGE"
            else
              FAILURES+=("$IMAGE")
            fi
          done
          if [ ${#FAILURES[@]} -gt 0 ]; then
            echo "::error::Failed to attest: ${FAILURES[*]}"
            exit 1
          fi
          echo "Attestation finished: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          
